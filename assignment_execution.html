<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤管理系統</title>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
 
<style>

body{
  font-family: system-ui;
  background:#f5f6f8;
  margin:0;
}

.main{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.game-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* ✅ 補賽卡 */
.game-card.resumed{
  border:2px solid #3b82f6;
  box-shadow:0 4px 12px rgba(59,130,246,0.2);
  background:#eff6ff; /* ✅ 淡藍底 */
}

.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.game-title{
  font-weight:800;
}

.btn-complete-all{
  margin-left:10px;
  background:#16a34a;
  color:#fff;
  border:none;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* =========================
   人員卡
========================= */
.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;

  padding:10px;
  margin-bottom:6px;
  border-radius:10px;
  border-bottom:1px dashed #ddd;

  transition:all .2s ease;
}

.person:last-child{
  border-bottom:none;
}

.person:hover{
  background:#f9fafb;
}

/* 狀態底色 */
.person.completed{
 background:#ecfdf5;
}
.person.no_show{
 background:#fef2f2;
}
.person.late{
 background:#fffbeb;
}

.person.hold{
  background:#fff7ed;   /* 延賽（橘） */
}

.person.cancelled{
  background:#e5e7eb;   /* 停賽（灰） */
  opacity:0.6;
}


/* 支援左側線 */
.person.replacement{
  border-left:4px solid #6366f1;
}

/* =========================
   左側資訊
========================= */
.info{
  min-width:160px;
}

.info-line{
  font-size:14px;
  font-weight:500;
}

.role{ font-weight:700; }

/* =========================
   操作區
========================= */
.actions-box{
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
}

.select-user{
  padding:4px;
  border-radius:6px;
}

/* =========================
   按鈕
========================= */
.btn{
  padding:4px 10px;
  border:none;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  color:#fff;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-ok{background:#16a34a;}
.btn-no{background:#dc2626;}
.btn-late{background:#f59e0b;}
.btn-assign{background:#3b82f6;}
.btn-replace{background:#4f46e5;}

/* =========================
   標籤（重點）
========================= */
.tag{
  display:inline-block;
  padding:2px 8px;
  border-radius:10px;
  font-size:12px;
  margin-left:4px;
}

.tag-ok{
  background:#16a34a;
  color:#fff;
}

.tag-late{
  background:#f59e0b;
  color:#fff;
}

.tag-no{
  background:#dc2626;
  color:#fff;
}
 
.tag-hold{
  background:#f59e0b;  /* 延賽 */
  color:#fff;
}

.tag-cancel{
  background:#6b7280;  /* 停賽 */
  color:#fff;
}
 
.tag-replace{
  background:#4f46e5;
  color:#fff;
}

/* =========================
   小狀態字
========================= */
.status-mini{
  font-weight:700;
  margin-left:4px;
}

/* =========================
   Tabs
========================= */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tab{
  padding:8px 14px;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
}

/* =========================
   空資料
========================= */
.empty{
  text-align:center;
  color:#999;
  padding:40px;
}

/* =========================
   RWD
========================= */
@media(max-width:600px){
  .person{
    flex-direction:column;
    align-items:flex-start;
  }
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal.hidden{
  display:none;
}

.modal-box{
  width:90%;
  max-width:900px;
  background:#ffffff;
  opacity:1;
  border-radius:12px;
  padding:12px;
  max-height:85vh;
  overflow:auto;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  font-weight:800;
  margin-bottom:8px;
}

.year-table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.year-table th{
  text-align:left;
  padding:6px;
  border-bottom:2px solid #ddd;
}

.year-table td{
  padding:6px;
  border-bottom:1px solid #eee;
}

/* ✅ 卡片 */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

@media(max-width:600px){
  .stat-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

.stat-card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.stat-title{
  font-size:12px;
  color:#666;
  margin-bottom:4px;
}

.stat-value{
  font-size:18px;
  font-weight:700;
}


/* ✅ 小表格 */
.mini-table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
  font-size:14px;
}

.mini-table th,
.mini-table td{
  padding:6px;
  border-bottom:1px solid #eee;
}

.mini-table th{
  color:#666;
  font-size:13px;
}

.badge.warn{
  background:#f59e0b;  /* 延賽 */
  color:#fff;
}

.badge.cancel{
  background:#6b7280;  /* 停賽 */
  color:#fff;
}

.person.ignore{
  background:#e5e7eb;
  opacity:0.6;
}

.person-group{
  margin-bottom:10px;
  padding:10px;
  background:#fafafa;
  border-radius:10px;
}

.role-title{
  font-weight:700;
  margin-bottom:4px;
}

.candidate-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:6px;
}

.candidate{
  display:flex;
  align-items:center;
  gap:4px;
  background:#fff;
  padding:4px 8px;
  border-radius:6px;
}

.name{
  font-size:13px;
}

/* ✅ 原人刪除線 */
.name.line-through{
  text-decoration: line-through;
  color:#999;
}

/* ✅ 支援高亮 */
.name.replace-highlight{
  background:#eef2ff;
  border-radius:6px;
  padding:2px 6px;
}

/* ✅ 主審第一位高亮 */
.person-group.highlight{
  border:2px solid #3b82f6;
  background:#eff6ff;
}

/* KPI 卡片加顏色 */
.stat-card:nth-child(1){ border-left:4px solid #2563eb; }
.stat-card:nth-child(2){ border-left:4px solid #16a34a; }
.stat-card:nth-child(3){ border-left:4px solid #f59e0b; }
.stat-card:nth-child(4){ border-left:4px solid #9333ea; }

/* 表格強化 */
.mini-table th{
  color:#374151;
  font-weight:700;
}

.mini-table td{
  color:#111;
}
</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

  <!-- 年度統計 Modal -->
  <div id="yearModal" class="modal hidden">
    <div class="modal-box">
  
      <div class="modal-header">
        <span>📊 年度統計</span>
        <button onclick="closeYearModal()">✖</button>
      </div>
  
      <div id="yearContent">載入中...</div>
  
    </div>
  </div>

 <!-- 個人分析 Modal -->
 <div id="userModal" class="modal hidden">
   <div class="modal-box">
 
     <div class="modal-header">
       <span>📊 個人數據分析</span>
       <button onclick="closeUserModal()">✖</button>
     </div>
 
     <div id="userContent">載入中...</div>
 
   </div>
 </div>
 
  <div class="header-bar">
    <h2>✅ 出勤管理</h2>
  
    <button class="btn-create"
      onclick="runAutoAssign()">
      ⚙️ 建立出勤
    </button>
    <button onclick="loadYearly()">
      📊 年度統計
    </button>
    <button class="btn-recalc"
      onclick="recalcScore()">
      🔄 重算分數
    </button>
  </div>

  <div id="list"></div>
</div>

<script>

  /* ========================
     按是否鎖定只顯示更正鍵
  ======================== */
function isGameLocked(g){
  // return g.list.every(p => p.status !== 'scheduled');
 
  return g.list.every(p => 
    p.status === 'completed' || p.status === 'late'
  );

}

  /* ========================
     Header
  ======================== */ 
  let userList = [];
  
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
    loadUsers();
  });
 
    function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
 
  /* ========================
     Users
  ======================== */
function loadUsers(){
  callApi({action:'getUsers'}, res=>{

    if(!res){
      toast('API 無回應','error');
      return;
    }

    if(res.result !== 'ok'){
      toast('讀取使用者失敗','error');
      return;
    }

    userList = res.users || [];
    load();
    console.log(userList);
  });
}

 // 只顯示已完賽
function isGameReady(g){

  if (!g) return false;

  const gameDate = new Date(g.date);
  if (isNaN(gameDate)) return false;

  const today = new Date();
  today.setHours(0,0,0,0);
  gameDate.setHours(0,0,0,0);

  const isPast = gameDate <= today;   // ✅ 今天也算

  const status = Number(g.status);

  // 顯示條件
  return isPast && (
    status === 0 ||   // 正常
    status === 1 ||   // 延賽
    status === 4      // 完成
  );
}
 
/* ========================
   主載入
 ======================== */

  
  /* ========================
     Render 核心程式
  ======================== */
let currentTab = 'pending';

function render(list){

  const el = document.getElementById('list');

  if (!list.length){
    el.innerHTML = '<div class="empty">目前沒有出勤資料</div>';
    return;
  }

  // ✅ ✅ ✅ 最新分類（用 Game.status）
  const pending = list.filter(g => Number(g.status) === 0);
  const done = list.filter(g => Number(g.status) === 4);
  const hold = list.filter(g => Number(g.status) === 1);
  // const resumed = list.filter(g => Number(g.status) === 4 && Number(g.from_hold) === 1);
 
  // ✅ ✅ ✅ 補賽（全部）
  const resumed = list.filter(g =>Number(g.from_hold) === 1);


  let data = [];

  if (currentTab === 'pending') data = pending;
  if (currentTab === 'done') data = done;
  if (currentTab === 'hold') data = hold;
  if (currentTab === 'resumed') data = resumed;

  el.innerHTML = `
    <div class="tabs">

      <div class="tab ${currentTab==='pending'?'active':''}"
           onclick="switchTab('pending')">
        🔴 未完成 (${pending.length})
      </div>

      <div class="tab ${currentTab==='done'?'active':''}"
           onclick="switchTab('done')">
        ✅ 已完成 (${done.length})
      </div>

      <div class="tab ${currentTab==='hold'?'active':''}"
           onclick="switchTab('hold')">
        ⚠️ 延賽 (${hold.length})
      </div>

      <div class="tab ${currentTab==='resumed'?'active':''}"
           onclick="switchTab('resumed')">
        🔄 補賽 (${resumed.length})
      </div>

    </div>

    ${data.map(renderGame).join('')}
  `;
}

// 切換資料的地方
function switchTab(t){
  currentTab = t;
  load();
}



   /* ========================
     收合功能
  ======================== */
  function toggleDone(){
   const el = document.getElementById('doneSection');
   el.style.display = el.style.display === 'none' ? 'block' : 'none';
 }
  
  /* ========================
     下拉選單
  ======================== */
  function renderUserSelect(p){
  
    return `
      <select data-id="${p.assignment_id}">
        <option value="">--換人--</option>
        ${userList.map(u=>
          `<option value="${u.user_id}">
            ${u.name} ${u.note ? '('+u.note+')' : ''}
          </option>`
        ).join('')}
      </select>
    `;
  }

// 主入口
function load(){

  const el = document.getElementById('list');

  el.innerHTML = `<div class="empty">⏳ 資料載入中...</div>`;

  callApi({action:'getAssignments'}, res=>{

    if(!res || !res.data){
      el.innerHTML = `<div class="empty">❌ 讀取失敗</div>`;
      return;
    }

    const games = res.data;

    // ✅ ✅ ✅ ✅ ✅ ✅ ✅ ✅ ✅
    window._lastData = games;

    // ✅ ✅ ✅ 重點：
    const data = games.filter(g => isGameReady(g));

    render(data);

  });
}

// 每場 render，支援＋鎖定＋更正＋顏色
function renderGame(g){

  const statusNum = Number(g.status || 0);
  const isResumed = Number(g.from_hold || 0) === 1;

  // ✅ 賽事資訊
  const info = getTournamentInfo(g.tournament_type);

  let statusHTML = '';

  // ✅ ① 延賽
  if (statusNum === 1){
    statusHTML = `
      <span style="margin-left:10px;color:#f59e0b;font-weight:700;">
        ⚠️ 延賽
      </span>

      <button class="btn"
        style="margin-left:8px;background:#2563eb;"
        onclick="reopenGame('${g.game_id}')">
        🔄 補賽
      </button>
    `;
  }

  // ✅ ② 停賽
  else if (statusNum === 2){
    statusHTML = `
      <span style="margin-left:10px;color:#6b7280;font-weight:700;">
        ⛔ 停賽
      </span>
    `;
  }

  // ✅ ③ 已完成（保留）
  else if (statusNum === 3){
    statusHTML = `
      <span style="margin-left:10px;color:#16a34a;font-weight:700;">
        ✅ 已完成
      </span>
    `;
  }

  // ✅ ④ 完成（含補賽完成）
  else if (statusNum === 4){

    if (isResumed){
      statusHTML = `
        <span style="margin-left:10px;color:#2563eb;font-weight:700;">
          🔄 補賽完成
        </span>
      `;
    }else{
      statusHTML = `
        <span style="margin-left:10px;color:#16a34a;font-weight:700;">
          ✅ 已完成
        </span>
      `;
    }
  }

  // ✅ ⑤ 未完成（含補賽中🔥）
  else{

    // ✅ ✅ ✅ 補賽中顯示
    if (isResumed){
      statusHTML += `
        <span style="margin-left:10px;color:#2563eb;font-weight:700;">
          🔄 補賽中
        </span>
      `;
    }

    if (!isGameLocked(g)){
      statusHTML += `
        <button class="btn-complete-all"
          onclick="completeGame('${g.game_id}')">
          ✅ 整場完成
        </button>

        <button class="btn"
          style="margin-left:8px;background:#f59e0b;"
          onclick="setGameHold('${g.game_id}')">
          ⚠️ 延賽
        </button>
      `;
    }
    else{
      statusHTML += `
        <span style="margin-left:10px;color:#16a34a;font-weight:700;">
          ✅ 已完成
        </span>
      `;
    }
  }


  const cardClass = isResumed ? 'game-card resumed' : 'game-card';
  
  return `
    <div class="${cardClass}" data-game-id="${g.game_id}">


      <div class="game-title">
        📅 ${g.date} ｜ ${g.game_code || ''} ｜ ${g.field || ''}

        ｜ <span style="color:${info.color};font-weight:700;">
            ${info.text}
          </span>

        ${statusHTML}
      </div>

      ${renderGroup(g)}

    </div>
  `;
}


// 支援一定在原人下面
function renderGroup(g){

  const list = g.list || [];

  // ✅ group by role
  const roleMap = {};
  list.forEach(p=>{
    if (!roleMap[p.role]) roleMap[p.role] = [];
    roleMap[p.role].push(p);
  });

  let html = '';

  Object.keys(roleMap).forEach(role=>{
  
    // ✅ ✅ ✅ 🔥 防止 undefined / 空角色
    if (!role || role === 'undefined') return;
  
    const rows = roleMap[role];
  
    html += renderRoleRow(role, rows, g);
  
  });

  return html;
}

// 配合上面的程式新增
function renderRoleRow(role, rows, g){

  rows.sort((a,b)=>{
    return new Date(a.create_at || 0) - new Date(b.create_at || 0);
  });

  const hasNoShow =
    window._lastData
      ?.find(x => x.game_id == g.game_id)
      ?.list
      ?.some(x => x.role === role && x.status === 'no_show');

  const firstAssign = rows.find(x => x.assignment_id);

  const original = rows.find(x => Number(x.is_replacement) !== 1);
  const replacement = rows.find(x => Number(x.is_replacement) === 1);

  function renderTag(p){

    if (!p) return '';

    const statusTag =
      p.status === 'completed'
        ? '<span class="tag tag-ok">完</span>'
      : p.status === 'late'
        ? '<span class="tag tag-late">遲</span>'
      : p.status === 'no_show'
        ? '<span class="tag tag-no">缺</span>'
      : (p.status === 'scheduled' && p.name)
        ? '<span class="status-mini" style="color:#888;">待</span>'
      : '';

    const replaceTag =
      Number(p.is_replacement) === 1
        ? '<span class="tag tag-replace">支</span>'
        : '';

    const extraClass = `
      ${p.status === 'no_show' ? 'line-through' : ''}
      ${Number(p.is_replacement) === 1 ? 'replace-highlight' : ''}
    `;

    return `
      <span class="name ${extraClass}">
        ${p.name || '（未確認）'} ${statusTag}${replaceTag}
      </span>
    `;
  }

  let candidateHTML = '';

  if (replacement){
    candidateHTML = `
      <div class="candidate">
        ${renderTag(original)}
        <span style="margin:0 6px;">／</span>
        ${renderTag(replacement)}
      </div>
    `;
  }else{
    candidateHTML = rows.map((p,i)=>`
      <div class="candidate">
        ${renderTag(p)}
      </div>
    `).join('');
  }

  const highlightClass = role === 'PU' ? 'highlight' : '';

  return `
    <div class="person-group ${highlightClass}">

      <div class="role-title">
        ${getRoleText(role)}
      </div>

      <div class="candidate-row">
        ${candidateHTML}
      </div>

      <div class="actions-box">

        <button class="btn btn-ok"
          onclick="handleAutoDecision('${g.game_id}','${role}','completed')">
          完成
        </button>

        <button class="btn btn-late"
          onclick="handleAutoDecision('${g.game_id}','${role}','late')">
          遲到
        </button>

        <button class="btn btn-no"
          onclick="handleAutoDecision('${g.game_id}','${role}','no_show')">
          缺席
        </button>

        ${
          (!hasNoShow && firstAssign)
          ? `
            <button class="btn btn-assign"
              onclick="quickAssign('${firstAssign.assignment_id}', this)">
              改派
            </button>
          `
          : ''
        }

        ${
          hasNoShow
          ? `
            <button class="btn btn-replace"
              onclick="quickReplace('${g.game_id}','${role}', this)">
              + 支援
            </button>
          `
          : ''
        }

        <select class="select-user">
          <option value="">選擇人員</option>
          ${
            userList
              .filter(u => {

                if (u.role.includes('admin')) return false;

                if (role.startsWith('REC')){
                  return (
                    u.role.includes('record') ||
                    u.role.includes('record_chief')
                  );
                }

                return (
                  u.role.includes('judge') ||
                  u.role.includes('chief_judge')
                );

              })
              .map(u =>
                `<option value="${u.user_id}">
                  ${u.name || u.username}
                </option>`
              ).join('')
          }
        </select>

      </div>

    </div>
  `;

function handleAutoDecision(gameId, role, status){

  const g = window._lastData?.find(x => x.game_id == gameId);

  if (!g){
    toast('找不到賽事','error');
    return;
  }

  const list = g.list.filter(x => x.role === role);

  // ✅ 找支援（一定優先）
  const replacement = list.find(x => Number(x.is_replacement) === 1);

  let targetId = null;

  if (replacement){

    // ✅ ✅ ✅ ✅ ✅ 核心修正
    targetId = replacement.assignment_id;

  }else{

    // ✅ 只抓「原人且不是缺席」
    const original = list.find(x =>
      Number(x.is_replacement) !== 1 &&
      x.assignment_id &&
      x.status !== 'no_show'
    );

    targetId = original?.assignment_id;

  }

  if (!targetId){
    toast('找不到可操作人員','error');
    return;
  }

  updateStatus(targetId, status);
}

  let currentToast = null;

    if (currentToast){
      currentToast.remove();
      currentToast = null;
    }
  
    const div = document.createElement('div');
  
    const colorMap = {
      ok:'#16a34a',

    };
  
    div.innerHTML = msg;
  
    div.style = `
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:${colorMap[type]};
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      z-index:9999;
      font-size:14px;
    `;
  
    document.body.appendChild(div);
    currentToast = div;
  
    // ✅ loading 不自動消失
    if (type !== 'loading'){
      setTimeout(()=>{
        if (div === currentToast){
          div.remove();
          currentToast = null;
        }

    }
  }

// 判斷是否已完成
function isGameCompleted(g){

  // ✅ ✅ ✅ ① 優先使用 Game.status（正式標準）
  if (g && g.status !== undefined){
    return Number(g.status) === 3;
  }

  // ✅ ✅ ✅ ② fallback（避免舊資料或 API 沒帶 status）
  const roleDone = {};

  (g.list || []).forEach(p=>{
    if (p.status === 'completed'){
      roleDone[p.role] = true;
    }
  });

  const roleCount = new Set((g.list || []).map(x=>x.role)).size;

  return Object.keys(roleDone).length === roleCount;
}

  html += '<th>出勤</th>';
  html += '<th>完成</th>';
  html += '<th>遲到</th>';
  html += '<th>缺席</th>';

    html += '<td style="font-weight:700;">';

    html += '</span>';

}

// 等級
function renderLevel(lv){

  const map = {
    S:{c:'#9333ea',t:'S'},
    A:{c:'#2563eb',t:'A'},
    B:{c:'#16a34a',t:'B'},
    C:{c:'#d97706',t:'C'},
    N:{c:'#6b7280',t:'N'}
  };

  const m = map[lv] || map.N;

  return `<span style="color:${m.c};font-weight:700">${m.t}</span>`;
}

// 個人分析模組
function openUserDetail(userId){

  if (!window._yearRaw?.allAssignments?.length){
    alert('資料尚未載入完成');
    return;
  }

  const all = window._yearData || [];
  const p = all.find(x => String(x.user_id) === String(userId));
  if (!p) return;

  document.getElementById('userModal').classList.remove('hidden');

  // =========================
  // ✅ 年度資料
  // =========================
  const total = p.attendance ?? 0;
  const completed = p.completed ?? 0;
  const late = p.late ?? 0;
  const no_show = p.no_show ?? 0;

  // ✅ 年度出勤品質
  // ✅ 表現品質（不含缺席）
  const yearValid = completed + late;
  const yearQuality = yearValid
    ? Math.round((completed / yearValid) * 100)
    : 0;
  
  // ✅ ✅ ✅ 出勤品質（含缺席）🔥
  const yearAttendanceQuality =
    (completed + late + no_show)
      ? Math.round((completed / (completed + late + no_show)) * 100)
      : 0;


  // =========================
  // ✅ ✅ ✅ 生涯計算（唯一標準🔥）
  // =========================
  let career_completed = 0;
  let career_late = 0;
  let career_no_show = 0;

  const roleCareer = {};

  const allAssign = window._yearRaw.allAssignments || [];

  allAssign.forEach(g => {

    (g.list || []).forEach(a => {

      if (String(a.user_id) !== String(userId)) return;

      if (a.status === 'completed'){
        career_completed++;
      }

      if (a.status === 'late'){
        career_late++;
      }

      if (a.status === 'no_show'){
        career_no_show++;
      }

      // ✅ ✅ ✅ 角色只算有效
      if (a.status === 'completed' || a.status === 'late'){

        if (!roleCareer[a.role]) roleCareer[a.role] = 0;
        roleCareer[a.role]++;

      }

    });

  });

  const career_total = career_completed + career_late;

  // ✅ ✅ ✅ 生涯品質（新增🔥）
  const careerQuality = career_total
    ? Math.round((career_completed / career_total) * 100)
    : 0;

  /* =========================
     ✅ 角色表
  ========================= */
  const roleTableHTML = (()=>{

    const roleCount = p.role_count || {};
    const roleCompleted = p.role_completed || {};

    const roles = Object.keys(roleCount);

    if (!roles.length){
      return '<div class="empty">無角色資料</div>';
    }

    let html = `
      <table class="mini-table">
        <thead>
          <tr>
            <th>角色</th>
            <th>年度</th>
            <th>生涯</th>
          </tr>
        </thead>
        <tbody>
    `;

    roles.forEach(r=>{

      const total = roleCount[r] || 0;
      const done  = roleCompleted[r] || 0;
      const career = roleCareer[r] || 0;

      html += `
        <tr>
          <td>${mapRole(r)}</td>
          <td>
            <span style="font-weight:700;color:#111;">
              ${done} / ${total}
            </span>
          </td>
          <td>${career}</td>
        </tr>
      `;
    });

    html += '</tbody></table>';

    return html;
  })();

  // ✅ 穩定標記
  const stable =
    no_show === 0 && completed >= 10 ? '🔥 穩定' : '';

  /* =========================
     ✅ UI
  ========================= */
  document.getElementById('userContent').innerHTML = `
    <div style="padding:12px;">

      <h3 style="margin-bottom:6px;">
        ${p.name} ${stable}
      </h3>

      <div style="color:#666;margin-bottom:14px;">
        聯盟等級：${renderLevel(p.league_level)}
      </div>

      <div class="stat-grid">

        ${card('經驗值', fmt(p.score_total))}
        ${card('年度出勤', total)}
        ${card('生涯品質', careerQuality + '%')}
        ${card('出勤穩定度', yearAttendanceQuality + '%')}


      </div>

      <hr style="margin:14px 0;">

      <table class="mini-table">
        <thead>
          <tr>
            <th></th>
            <th>完成</th>
            <th>遲到</th>
            <th>缺席</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>年度</td>
            <td>${completed}</td>
            <td>${late}</td>
            <td>${no_show}</td>
          </tr>
          <tr>
            <td>生涯</td>
            <td>${career_completed}</td>
            <td>${career_late}</td>
            <td>${career_no_show}</td>
          </tr>
        </tbody>
      </table>

      <hr style="margin:14px 0;">

      <h4>📊 各角色分布（生涯）</h4>
        ${roleTableHTML}

      <canvas id="roleChart" width="380" height="260"></canvas>

    </div>
  `;

  // ✅ ✅ ✅ 圖表統一
  drawRoleChart(roleCareer);
}



// 畫圓餅圖
function drawRoleChart(data){

  const canvas = document.getElementById('roleChart');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const values = Object.values(data);
  // const labels = Object.keys(data);
  const labels = Object.keys(data).map(mapRole);
  const rawKeys = Object.keys(data);

  const total = values.reduce((a,b)=>a+b, 0);

  if (!total){
    ctx.font = "14px sans-serif";
    ctx.fillText('無資料', 90, 130);
    return;
  }

  const colorMap = {
    '主審':'#2563eb',
    '一壘審':'#16a34a',
    '二壘審':'#f59e0b',
    '三壘審':'#dc2626',
    '紀錄員':'#9333ea',
    '影像紀錄員':'#0ea5e9',
    '實習紀錄員':'#6b7280'
  };

  let start = 0;

  // ✅ 圓餅
  values.forEach((v,i)=>{

    const slice = (v/total) * Math.PI * 2;

    ctx.beginPath();
    ctx.moveTo(110,130);
    ctx.arc(110,130,90, start, start+slice);
    ctx.closePath();

    const roleName = mapRole(rawKeys[i]);
    const color = colorMap[roleName] || '#999';

    ctx.fillStyle = color;
    ctx.fill();

    start += slice;
  });

  // ✅ ✅ 中心數（只畫一次）
  ctx.fillStyle = "#111";
  ctx.font = "bold 16px sans-serif";
  ctx.fillText(total + '場', 90, 135);

  // ✅ 圖例
  ctx.font = "13px sans-serif";

  labels.forEach((l,i)=>{

    const count = data[l];
    const percent = Math.round((count/total) * 100);

    const y = 60 + i * 26;

    const color = colorMap[l] || '#999';


    // ✅ ① 先畫色塊
    ctx.fillStyle = color;
    ctx.fillRect(210, y, 12, 12);
  
    // ✅ ② 再畫文字（蓋在上面）
    ctx.fillStyle = "#333";
    ctx.font = "13px sans-serif";

    // 調整圖示文字位置
    ctx.fillText(
      `${l}  ${count} (${percent}%)`,
       230,
      y + 10
    );

  });
}

// 英文代碼中文化
function mapRole(role){

  const m = {
    PU:'主審',
    U1:'一壘審',
    U2:'二壘審',
    U3:'三壘審',
    REC_MAIN:'紀錄員',
    REC_VIDEO:'影像紀錄員',
    REC_TRAINEE:'實習紀錄員'
  };

  return m[role] || role;
}

// 卡片美化用
function card(label, value){
  return `
    <div class="stat-card">
      <div class="stat-title">${label}</div>
      <div class="stat-value">${value}</div>
    </div>
  `;
}

// 補賽
function reopenGame(gameId){

  if (!confirm('確定要重新開放此場比賽（補賽）？')) return;

  toast('補賽開啟中...','loading');

  callApi({
    action:'reopenGame',
    game_id:gameId
  }, res=>{

    console.log('reopenGame result =', res);  // ✅ 🔥 debug用

    if (!res){
      toast('❌ API 無回應','error');
      return;
    }

    if (res.result === 'ok'){
      toast('✅ 已開放補賽，可重新指派');
      load();
      return;
    }

    // ✅ ✅ ✅ 🔥 顯示後端錯誤訊息（關鍵）
    toast(res.message || '❌ 補賽失敗','error');

  });
}


// 延賽
function setGameHold(gameId){

  if (!confirm('確定要將本場設為延賽？')) return;

  toast('更新中...','loading');

  callApi({
    action:'setGameStatus',
    game_id:gameId,
    status:1   // hold
  }, res=>{
    if (res.result === 'ok'){
      toast('✅ 已延賽');
      load();
    }else{
      toast('❌ 失敗','error');
    }
  });
}
