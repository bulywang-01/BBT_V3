<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤管理系統</title>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
 
<style>

body{
  font-family: system-ui;
  background:#f5f6f8;
  margin:0;
}

.main{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.game-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.game-title{
  font-weight:800;
}

.btn-complete-all{
  margin-left:10px;
  background:#16a34a;
  color:#fff;
  border:none;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* =========================
   人員卡
========================= */
.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;

  padding:10px;
  margin-bottom:6px;
  border-radius:10px;
  border-bottom:1px dashed #ddd;

  transition:all .2s ease;
}

.person:last-child{
  border-bottom:none;
}

.person:hover{
  background:#f9fafb;
}

/* 狀態底色 */
.person.completed{ background:#ecfdf5; }
.person.no_show{ background:#fef2f2; }
.person.late{ background:#fffbeb; }

/* 替補左側線 */
.person.replacement{
  border-left:4px solid #6366f1;
}

/* =========================
   左側資訊
========================= */
.info{
  min-width:160px;
}

.info-line{
  font-size:14px;
  font-weight:500;
}

.role{ font-weight:700; }

/* =========================
   操作區
========================= */
.actions-box{
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
}

.select-user{
  padding:4px;
  border-radius:6px;
}

/* =========================
   按鈕
========================= */
.btn{
  padding:4px 10px;
  border:none;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  color:#fff;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-ok{background:#16a34a;}
.btn-no{background:#dc2626;}
.btn-late{background:#f59e0b;}
.btn-assign{background:#3b82f6;}
.btn-replace{background:#4f46e5;}

/* =========================
   標籤（重點）
========================= */
.tag{
  display:inline-block;
  padding:2px 8px;
  border-radius:10px;
  font-size:12px;
  margin-left:4px;
}

.tag-ok{
  background:#16a34a;
  color:#fff;
}

.tag-late{
  background:#f59e0b;
  color:#fff;
}

.tag-no{
  background:#dc2626;
  color:#fff;
}

.tag-replace{
  background:#4f46e5;
  color:#fff;
}

/* =========================
   小狀態字
========================= */
.status-mini{
  font-weight:700;
  margin-left:4px;
}

/* =========================
   Tabs
========================= */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tab{
  padding:8px 14px;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
}

/* =========================
   空資料
========================= */
.empty{
  text-align:center;
  color:#999;
  padding:40px;
}

/* =========================
   RWD
========================= */
@media(max-width:600px){
  .person{
    flex-direction:column;
    align-items:flex-start;
  }
}
 
</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

  <div class="header-bar">
    <h2>✅ 出勤管理</h2>
  
    <button class="btn-create"
      onclick="runAutoAssign()">
      ⚙️ 建立出勤
    </button>
    <button onclick="loadYearly()">
      📊 年度統計
    </button>
    <button class="btn-recalc"
      onclick="recalcScore()">
      🔄 重算分數
    </button>
  </div>

  <div id="list"></div>
</div>

<script>
  let userList = [];
  
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
    loadUsers();
  });
  
  /* ========================
     Header
  ======================== */
/*
 function loadHeader(){
    fetch('header.html')
      .then(r=>r.text())
      .then(html=>{
        document.getElementById('header-container').innerHTML = html;
      });
  }
  */

  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
 
  /* ========================
     Users
  ======================== */
function loadUsers(){
  callApi({action:'getUsers'}, res=>{

    if(!res){
      toast('API 無回應','error');
      return;
    }

    if(res.result !== 'ok'){
      toast('讀取使用者失敗','error');
      return;
    }

    userList = res.users || [];
    load();
    console.log(userList);
  });
}

 // 只顯示已完賽
function isGameReady(g){

  if (!g) return false;

  const gameDate = new Date(g.date);
  if (isNaN(gameDate)) return false;

  const today = new Date();

  today.setHours(0,0,0,0);
  gameDate.setHours(0,0,0,0);

  const isPast = gameDate < today;

  const status = String(g.status || '').toLowerCase();

  return isPast && (
    status === '0' ||
    status === 'completed' ||
    status === ''
  );
}
 
/* ========================
   主載入
 ======================== */

  
  /* ========================
     Render 核心程式
  ======================== */
let currentTab = 'pending';

function render(list){

  const el = document.getElementById('list');

  if (!list.length){
    el.innerHTML = '<div class="empty">目前沒有出勤資料</div>';
    return;
  }

  const pending = list.filter(g => !isGameCompleted(g));
  const done = list.filter(g => isGameCompleted(g));

  const data = currentTab === 'pending' ? pending : done;

  el.innerHTML = `
    <div class="tabs">
      <div class="tab ${currentTab==='pending'?'active':''}"
           onclick="switchTab('pending')">
        🔴 未完成 (${pending.length})
      </div>

      <div class="tab ${currentTab==='done'?'active':''}"
           onclick="switchTab('done')">
        ✅ 已完成 (${done.length})
      </div>
    </div>

    ${data.map(renderGame).join('')}
  `;
}

function switchTab(t){
  currentTab = t;
  load();
}



   /* ========================
     收合功能
  ======================== */
  function toggleDone(){
   const el = document.getElementById('doneSection');
   el.style.display = el.style.display === 'none' ? 'block' : 'none';
 }
  
  /* ========================
     下拉選單
  ======================== */
  function renderUserSelect(p){
  
    return `
      <select data-id="${p.assignment_id}">
        <option value="">--換人--</option>
        ${userList.map(u=>
          `<option value="${u.user_id}">
            ${u.name} ${u.note ? '('+u.note+')' : ''}
          </option>`
        ).join('')}
      </select>
    `;
  }

// 主入口
function load(){

  const el = document.getElementById('list');

  el.innerHTML = `<div class="empty">⏳ 資料載入中...</div>`;

  callApi({action:'getAssignments'}, res=>{

    if(!res || !res.data){
      el.innerHTML = `<div class="empty">❌ 讀取失敗</div>`;
      return;
    }

    const games = res.data;

    // ✅ ✅ ✅ 重點：
    const data = games.filter(g => isGameReady(g));

    // ✅ ✅ ✅ 用分頁 render（不要再組 html）
    render(data);

  });
}

// 每場 render，替補＋鎖定＋更正＋顏色
function renderGame(g){

  return `
    <div class="game-card" data-game-id="${g.game_id}">

      <div class="game-title">
        📅 ${g.date} ｜ ${g.game_code || ''} ｜ ${g.field || ''}

        <button class="btn-complete-all"
          onclick="completeGame('${g.game_id}')">
          ✅ 整場完成
        </button>
      </div>

      ${renderGroup(g)}

    </div>
  `;
}


// 替補一定在原人下面
function renderGroup(g){

  const list = g.list || [];

  // ✅ 分 role
  const roleMap = {};

  list.forEach(p=>{
    if (!roleMap[p.role]) roleMap[p.role] = [];
    roleMap[p.role].push(p);
  });

  let html = '';

  Object.keys(roleMap).forEach(role=>{

    const rows = roleMap[role];

    // ✅ 原人 / 替補
    const main = rows.filter(x => x.is_replacement != 1);
    const repl = rows.filter(x => x.is_replacement == 1);

    main.forEach(p=>{

      html += renderRow(p, g);

      // ✅ ✅ ✅ 🔥 替補強制接在下面
      repl.forEach(r=>{
        html += renderRow(r, g, true);
      });

    });

  });

  return html;
}

 
// ✅ 共用 render row（避免重複）
function renderRow(p, g, isReplacement=false){

  const list = g.list || [];

  const hasNoShow = list.some(x =>
    x.role === p.role && x.status === 'no_show'
  );

  const hasReplacement = list.some(x =>
    x.role === p.role && Number(x.is_replacement) === 1
  );

  const canAssign = !hasNoShow;

  const rowDone = p.status === 'completed';
  const hasUser = !!p.name;

  const usedUserIds = list.map(x => String(x.user_id || ''));

  const replaceTag = p.is_replacement == 1
    ? '<span class="tag tag-replace">補</span>'
    : '';

  const statusTag = {
    completed:'<span class="tag tag-ok">完成</span>',
    late:'<span class="tag tag-late">遲</span>',
    no_show:'<span class="tag tag-no">缺</span>',
    scheduled:''
  };

  return `
    <div class="person ${p.status} ${isReplacement ? 'replacement' : ''}"
         data-id="${p.assignment_id}"
         data-role="${p.role}">

      <div class="info">
        <div class="info-line">
          ${getRoleText(p.role)} ${replaceTag}
          ｜ ${p.name || '（待位）'}
          ｜ ${
            hasUser
              ? `<span class="status-mini">${statusTag[p.status] || ''}</span>`
              : getStatusText(p.status)
          }
        </div>
      </div>

      <div class="actions-box">

        ${ rowDone ? `
          <button onclick="unlock('${p.assignment_id}')">✏️ 更正</button>
        ` : `
          <button class="btn btn-ok"
            onclick="updateStatus('${p.assignment_id}','completed',this)">完成</button>

          <button class="btn btn-late"
            onclick="updateStatus('${p.assignment_id}','late',this)">遲到</button>

          <button class="btn btn-no"
            onclick="updateStatus('${p.assignment_id}','no_show',this)">缺席</button>

          ${canAssign ? `
            <button class="btn btn-assign"
              onclick="quickAssign('${p.assignment_id}', this)">指派</button>
          `:''}

          ${hasNoShow ? `
            <button class="btn btn-replace"
              ${hasReplacement ? 'disabled style="opacity:.4;cursor:not-allowed;"' : ''}
              onclick="quickReplace('${g.game_id}','${p.role}', this)">
              替補
            </button>
          `:''}

          <select class="select-user">
            <option value="">選擇人員</option>
            ${
              userList
                .filter(u => !usedUserIds.includes(String(u.user_id)))
                .map(u =>
                  `<option value="${u.user_id}">
                    ${u.name || u.username}
                  </option>`
                ).join('')
            }
          </select>
        `}
      </div>
    </div>
  `;
}

  
  /* ========================
     更新狀態
  ======================== */
  function updateStatus(id, status, btn){
  
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;
  
    const textMap = {
      completed:'完成',
      no_show:'缺席',
      late:'遲到'
    };
  
    toast(`更新「${textMap[status]}」中...`,'loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      status:status
    }, res=>{
  
      // ✅ 🔥 先清 loading
      toast('', 'ok'); 
  


     if (res && res.result === 'ok'){
     
       toast(`✅ 已標記：${textMap[status]}`);
     
       updateRowUI(id, status);
     
       // ✅ ✅ ✅ 🔥 如果是 no_show，要刷新（讓補出現）
       if (status === 'no_show'){
         setTimeout(load, 0);
       }
     }
      else{
        toast(res.message || '更新失敗','error');
        if (btn) btn.disabled = false;
      }
  
    });
  }
  
  /* ========================
     ✅ Toast通知（關鍵）
  ======================== */
  let currentToast = null;
  
  function toast(msg,type='ok'){
  
    // ✅ 清掉舊的
    if (currentToast){
      currentToast.remove();
      currentToast = null;
    }
  
    const div = document.createElement('div');
  
    const colorMap = {
      ok:'#16a34a',
      error:'#dc2626',
      warn:'#f59e0b',
      loading:'#374151'
    };
  
    div.innerHTML = msg;
  
    div.style = `
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:${colorMap[type]};
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      z-index:9999;
      font-size:14px;
    `;
  
    document.body.appendChild(div);
    currentToast = div;
  
    // ✅ loading 不自動消失
    if (type !== 'loading'){
      setTimeout(()=>{
        if (div === currentToast){
          div.remove();
          currentToast = null;
        }
      },1500);
    }
  }

  /* ========================
     ✅ 異動出勤狀態，解鎖按鍵
  ======================== */
 function unlock(id){

  if (!confirm('確定要更正這筆出勤狀態？')) return;

  toast('解鎖中...','loading');

  callApi({
    action:'updateAssignment',
    assignment_id:id,
    status:'scheduled'
  }, res => {

    if (res.result === 'ok'){
      toast('✅ 已解鎖，可重新編輯');
      load();
    }else{
      toast(res.message || '解鎖失敗','error');
    }

  });
}

// 替補時「原人自動 no_show」
 function autoNoShow(gameId, role){

  callApi({
    action:'autoNoShow',
    game_id:gameId,
    role:role
  });
}

// 判斷是否已完成
function isGameCompleted(g){

  const roleDone = {};

  g.list.forEach(p=>{
    if (p.status === 'completed'){
      roleDone[p.role] = true;
    }
  });

  const roleCount = new Set(g.list.map(x=>x.role)).size;

  return Object.keys(roleDone).length === roleCount;
}


// 狀態中文化
function getStatusText(s){

  const map = {
    scheduled:'待確認',
    completed:'已完成',
    late:'遲到',
    no_show:'缺席'
  };

  return map[s] || s;
}


function getRoleText(role){

  const map = {
    PU:'主審',
    U1:'一壘審',
    U2:'二壘審',
    U3:'三壘審',
    REC_MAIN:'紀錄員',
    REC_TRAINEE:'實習紀錄員',
    REC_VIDEO:'影像紀錄員'
  };

  return map[role] || role;
}

// 狀態 badge
function getStatusBadge(s){

  const map = {
    completed:'<span class="badge done">已完成</span>',
    no_show:'<span class="badge no">缺席</span>',
    late:'<span class="badge late">遲到</span>',
    scheduled:'<span class="badge">待確認</span>'
  };

  return map[s] || '';
}

// 快速指派
function quickAssign(id, btn){

  const row = btn.closest('.person');
  const select = row.querySelector('.select-user');

  const uid = select.value;

  if (!uid){
    toast('請先選人','warn');
    return;
  }

  callApi({
    action:'updateAssignment',
    assignment_id:id,
    user_id:uid,
    source:'assign'
  }, ()=>{
    toast('✅ 已指派');
    load();
  });
}

/* ========================
   快速替補（最終穩定版）
======================== */
function quickReplace(gameId, role, btn){

  const row = btn.closest('.person');
  const select = row.querySelector('.select-user');
  const uid = select?.value;

  if (!uid){
    toast('請先選替補人員','warn');
    return;
  }

  toast('新增替補中...','loading');

  callApi({
    action:'addReplacement',
    game_id:gameId,
    role:role,
    user_id:uid
  }, (res)=>{

    if(!res){
      toast('API 無回應','error');
      return;
    }

    if(res.result !== 'ok'){
      toast(res.message || '新增失敗','error');
      return;
    }

    autoNoShow(gameId, role);

    toast('✅ 替補成功');
    load();
  });
}


// 判斷是否有遲到，才能遞補
function checkRoleNoShow(gameId, role){

  const card = document.querySelector(`[data-game-id="${gameId}"]`);
  if (!card) return false;

  const rows = card.querySelectorAll('.person');

  for (let r of rows){

    if (
      r.getAttribute('data-role') === role &&
      r.classList.contains('no_show')
    ){
      return true;
    }
  }

  return false;
}


// 一鍵整場完成
function completeGame(gameId){

  if(!confirm('確定將本場全部標記為完成？')) return;

  toast('整場處理中...','loading');

  callApi({
    action:'completeGame',
    game_id:gameId
  }, res=>{

    if(res.result==='ok'){
      toast('✅ 本場已全部完成');
      load();
    }else{
      toast('❌ 處理失敗','error');
    }

  });
}


//
function updateRowUI(id, status){

  const row = document.querySelector(`[data-id="${id}"]`);
  if (!row) return;

  // ✅ 更新顏色
  row.classList.remove('completed','no_show','late','scheduled');
  row.classList.add(status);

  // ✅ ✅ ✅ 🔥 更新狀態文字（你現在缺這行）
  const statusEl = row.querySelector('.status');
  if (statusEl){
    statusEl.innerHTML = getStatusText(status);
  }

  // ✅ 如果變回 scheduled → 重新開啟按鈕
  if (status !== 'completed'){
    const actions = row.querySelector('.actions-box');
    if (actions && actions.innerHTML.includes('更正')){
      setTimeout(()=>{
        load();   // ✅ 保證回復完整UI
      },100);
    }
  }

  // ✅ ✅ ✅ 🔥 如果完成 → 切換為鎖定UI
  if (status === 'completed'){

    const actions = row.querySelector('.actions-box');

    if (actions){
      actions.innerHTML = `
        <button onclick="unlock('${id}')">
          ✏️ 更正
        </button>
      `;
    }
  }
}

// 一鍵重新計算分數
function recalcScore(){

  if(!confirm('確定重新計算所有分數？')) return;

  const btn = document.querySelector('.btn-recalc');
  if (btn) btn.disabled = true;

  toast('分數計算中...','loading');

  callApi({action:'recalcAllScores'}, res=>{

    if (!res || res.result !== 'ok'){
      toast('❌ 計算失敗','error');
    }else{

      toast(`✅ 分數已更新（${res.users_updated || 0}人）`);
    }

    if (btn) btn.disabled = false;
  });
}

// 建立出勤資料
function runAutoAssign(){

  if(!confirm('建立尚未產生的出勤資料？')) return;

  toast('建立中...','loading');

  callApi({action:'autoCreateAssignment'}, res=>{

    if (res.result === 'ok'){
      toast(`✅ 已建立 ${res.created} 筆`);
      load();
    }else{
      toast('❌ 建立失敗','error');
    }

  });
}

// 年度統計
function loadYearly(){

  const year = new Date().getFullYear();

  toast('統計中...','loading');

  callApi({
    action:'getYearlyExperience',
    year:year
  }, res=>{


   if (!res || res.result !== 'ok'){
     toast('❌ API錯誤','error');
     return;
   }

    console.table(res.data); // ✅ 先用console看
    toast('✅ 完成，請看 console');
  });
}

</script>

</body>
