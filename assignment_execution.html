<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤管理系統</title>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
 
<style>

body{
  font-family: system-ui;
  background:#f5f6f8;
  margin:0;
}

.main{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.game-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.game-title{
  font-weight:800;
  margin-bottom:10px;
}

.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #ddd;
}

.person:last-child{ border-bottom:none; }

.role{ font-weight:700; }

.name{
  font-size:14px;
  color:#374151;
}

.actions button{
  margin-left:6px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.btn-ok{ background:#16a34a;color:#fff;}
.btn-no{ background:#dc2626;color:#fff;}
.btn-late{ background:#f59e0b;color:#fff;}
.btn-change{ background:#3b82f6;color:#fff;}

.completed{ background:#ecfdf5;}
.no_show{ background:#fef2f2;}
.late{ background:#fffbeb;}
.cancelled{ background:#f3f4f6;opacity:.7;}

.empty{
  text-align:center;
  color:#999;
  padding:40px;
}

select{
  margin-left:6px;
  padding:4px;
  border-radius:6px;
}


.person.replacement {
  border-left: 4px solid #3b82f6;
}
</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">
  <h2>✅ 出勤管理</h2>
  <div id="list"></div>
</div>

<script>
  let userList = [];
  
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
    loadUsers();
  });
  
  /* ========================
     Header
  ======================== */
  function loadHeader(){
    fetch('header.html')
      .then(r=>r.text())
      .then(html=>{
        document.getElementById('header-container').innerHTML = html;
      });
  }
  
  /* ========================
     Users
  ======================== */
  function loadUsers(){
    callApi({action:'getUsers'}, res=>{
  
      if(res.result !== 'ok'){
        toast('讀取使用者失敗','error');
        return;
      }
  
      userList = res.users || [];
      load();
    });
  }
  
  /* ========================
     主載入
  ======================== */
  function load(){
  
    callApi({action:'getAssignmentsByDate'}, res=>{
  
      if(res.result !== 'ok'){
        document.getElementById('list').innerHTML =
          '<div class="empty">資料讀取失敗</div>';
        toast(res.message || '讀取失敗','error');
        return;
      }
  
      render(res.games || []);
    });
  }
  
  /* ========================
     Render 核心程式
  ======================== */
  function render(list){
  
    const el = document.getElementById('list');
  
    if (!list.length){
      el.innerHTML = '<div class="empty">目前沒有出勤資料</div>';
      return;
    }
  
    // ✅ ✅ ✅ 分組（關鍵）
    const pending = list.filter(g =>
      g.members.some(p => p.status !== 'completed')
    );
  
    const done = list.filter(g =>
      g.members.every(p => p.status === 'completed')
    );
  
    let html = '';
  
    // ✅ 未完成
    html += `<h3 style="margin:10px 0;">🔴 未完成</h3>`;
    html += pending.map(renderGame).join('');
  
    // ✅ 已完成（可收合）
    html += `
      <h3 style="margin:20px 0 10px;cursor:pointer;"
          onclick="toggleDone()">
        ✅ 已完成（${done.length}場）
      </h3>
      <div id="doneSection" style="display:none;">
        ${done.map(renderGame).join('')}
      </div>
    `;
  
    el.innerHTML = html;
  }


   /* ========================
     收合功能
  ======================== */
  function toggleDone(){
   const el = document.getElementById('doneSection');
   el.style.display = el.style.display === 'none' ? 'block' : 'none';
 }
  
  /* ========================
     下拉選單
  ======================== */
  function renderUserSelect(p){
  
    return `
      <select data-id="${p.assignment_id}">
        <option value="">--換人--</option>
        ${userList.map(u=>
          `<option value="${u.user_id}">
            ${u.name} ${u.note ? '('+u.note+')' : ''}
          </option>`
        ).join('')}
      </select>
    `;
  }

  /* ========================
     替補
  ======================== */
function addReplacement(gameId, role, btn){

  const select = btn.parentNode.querySelector('.replacement-select');
  const uid = select.value;

  if (!uid){
    toast('請選擇替補人員','warn');
    return;
  }

  toast('新增替補中...','loading');

  callApi({
    action:'addReplacement',
    game_id:gameId,
    role:role,
    user_id:uid
  }, res=>{

    if(res.result==='ok'){
      toast('✅ 已新增替補');

      // ✅ ✅ ✅ 🔥 自動處理原人（這個很重要）
      autoNoShow(gameId, role);

      load();
    }else{
      toast('新增失敗','error');
    }

  });
}


  /* ========================
     每場 render，替補＋鎖定＋更正＋顏色
  ======================== */
  function renderGame(g){
  
    return `
      <div class="game-card">
  
        <div class="game-title">
          📅 ${g.date}｜${g.game_code}｜${g.field}
        </div>
  
        ${g.members.map(p => {
  
          const isDone = p.status === 'completed';
  
          return `
            <div class="person ${p.status || ''} ${p.is_replacement ? 'replacement' : ''}">
  
              <div>
                <div class="role">
                  ${p.role}
                  ${p.is_replacement ? ' <span style="color:#2563eb;">(替補)</span>' : ''}
                </div>
  
                <div class="name">
                  ${p.name || '（待位中）'}
                </div>
  
                <div style="font-size:12px;color:#888;">
                  ${p.status}
                </div>
              </div>
  
              <div>
  
                ${!isDone ? renderUserSelect(p) : ''}
  
                ${!isDone ? `
                  <button class="btn-change"
                    onclick="changeUser('${p.assignment_id}', this)">
                    指派
                  </button>
                ` : `
                  <button onclick="unlock('${p.assignment_id}')">
                    ✏️ 更正
                  </button>
                `}
  
                <div class="actions" style="display:inline-block;">
  
                  <button ${isDone?'disabled':''}
                    class="btn-ok"
                    onclick="updateStatus('${p.assignment_id}','completed',this)">✅</button>
  
                  <button ${isDone?'disabled':''}
                    class="btn-no"
                    onclick="updateStatus('${p.assignment_id}','no_show',this)">❌</button>
  
                  <button ${isDone?'disabled':''}
                    class="btn-late"
                    onclick="updateStatus('${p.assignment_id}','late',this)">⏱</button>
  
                </div>
  
                <!-- ✅ 替補按鈕 -->
                <select class="replacement-select">
                  <option value="">替補人員</option>
                  ${userList.map(u=>
                    `<option value="${u.user_id}">
                      ${u.name} ${u.note ? '('+u.note+')' : ''}
                    </option>`
                  ).join('')}
                </select>
                
                <button 
                  onclick="addReplacement('${g.game_id}','${p.role}', this)">
                  ➕ 替補
                </button>
  
              </div>
  
            </div>
          `;
        }).join('')}
  
      </div>
    `;
  }
   
  /* ========================
     指派人員
  ======================== */
  function changeUser(id, btn){
  
    const select = btn.parentNode.querySelector('select');
    const uid = select.value;
  
    if (!uid){
      toast('請選擇人員','warn');
      return;
    }
  
    toast('指派中...','loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      user_id:uid,
      status:'scheduled'
    }, res=>{
  
      if(res.result==='ok'){
        toast('✅ 指派成功');
        load();
      }else{
        toast(res.message || '指派失敗','error');
      }
  
    });
  }
  
  /* ========================
     更新狀態
  ======================== */
  function updateStatus(id, status, btn){
  
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;
  
    const textMap = {
      completed:'完成',
      no_show:'缺席',
      late:'遲到'
    };
  
    toast(`更新「${textMap[status]}」中...`,'loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      status:status
    }, res=>{
  
      // ✅ 🔥 先清 loading
      toast('', 'ok'); 
  
      if(res.result==='ok'){
        toast(`✅ 已標記：${textMap[status]}`);
        load();
      }else{
        toast(res.message || '更新失敗','error');
        if (btn) btn.disabled = false;
      }
  
    });
  }
  
  /* ========================
     ✅ Toast通知（關鍵）
  ======================== */
  let currentToast = null;
  
  function toast(msg,type='ok'){
  
    // ✅ 清掉舊的
    if (currentToast){
      currentToast.remove();
      currentToast = null;
    }
  
    const div = document.createElement('div');
  
    const colorMap = {
      ok:'#16a34a',
      error:'#dc2626',
      warn:'#f59e0b',
      loading:'#374151'
    };
  
    div.innerHTML = msg;
  
    div.style = `
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:${colorMap[type]};
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      z-index:9999;
      font-size:14px;
    `;
  
    document.body.appendChild(div);
    currentToast = div;
  
    // ✅ loading 不自動消失
    if (type !== 'loading'){
      setTimeout(()=>{
        if (div === currentToast){
          div.remove();
          currentToast = null;
        }
      },1500);
    }
  }

  /* ========================
     ✅ 異動出勤狀態，解鎖按鍵
  ======================== */
 function unlock(id){

  if (!confirm('確定要更正這筆出勤狀態？')) return;

  toast('解鎖中...','loading');

  callApi({
    action:'updateAssignment',
    assignment_id:id,
    status:'scheduled'
  }, res => {

    if (res.result === 'ok'){
      toast('✅ 已解鎖，可重新編輯');
      load();
    }else{
      toast(res.message || '解鎖失敗','error');
    }

  });
}

// 替補時「原人自動 no_show」
 function autoNoShow(gameId, role){

  callApi({
    action:'autoNoShow',
    game_id:gameId,
    role:role
  });
}
</script>

</body>
</html>
