<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤管理系統</title>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>

<style>

body{
  font-family: system-ui;
  background:#f5f6f8;
  margin:0;
}

.main{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.game-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.game-title{
  font-weight:800;
  margin-bottom:10px;
}

.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #ddd;
}

.person:last-child{ border-bottom:none; }

.role{ font-weight:700; }

.name{
  font-size:14px;
  color:#374151;
}

.actions button{
  margin-left:6px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.btn-ok{ background:#16a34a;color:#fff;}
.btn-no{ background:#dc2626;color:#fff;}
.btn-late{ background:#f59e0b;color:#fff;}
.btn-change{ background:#3b82f6;color:#fff;}

.completed{ background:#ecfdf5;}
.no_show{ background:#fef2f2;}
.late{ background:#fffbeb;}
.cancelled{ background:#f3f4f6;opacity:.7;}

.empty{
  text-align:center;
  color:#999;
  padding:40px;
}

select{
  margin-left:6px;
  padding:4px;
  border-radius:6px;
}

</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">
  <h2>✅ 出勤管理</h2>
  <div id="list"></div>
</div>

<script>
  let userList = [];
  
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
    loadUsers();
  });
  
  /* ========================
     Header
  ======================== */
  function loadHeader(){
    fetch('header.html')
      .then(r=>r.text())
      .then(html=>{
        document.getElementById('header-container').innerHTML = html;
      });
  }
  
  /* ========================
     Users
  ======================== */
  function loadUsers(){
    callApi({action:'getUsers'}, res=>{
  
      if(res.result !== 'ok'){
        toast('讀取使用者失敗','error');
        return;
      }
  
      userList = res.users || [];
      load();
    });
  }
  
  /* ========================
     主載入
  ======================== */
  function load(){
  
    callApi({action:'getAssignmentsByDate'}, res=>{
  
      if(res.result !== 'ok'){
        document.getElementById('list').innerHTML =
          '<div class="empty">資料讀取失敗</div>';
        toast(res.message || '讀取失敗','error');
        return;
      }
  
      render(res.games || []);
    });
  }
  
  /* ========================
     Render
  ======================== */
  function render(list){
  
    const el = document.getElementById('list');
  
    if (!list.length){
      el.innerHTML = '<div class="empty">目前沒有出勤資料</div>';
      return;
    }
  
    el.innerHTML = list.map(g=>`
  
      <div class="game-card">
  
        <div class="game-title">
          📅 ${g.date}｜${g.game_code}｜${g.field}
        </div>
  
        ${
          (!g.members || !g.members.length)
          ? `<div style="color:#aaa;">尚未安排人員</div>`
          : g.members.map(p=>`
  
            <div class="person ${p.status || ''}">
  
              <div>
                <div class="role">${p.role}</div>
                <div class="name">${p.name || '（待位中）'}</div>
                <div style="font-size:12px;color:#888;">
                  狀態：${p.status || 'scheduled'}
                </div>
              </div>
  
              <div>
  
                ${renderUserSelect(p)}
  
                <button class="btn-change"
                  onclick="changeUser('${p.assignment_id}', this)">
                  指派
                </button>
  
                <div class="actions" style="display:inline-block;">
  
                  <button class="btn-ok"
                    onclick="updateStatus('${p.assignment_id}','completed')", this>
                    ✅
                  </button>
  
                  <button class="btn-no"
                    onclick="updateStatus('${p.assignment_id}','no_show')", this>
                    ❌
                  </button>
  
                  <button class="btn-late"
                    onclick="updateStatus('${p.assignment_id}','late')", this>
                    ⏱
                  </button>
  
                </div>
  
              </div>
  
            </div>
  
          `).join('')
        }
  
      </div>
  
    `).join('');
  }
  
  /* ========================
     下拉選單
  ======================== */
  function renderUserSelect(p){
  
    return `
      <select data-id="${p.assignment_id}">
        <option value="">--換人--</option>
        ${userList.map(u=>
          `<option value="${u.user_id}">
            ${u.name} ${u.note ? '('+u.note+')' : ''}
          </option>`
        ).join('')}
      </select>
    `;
  }
  
  /* ========================
     指派人員
  ======================== */
  function changeUser(id, btn){
  
    const select = btn.parentNode.querySelector('select');
    const uid = select.value;
  
    if (!uid){
      toast('請選擇人員','warn');
      return;
    }
  
    toast('指派中...','loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      user_id:uid,
      status:'scheduled'
    }, res=>{
  
      if(res.result==='ok'){
        toast('✅ 指派成功');
        load();
      }else{
        toast(res.message || '指派失敗','error');
      }
  
    });
  }
  
  /* ========================
     更新狀態
  ======================== */
  function updateStatus(id, status, btn){
  
    // ✅ 防重點
    if (btn && btn.disabled) return;
  
    if (btn) btn.disabled = true;
  
    const textMap = {
      completed:'完成',
      no_show:'缺席',
      late:'遲到'
    };
  
    toast(`更新「${textMap[status]}」中...`,'loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      status:status
    }, res=>{
  
      if(res.result==='ok'){
        toast(`✅ 已標記：${textMap[status]}`);
        load();
      }else{
        toast(res.message || '更新失敗','error');
        if (btn) btn.disabled = false;
      }
  
    });
  }
  
  /* ========================
     ✅ Toast通知（關鍵）
  ======================== */
  function toast(msg,type='ok'){
  
    const div = document.createElement('div');
  
    const colorMap = {
      ok:'#16a34a',
      error:'#dc2626',
      warn:'#f59e0b',
      loading:'#374151'
    };
  
    div.innerHTML = msg;
  
    div.style = `
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:${colorMap[type]};
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      z-index:9999;
      font-size:14px;
    `;
  
    document.body.appendChild(div);
  
    if(type !== 'loading'){
      setTimeout(()=>div.remove(),1500);
    }
  }
</script>

</body>
</html>
