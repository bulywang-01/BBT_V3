<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤管理系統</title>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
 
<style>

body{
  font-family: system-ui;
  background:#f5f6f8;
  margin:0;
}

.main{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.game-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.game-title{
  font-weight:800;
  margin-bottom:10px;
}

.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #ddd;
}

.person:last-child{ border-bottom:none; }

.role{ font-weight:700; }

.name{
  font-size:14px;
  color:#374151;
}

.actions button{
  margin-left:6px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.btn-ok{ background:#16a34a;color:#fff;}
.btn-no{ background:#dc2626;color:#fff;}
.btn-late{ background:#f59e0b;color:#fff;}
.btn-change{ background:#3b82f6;color:#fff;}

.completed{ background:#ecfdf5;}
.no_show{ background:#fef2f2;}
.late{ background:#fffbeb;}
.cancelled{ background:#f3f4f6;opacity:.7;}

.empty{
  text-align:center;
  color:#999;
  padding:40px;
}

select{
  margin-left:6px;
  padding:4px;
  border-radius:6px;
}


.person.replacement {
  border-left: 4px solid #3b82f6;
}

/* UI 升級版 */
/* === TAB === */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tab{
  padding:8px 14px;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
}

/* === 狀態 badge === */
.badge{
  font-size:12px;
  padding:2px 6px;
  border-radius:6px;
}

.badge.done{
  background:#16a34a;
  color:#fff;
}

.badge.no{
  background:#dc2626;
  color:#fff;
}

.badge.late{
  background:#f59e0b;
  color:#fff;
}

/* === 替補 === */
.replacement-tag{
  color:#2563eb;
  font-size:12px;
}

/* 卡片更乾淨 */
.person{
  padding:12px 0;
}

.person{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.info{
  min-width:160px;
}

.actions-box{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.select-user{
  padding:4px;
  border-radius:6px;
}

.btn{
  padding:4px 8px;
  border:none;
  border-radius:6px;
  color:#fff;
  cursor:pointer;
  font-size:12px;
}

.btn-ok{background:#16a34a;}
.btn-no{background:#dc2626;}
.btn-late{background:#f59e0b;}
.btn-assign{background:#3b82f6;}
.btn-replace{background:#6366f1;}

.tag{
  background:#3b82f6;
  color:#fff;
  padding:2px 4px;
  border-radius:4px;
  margin-left:4px;
}

@media(max-width:600px){
  .person{
    flex-direction:column;
    align-items:flex-start;
  }
}

.btn-complete-all{
  margin-left:10px;
  background:#16a34a;
  color:#fff;
  border:none;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}

.status{
  margin-top:4px;
  font-size:12px;
}

.status-badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

/* 狀態色 */
.status-scheduled{ background:#e5e7eb;color:#374151; }
.status-no_show{ background:#fee2e2;color:#991b1b; }
.status-late{ background:#fef3c7;color:#92400e; }
.status-completed{ background:#dcfce7;color:#166534; }

.person{
  border-radius:10px;
  padding:10px;
  margin-bottom:6px;
  transition:all .2s ease;
}

.person:hover{
  background:#f9fafb;
}

/* 狀態底色（更柔和） */
.person.completed{ background:#ecfdf5; }
.person.no_show{ background:#fef2f2; }
.person.late{ background:#fffbeb; }

.group-title{
  font-weight:700;
  margin-top:10px;
  margin-bottom:6px;
}

.judge{ color:#2563eb; }
.record{ color:#7c3aed; }

.btn{
  padding:4px 10px;
  border-radius:999px;
  font-weight:600;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}

.btn:hover{
  transform:translateY(-1px);
}

.info-line{
  font-size:14px;
  font-weight:500;
}

.info-line span{
  margin-right:6px;
}

.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.btn-recalc{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.btn-recalc:hover{
  background:#1d4ed8;
}

.tag-replace{
  display:inline-block;
  margin-left:4px;
  padding:1px 6px;
  font-size:11px;
  border-radius:6px;
  background:#6366f1;
  color:#fff;
}

.status-mini{
  font-weight:700;
  margin-left:4px;
}
 
</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

  <div class="header-bar">
    <h2>✅ 出勤管理</h2>
  
    <button class="btn-create"
      onclick="runAutoAssign()">
      ⚙️ 建立出勤
    </button>
    <button onclick="loadYearly()">
      📊 年度統計
    </button>
    <button class="btn-recalc"
      onclick="recalcScore()">
      🔄 重算分數
    </button>
  </div>

  <div id="list"></div>
</div>

<script>
  let userList = [];
  
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
    loadUsers();
  });
  
  /* ========================
     Header
  ======================== */
/*
 function loadHeader(){
    fetch('header.html')
      .then(r=>r.text())
      .then(html=>{
        document.getElementById('header-container').innerHTML = html;
      });
  }
  */

  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
 
  /* ========================
     Users
  ======================== */
  function loadUsers(){
    callApi({action:'getUsers'}, res=>{
  
      if(res.result !== 'ok'){
        toast('讀取使用者失敗','error');
        return;
      }
  
      userList = res.users || [];
      load();
    });
  }
  
  /* ========================
     主載入
  ======================== */
function load(){

  const el = document.getElementById('list');

  // ✅ loading畫面
  el.innerHTML = `
    <div class="empty">⏳ 資料載入中...</div>
  `;

  // ✅ 🔥 超過3秒提示（關鍵）
  const timer = setTimeout(()=>{
    toast('資料載入較慢，請稍候...','warn');
  },3000);

  callApi({action:'getAssignmentsByDate'}, res=>{

    // ✅ 清除慢載入提示
    clearTimeout(timer);

    if(res.result !== 'ok'){
      el.innerHTML =
        '<div class="empty">資料讀取失敗</div>';
      toast(res.message || '讀取失敗','error');
      return;
    }

    render(res.games || []);
  });
}
  
  /* ========================
     Render 核心程式
  ======================== */
let currentTab = 'pending';

function render(list){

  const el = document.getElementById('list');

  if (!list.length){
    el.innerHTML = '<div class="empty">目前沒有出勤資料</div>';
    return;
  }

  const pending = list.filter(g => !isGameCompleted(g));
  const done = list.filter(g => isGameCompleted(g));

  const data = currentTab === 'pending' ? pending : done;

  el.innerHTML = `
    <div class="tabs">
      <div class="tab ${currentTab==='pending'?'active':''}"
           onclick="switchTab('pending')">
        🔴 未完成 (${pending.length})
      </div>

      <div class="tab ${currentTab==='done'?'active':''}"
           onclick="switchTab('done')">
        ✅ 已完成 (${done.length})
      </div>
    </div>

    ${data.map(renderGame).join('')}
  `;
}

function switchTab(t){
  currentTab = t;
  load();
}



   /* ========================
     收合功能
  ======================== */
  function toggleDone(){
   const el = document.getElementById('doneSection');
   el.style.display = el.style.display === 'none' ? 'block' : 'none';
 }
  
  /* ========================
     下拉選單
  ======================== */
  function renderUserSelect(p){
  
    return `
      <select data-id="${p.assignment_id}">
        <option value="">--換人--</option>
        ${userList.map(u=>
          `<option value="${u.user_id}">
            ${u.name} ${u.note ? '('+u.note+')' : ''}
          </option>`
        ).join('')}
      </select>
    `;
  }

  /* ========================
     替補
  ======================== */
function addReplacement(gameId, role, btn){

  const select = btn.parentNode.querySelector('.replacement-select');
  const uid = select.value;

  if (!uid){
    toast('請選擇替補人員','warn');
    return;
  }

  toast('新增替補中...','loading');

  callApi({
    action:'addReplacement',
    game_id:gameId,
    role:role,
    user_id:uid
  }, res=>{

    if(res.result==='ok'){
      toast('✅ 已新增替補');

      // ✅ ✅ ✅ 🔥 自動處理原人（這個很重要）
      autoNoShow(gameId, role);

      load();
    }else{
      toast('新增失敗','error');
    }

  });
}


  /* ========================
     每場 render，替補＋鎖定＋更正＋顏色
  ======================== */
function renderGame(g){

  const roleDoneMap = {};

  g.members.forEach(p=>{
    if (p.status === 'completed'){
      roleDoneMap[p.role] = true;
    }
  });

  // ✅ ✅ ✅ 🔥 分組（這就是你現在沒做的）
  const judges = g.members.filter(x =>
    ['PU','U1','U2','U3'].includes(x.role)
  );

  const records = g.members.filter(x =>
    x.role.startsWith('REC')
  );

  // ✅ 共用 render row（避免重複）
function renderRow(p){

  const roleDone = roleDoneMap[p.role] === true;

  const hasNoShow = g.members.some(x =>
    x.role === p.role && x.status === 'no_show'
  );

  const canAssign = !hasNoShow;

  // ✅ ✅ ✅ 是否已選人
  const hasUser = !!p.name;

  // ✅ ✅ ✅ 狀態文字（精簡版）
  function getSimpleStatus(s){

    const map = {
      completed:'✔',
      late:'遲',
      no_show:'缺',
      scheduled:'排'
    };

    return map[s] || '';
  }

  // ✅ ✅ ✅ 是否替補
  const replaceTag = p.is_replacement 
    ? '<span class="tag-replace">補</span>' 
    : '';

  return `
    <div class="person ${p.status} ${p.is_replacement?'replacement':''}" 
         data-id="${p.assignment_id}"
         data-role="${p.role}">

      <div class="info">
        <div class="info-line">

          ${getRoleText(p.role)}
          ${replaceTag}

          ｜ ${p.name || '（待位中）'} ｜ 

          ${
            hasUser
            ? `<span class="status-mini">${getSimpleStatus(p.status)}</span>`
            : getStatusText(p.status)
          }

        </div>
      </div>

      <div class="actions-box">

        ${
          roleDone
          ? `
            <button class="btn-edit"
              onclick="unlock('${p.assignment_id}')">
              ✏️
            </button>
          `
          : `
            <button class="btn btn-ok"
              onclick="updateStatus('${p.assignment_id}','completed',this)">完成</button>

            <button class="btn btn-late"
              onclick="updateStatus('${p.assignment_id}','late',this)">遲到</button>

            <button class="btn btn-no"
              onclick="updateStatus('${p.assignment_id}','no_show',this)">缺席</button>

            ${canAssign ? `
              <button class="btn btn-assign"
                onclick="quickAssign('${p.assignment_id}', this)">指派</button>
            ` : ''}

            ${hasNoShow ? `
              <button class="btn btn-replace"
                onclick="quickReplace('${g.game_id}','${p.role}', this)">替補</button>
            ` : ''}

            <select class="select-user">
              <option value="">選擇人員</option>
              ${userList.map(u =>
                `<option value="${u.user_id}">${u.name}</option>`
              ).join('')}
            </select>
          `
        }

      </div>
    </div>
  `;
}

  return `
    <div class="game-card" data-game-id="${g.game_id}">

      ${currentTab==='pending' ? `
        <button class="btn-complete-all"
          onclick="completeGame('${g.game_id}')">
          ✅ 本場次人員全部完成
        </button>
      ` : ''}

      <div class="game-title">
        📅 ${g.date}｜${g.game_code}｜${g.field}
      </div>

      <!-- ✅ ✅ ✅ 裁判 -->
      <div class="group-title judge">⚾ 裁判</div>
      ${judges.map(renderRow).join('')}

      <!-- ✅ ✅ ✅ 紀錄 -->
      <div class="group-title record">📝 紀錄</div>
      ${records.map(renderRow).join('')}

    </div>
  `;
}

  
  /* ========================
     更新狀態
  ======================== */
  function updateStatus(id, status, btn){
  
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;
  
    const textMap = {
      completed:'完成',
      no_show:'缺席',
      late:'遲到'
    };
  
    toast(`更新「${textMap[status]}」中...`,'loading');
  
    callApi({
      action:'updateAssignment',
      assignment_id:id,
      status:status
    }, res=>{
  
      // ✅ 🔥 先清 loading
      toast('', 'ok'); 
  


     if (res && res.result === 'ok'){
     
       toast(`✅ 已標記：${textMap[status]}`);
     
       updateRowUI(id, status);
     
       // ✅ ✅ ✅ 🔥 如果是 no_show，要刷新（讓補出現）
       if (status === 'no_show'){
         setTimeout(load, 0);
       }
     }
      else{
        toast(res.message || '更新失敗','error');
        if (btn) btn.disabled = false;
      }
  
    });
  }
  
  /* ========================
     ✅ Toast通知（關鍵）
  ======================== */
  let currentToast = null;
  
  function toast(msg,type='ok'){
  
    // ✅ 清掉舊的
    if (currentToast){
      currentToast.remove();
      currentToast = null;
    }
  
    const div = document.createElement('div');
  
    const colorMap = {
      ok:'#16a34a',
      error:'#dc2626',
      warn:'#f59e0b',
      loading:'#374151'
    };
  
    div.innerHTML = msg;
  
    div.style = `
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:${colorMap[type]};
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      z-index:9999;
      font-size:14px;
    `;
  
    document.body.appendChild(div);
    currentToast = div;
  
    // ✅ loading 不自動消失
    if (type !== 'loading'){
      setTimeout(()=>{
        if (div === currentToast){
          div.remove();
          currentToast = null;
        }
      },1500);
    }
  }

  /* ========================
     ✅ 異動出勤狀態，解鎖按鍵
  ======================== */
 function unlock(id){

  if (!confirm('確定要更正這筆出勤狀態？')) return;

  toast('解鎖中...','loading');

  callApi({
    action:'updateAssignment',
    assignment_id:id,
    status:'scheduled'
  }, res => {

    if (res.result === 'ok'){
      toast('✅ 已解鎖，可重新編輯');
      load();
    }else{
      toast(res.message || '解鎖失敗','error');
    }

  });
}

// 替補時「原人自動 no_show」
 function autoNoShow(gameId, role){

  callApi({
    action:'autoNoShow',
    game_id:gameId,
    role:role
  });
}

// 判斷是否已完成
function isGameCompleted(g){

  const roleDone = {};

  g.members.forEach(p=>{
    if (p.status === 'completed'){
      roleDone[p.role] = true;
    }
  });

  const roleCount = new Set(g.members.map(x=>x.role)).size;

  return Object.keys(roleDone).length === roleCount;
}


// 狀態中文化

function getStatusText(s){

  const map = {
    scheduled:'<span class="status-badge status-scheduled">待確認</span>',
    no_show:'<span class="status-badge status-no_show">缺席，請選擇替補人員</span>',
    late:'<span class="status-badge status-late">遲到</span>',
    completed:'<span class="status-badge status-completed">✔ 已完成</span>'
  };

  return map[s] || s;
}


function getRoleText(role){

  const map = {
    PU:'主審',
    U1:'一壘審',
    U2:'二壘審',
    U3:'三壘審',
    REC_MAIN:'紀錄員',
    REC_TRAINEE:'實習紀錄員',
    REC_VIDEO:'影像紀錄員'
  };

  return map[role] || role;
}

// 狀態 badge
function getStatusBadge(s){

  const map = {
    completed:'<span class="badge done">已完成</span>',
    no_show:'<span class="badge no">缺席</span>',
    late:'<span class="badge late">遲到</span>',
    scheduled:'<span class="badge">待確認</span>'
  };

  return map[s] || '';
}

// 快速指派
function quickAssign(id, btn){

  const row = btn.closest('.person');
  const select = row.querySelector('.select-user');

  const uid = select.value;

  if (!uid){
    toast('請先選人','warn');
    return;
  }

  callApi({
    action:'updateAssignment',
    assignment_id:id,
    user_id:uid,
    status:'scheduled'
  }, () => {
    toast('✅ 已指派');
    load();
  });
}

// 快速替補
function quickReplace(gameId, role, btn){

  const row = btn.closest('.person');
  const select = row.querySelector('.select-user');

  const uid = select.value;

  if (!uid){
    toast('請先選替補人員','warn');
    return;
  }

  const hasNoShow = checkRoleNoShow(gameId, role);

  if (!hasNoShow){
    toast('⚠️ 該位置尚未標記缺席','warn');
    return;
  }

  callApi({
    action:'addReplacement',
    game_id:gameId,
    role:role,
    user_id:uid
  }, ()=>{
    toast('✅ 已完成替補');
    load();
  });
}


// 判斷是否有遲到，才能遞補
function checkRoleNoShow(gameId, role){

  const card = document.querySelector(`[data-game-id="${gameId}"]`);
  if (!card) return false;

  const rows = card.querySelectorAll('.person');

  for (let r of rows){

    const rowRole = r.getAttribute('data-role');

    if (
      rowRole === role &&
      r.classList.contains('no_show')
    ){
      return true;
    }
  }

  return false;
}


// 一鍵整場完成
function completeGame(gameId){

  if(!confirm('確定將本場全部標記為完成？')) return;

  toast('整場處理中...','loading');

  callApi({
    action:'completeGame',
    game_id:gameId
  }, res=>{

    if(res.result==='ok'){
      toast('✅ 本場已全部完成');
      load();
    }else{
      toast('❌ 處理失敗','error');
    }

  });
}


//
function updateRowUI(id, status){

  const row = document.querySelector(`[data-id="${id}"]`);
  if (!row) return;

  // ✅ 更新顏色
  row.classList.remove('completed','no_show','late','scheduled');
  row.classList.add(status);

  // ✅ ✅ ✅ 🔥 更新狀態文字（你現在缺這行）
  const statusEl = row.querySelector('.status');
  if (statusEl){
    statusEl.innerHTML = getStatusText(status);
  }

  // ✅ 如果變回 scheduled → 重新開啟按鈕
  if (status !== 'completed'){
    const actions = row.querySelector('.actions-box');
    if (actions && actions.innerHTML.includes('更正')){
      setTimeout(()=>{
        load();   // ✅ 保證回復完整UI
      },100);
    }
  }

  // ✅ ✅ ✅ 🔥 如果完成 → 切換為鎖定UI
  if (status === 'completed'){

    const actions = row.querySelector('.actions-box');

    if (actions){
      actions.innerHTML = `
        <button onclick="unlock('${id}')">
          ✏️ 更正
        </button>
      `;
    }
  }
}

// 一鍵重新計算分數
function recalcScore(){

  if(!confirm('確定重新計算所有分數？')) return;

  const btn = document.querySelector('.btn-recalc');
  if (btn) btn.disabled = true;

  toast('分數計算中...','loading');

  callApi({action:'recalcAllScores'}, res=>{

    if (!res || res.result !== 'ok'){
      toast('❌ 計算失敗','error');
    }else{

      toast(`✅ 分數已更新（${res.users_updated || 0}人）`);
    }

    if (btn) btn.disabled = false;
  });
}

// 建立出勤資料
function runAutoAssign(){

  if(!confirm('建立尚未產生的出勤資料？')) return;

  toast('建立中...','loading');

  callApi({action:'autoCreateAssignment'}, res=>{

    if (res.result === 'ok'){
      toast(`✅ 已建立 ${res.created} 筆`);
      load();
    }else{
      toast('❌ 建立失敗','error');
    }

  });
}

// 年度統計
function loadYearly(){

  const year = new Date().getFullYear();

  toast('統計中...','loading');

  callApi({
    action:'getYearlyExperience',
    year:year
  }, res=>{

    if (res.result !== 'ok'){
      toast('❌ 失敗','error');
      return;
    }

    console.table(res.data); // ✅ 先用console看
    toast('✅ 完成，請看 console');
  });
}

</script>
