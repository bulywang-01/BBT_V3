<style>

<script>
  function loadHeader() {
    fetch('header.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('header-container').innerHTML = html;
  
        // ✅ 只用 body class 控制身份
        const session = (typeof getSession === 'function') ? getSession() : null;
        document.body.classList.remove(
          'role-admin', 'role-judge', 'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
    }
    
    // 裁入報名頁面重要function
    document.addEventListener('DOMContentLoaded', () => {
      loadHeader();   // 只負責 header
      loadGames();    // 或該頁真正的資料初始化
      initMonthTabs();  // 初始化月班表選擇

    });
</script>

<script>
/* ===== 全域 ===== */
let session;
let games = [];

// 組別對應顏色
function applyCategoryBadgeColor() {
  const colorMap = {
    '大聯盟': '#2563eb',   // 藍
    '小聯盟': '#16a34a',   // 綠
    '六年級': '#d97706',   // 黃
    '五年級': '#9333ea',   // 紫
    'U12': '#ef4444'       // 紅
  };

  document.querySelectorAll('.game-code.badge').forEach(el => {
    const cat = el.dataset.category;
    const color = colorMap[cat] || '#6b7280'; // 預設灰
    el.style.backgroundColor = color;
  });
}

// 過期判斷工具
function isPastGame(gameDateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const d = new Date(gameDateStr.replace(/\//g, '-'));
  d.setHours(0, 0, 0, 0);

  return d < today;
}

/* ===== Page / Data ===== */
function initPage() {
  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  session = JSON.parse(raw);          // ✅ 關鍵修正：指定給全域
  if (!session.user_id) {
    location.replace('login.html');
    return;
  }

  loadGames();
}

function normalizeGame(g) {
  return {
    ...g,

    // ✅ 統一欄位
    game_id: g.game_id || g.id,
    game_code: g.game_code || '',

    date: g.date || g.game_date || '',
    time: g.time || g.game_time || '',

    category: g.category || g.group || '未分類',

    away_team: g.away_team || g.team_a || '',
    home_team: g.home_team || g.team_b || '',

    field: g.field || g.location || '',

    // ✅ 統一紀錄欄位
    record_slots: g.record_slots || {
      REC_MAIN: g.recorder ? {
        user_id: g.recorder,
        name: g.recorder_name
      } : null,

      REC_TRAINEE: g.recorder_trainee ? {
        user_id: g.recorder_trainee,
        name: g.recorder_trainee_name
      } : null,

      REC_VIDEO: g.recorder_video ? {
        user_id: g.recorder_video,
        name: g.recorder_video_name
      } : null
    }
  };
}


/* ===== Toast ===== */
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2000);
}

/* ===== 取資料 ===== */
function loadGames() {
  session = session || JSON.parse(localStorage.getItem('session_user') || '{}');
  
  // ✅ 顯示置中 loading
  showLoading('載入賽事資料中...');

  callApi({
    action: 'getRecordSignableGames',
    user_id: session.user_id
  }, res => {

      // ✅ 關掉 loading
      hideOverlay();

    if (!res || res.result !== 'ok') {
      showToast('載入賽事失敗', 'error');
      return;
    }

    // games = Array.isArray(res.games) ? res.games : [];
    games = (res.games || []).map(normalizeGame);
    // renderRecordDashboard(games);
    render();
    renderMobileRecord(games);   // ✅ 新增
  });
}

// 1️⃣ 顯示 loading（不要可點）
function showLoading(msg) {
  const overlay = document.getElementById('overlay');

  const textEl = document.getElementById('overlay-text');
  if (textEl) textEl.textContent = msg;

  const ok = document.getElementById('overlay-ok');
  if (ok) ok.style.display = 'none';

  if (overlay) {
    overlay.onclick = null;
    overlay.classList.add('show', 'loading');
  }
}


// 2️⃣ 顯示訊息（可以點關閉）
function showMessage(msg) {
  const overlay = document.getElementById('overlay');
  const text = document.getElementById('overlay-text');
  const ok = document.getElementById('overlay-ok');

  text.textContent = msg;

  ok.style.display = 'inline-block';

  // ✅ 點擊關閉
  ok.onclick = hideOverlay;
  overlay.onclick = hideOverlay;

  overlay.classList.add('show');
}

// ✅ 3️⃣ 關閉統一
function hideOverlay() {
  const overlay = document.getElementById('overlay');
  if (overlay) overlay.classList.remove('show', 'loading');
}


/* ===============================
 * 共用排序工具
 * =============================== */

// ✅ 日期排序（字串 yyyy/mm/dd ➜ Date）
function sortDatesAsc(dates) {
  return dates.sort((a, b) => new Date(a) - new Date(b));
}

// ✅ 組別排序（桌機用：大 ➜ 中 ➜ 小，其餘放後面）
const CATEGORY_ORDER = ['大聯盟組', '中聯盟組', '小聯盟組'];

function sortCategoriesForDesktop(categories) {
  return categories.sort((a, b) => {
    const ia = CATEGORY_ORDER.indexOf(a);
    const ib = CATEGORY_ORDER.indexOf(b);

    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}


/* ===== 分組 ===== */
function groupGames(list) {
  const map = {};
  list.forEach(g => {
    const date = formatDateTW(g.date);
    const cat  = g.category || '未分類';

    if (!map[date]) map[date] = {};
    if (!map[date][cat]) map[date][cat] = [];
    map[date][cat].push(g);
  });

  Object.values(map).forEach(catMap => {
    Object.values(catMap).forEach(arr => {
//      arr.sort((a, b) => a.time.localeCompare(b.time)); // ✅ 正確排序
      arr.sort((a, b) => (a.time || a.game_time || '').localeCompare(b.time || b.game_time || ''));
    });
  });

  return map;
}

/* ===== Render（桌機） ===== */

/* ===== 分組 ===== */
function groupGames(list){

  const map={};

  list.forEach(g=>{
    const date=g.date;
    const cat=g.category||'未分類';

    if(!map[date])map[date]={};
    if(!map[date][cat])map[date][cat]=[];

    map[date][cat].push(g);
  });

  Object.values(map).forEach(catMap=>{
    Object.values(catMap).forEach(arr=>{
      arr.sort((a,b)=>getTime(a).localeCompare(getTime(b)));
    });
  });

  return map;
}

/* ===== 桌機版紀錄報名　Signup UI ===== */
function renderSignupCell(g, role) {

  const slot = g.records?.[role];

  if (isPastGame(g.date)) {
    if (slot && slot.user_id) {
      return `<span class="signup-other">${slot.name}</span>`;
    }
    return `<span class="signup-other">—</span>`;
  }

  if (slot && String(slot.user_id).trim() !== '') {

    const name = slot.name || ('ID:' + slot.user_id);

    if (String(slot.user_id) === String(session.user_id)) {
      return `
        <span class="signup-me">
          ${name}
          <span class="cancel-btn"
            onclick="cancelSignup('${g.game_id}','${role}')">
            取消
          </span>
        </span>
      `;
    }

    return `<span class="signup-other">${name}</span>`;
  }

  return `
    <span class="signup-btn"
      onclick="signup('${g.game_id}','${role}')">
      ＋報名
    </span>
  `;
}

/* ===== Actions ===== */
function signup(gameId, role){

  const g = games.find(x=>x.game_id==gameId);
  if (!g) return;

  if (!canSignup(g)){
    showMessage('❌ 該場已過期，無法報名');
    return;
  }

  showLoading('報名中...');

  callApi({
    action:'recordSignup',
    user_id: session.user_id,
    game_id: gameId,
    record_role: role
  }, res=>{

    showMessage(res.result==='ok' ? '✅ 報名成功' : '❌ 失敗');

    setTimeout(()=>reloadCurrentView(), 500);
  });
}


function cancelSignup(gameId, role){

  if (!confirm('確定取消?')) return;

  showLoading('取消中...');

  callApi({
    action:'cancelRecordSignup',
    user_id: session.user_id,
    game_id: gameId,
    record_role: role
  }, res=>{

    showMessage('✅ 已取消');

    setTimeout(()=>reloadCurrentView(), 500);
  });
}


function recordSignup(gameId, role) {
  const session = getSession();
  if (!session) {
    alert('登入狀態失效，請重新登入');
    location.replace('../login.html');
    return;
  }

  callApi({
    action: 'recordSignup',
    user_id: session.user_id,   // ✅ 唯一正解
    game_id: gameId,
    record_role: role
  }, res => {
    if (res.result === 'ok') {
      location.reload();
    } else {
      alert(res.message || '報名失敗');
    }
  });
}

// 產生月班表
function loadRecordGamesByMonth(year, month) {

  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  showLoading('載入月份班表中...');

  callApi({
    action: 'getRecordGamesByMonth',
    year: year,
    month: month,
    user_id: session.user_id
  }, res => {

    hideOverlay();

    console.log('month res:', res); // ✅ debug

    if (!res || res.result !== 'ok') {
      showMessage('載入失敗');
      return;
    }

    // ✅ ✅ ✅ 🔥 這行是很多人漏掉的
    games = res.games || [];

    if (!games.length) {
      showMessage('當月無賽事');
      document.getElementById('recordContainer').innerHTML = '';
      document.getElementById('mobileView').innerHTML = '';
      return;
    }

    renderRecordDashboard(games);
    renderMobileRecord(games);
  });
}

// 初始化月份／年份
let currentMonth = null;
let currentYear = null;

function initMonthTabs() {

  const now = new Date();
  const year = now.getFullYear();

  const container = document.getElementById('month-tabs');
  container.innerHTML = '';

  /* ✅ 全年 */
  const allBtn = document.createElement('div');
  allBtn.className = 'month-tab active';
  allBtn.textContent = '📊 全年班表';

  allBtn.onclick = () => {
    currentMonth = null;
    currentYear = null;
    setActiveTab(allBtn);

    loadGames(); // ✅ 全年
  };

  container.appendChild(allBtn);

  /* ✅ 月份 */
  for (let m = 1; m <= 12; m++) {

    const div = document.createElement('div');
    div.className = 'month-tab';
    div.textContent = `${m}月`;

    div.onclick = () => {

      currentMonth = m;
      currentYear = year;   // ✅ ✅ ✅ 記住年份（關鍵）

      setActiveTab(div);

      loadRecordGamesByMonth(year, m); // ✅ 月
    };

    container.appendChild(div);
  }
}

function setActiveTab(el) {
  document.querySelectorAll('.month-tab')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function showSuccess(msg){
  showMessage(msg || '✅ 成功');
}

/* 新增，保留舊版 render */
function render(){

  const root = document.getElementById('content');
  root.innerHTML = '';

  if (!games || !games.length){
    root.innerHTML = '<div>沒有資料</div>';
    return;
  }

  const groups = {};

  games.forEach(g=>{
    if (!shouldRenderGame(g)) return;

    if (!groups[g.date]) groups[g.date] = [];
    groups[g.date].push(g);
  });

  Object.keys(groups)
    .sort((a,b)=>new Date(a)-new Date(b))
    .forEach(date=>{

      root.innerHTML += `<h3 style="margin:16px">${date}</h3>`;

      const fieldMap = {};

      groups[date].forEach(g=>{
        if (!fieldMap[g.field]) fieldMap[g.field] = [];
        fieldMap[g.field].push(g);
      });

      Object.keys(fieldMap).forEach(field=>{

        const list = fieldMap[field];

        const multiCategory =
          [...new Set(list.map(x=>x.category))].length > 1;

        list.sort((a,b)=>{

          if (multiCategory){
            return getTime(a).localeCompare(getTime(b));
          }

          if (a.category !== b.category){
            return a.category.localeCompare(b.category);
          }

          return getTime(a).localeCompare(getTime(b));
        });

        root.innerHTML += `
          <div style="margin:10px 16px;font-weight:700;color:#444">
            📍 ${field}
          </div>
        `;

        root.innerHTML += `<div class="card-grid">`;

        list.forEach(g=>{
          root.innerHTML += renderGameCard(g);
        });

        root.innerHTML += `</div>`;

      });

    });
}
