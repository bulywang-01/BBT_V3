<div id="courseList"></div>

<script>
function loadCourses(){

  callApi({action:'getCourses'}, res=>{

    if (res.result !== 'ok') return;

    const html = res.data.map(c=>`
      <div class="card">
        <b>${c.course_name}</b><br>
        📅 ${c.date}<br>
        👨‍🏫 ${c.instructor}<br>
        📍 ${c.location}<br>
        💰 ${c.fee || 0}

        <button onclick="enroll('${c.course_id}')">
          報名
        </button>
      </div>
    `).join('');

    document.getElementById('courseList').innerHTML = html;
  });
}

function enroll(cid){

  const session = JSON.parse(localStorage.getItem('session_user'));

  callApi({
    action:'enrollCourse',
    course_id:cid,
    user_id:session.user_id
  },()=>{
    alert('✅ 已報名');
  });
}

loadCourses();
</script>
