<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出勤報表</title>

  <style>

    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .toolbar {
      margin-bottom: 15px;
    }

    .report {
      background: #fff;
      padding: 10px;
      border-radius: 6px;
    }

    .user-row {
      margin-bottom: 16px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .user-header {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .calendar {
      display: flex;
      flex-wrap: wrap;
    }

    .day {
      width: 26px;
      height: 26px;
      line-height: 26px;
      margin: 2px;
      text-align: center;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .day.ok {
      background: #4caf50;
      color: #fff;
    }

    .day.late {
      background: #ff9800;
      color: #fff;
    }

    .day.no {
      background: #f44336;
      color: #fff;
    }

    .day.empty {
      background: #eee;
      color: #999;
    }

    .user-header .day {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-left: 4px;
    }
  </style>
</head>

<body>
<div id="header-container"></div>

  <h2>📊 出勤報表</h2>

  <div class="toolbar">
    <div id="monthButtons" class="toolbar"></div>
    <button onclick="goBack()">⬅ 返回</button>
  </div>

  <div id="reportArea"></div>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  
  <script>
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
  });
    
  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
  
    // ✅ 回上一頁
    function goBack(){
      history.back();
    }

    // 生成按鈕
    function renderMonthButtons(gameDays){
    
      // ✅ 從 gameDays 推月份（靠 Games）
      const monthsSet = new Set();
    
      gameDays.forEach(d=>{
        // 先假設用當前選擇月（因為現在後端是 dd）
        // 👉 所以這裡直接用目前 monthPicker 的值
        const current = document.getElementById('currentMonth')?.value;
        if(current){
          monthsSet.add(current);
        }
      });
    
      // 👉 因為你現在後端是用 month filter
      // 👉 所以這裡簡化：直接列固定月份（從資料來會再升級）
    
      const months = Array.from(monthsSet);
    
      let html = `<button onclick="selectMonth('ALL')">全年</button>`;
    
      months.forEach(m=>{
        const mm = m.split('-')[1];
        html += `<button onclick="selectMonth('${m}')">${Number(mm)}月</button>`;
      });
    
      document.getElementById('monthButtons').innerHTML = html;
    }


/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  currentMonth = 'ALL'; // ✅ 預設全年
  loadReport();
});

/* ✅ 載入 */
let currentMonth = 'ALL';

function selectMonth(m){
  currentMonth = m;
  loadReport();
}

function loadReport(){

  const m = currentMonth;

  console.log('month=', m);

  callApi({
    action:'getMonthlyReport',
    month:m
  }, res => {

    console.log('✅ API res:', res);

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    // ✅ render 按鈕（第一次）
    renderMonthButtons(res.gameDays);

    render(res.data, res.gameDays);
  });
}


/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  let html = '';

  Object.values(data)
  .filter(u => {
    // ✅ 不顯示 admin（用名稱判斷）
    if(!u.name || u.name.includes('管理')) return false;
    return true;
  })
  .forEach(u=>{

    // ✅ ✅ ✅ 統計
    const completed = u.summary.total - u.summary.late - u.summary.no_show;
    const late = u.summary.late;
    const no = u.summary.no_show;
    const sub = u.summary.playoff; // 👉 之後你可改成專用欄位

    html += `
      <div class="user-row">

        <div class="user-header">
          <b>${u.name}</b>

          <span class="day ok" 
            title="完成：${completed}">
            ${completed}
          </span>

          <span class="day late" 
            title="遲到：${late}">
            ${late}
          </span>

          <span class="day no" 
            title="缺席：${no}">
            ${no}
          </span>

          <span class="day empty" 
            style="background:#2196f3;color:#fff"
            title="替補：${sub}">
            ${sub}
          </span>

        </div>

        <div class="calendar">
    `;

    gameDays.forEach(d=>{

      const rec = u.days[d];

      let cls = 'empty';
      let tooltip = '';

      if(rec){

        const hasNo = rec.some(x=>x.status==='no_show');
        const hasLate = rec.some(x=>x.status==='late');

        if(hasNo) cls='no';
        else if(hasLate) cls='late';
        else cls='ok';

        // ✅ ✅ ✅ 中文轉換
        tooltip = rec.map(x=>{
          
          let roleMap = {
            PU: '主審',
            U1: '一壘審',
            U2: '二壘審',
            U3: '三壘審',
            REC: '紀錄'
          };

          let statusMap = {
            completed: '完成',
            late: '遲到',
            no_show: '缺席'
          };

          const role = roleMap[x.role] || x.role;
          const status = statusMap[x.status] || x.status;

          return `${role}：${status}`;

        }).join('\n');
      }

      html += `
        <span class="day ${cls}" title="${tooltip}">
          ${parseInt(d)}
        </span>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById('reportArea').innerHTML = html;
}


  </script>

</body>
</html>
