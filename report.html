<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出勤報表</title>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    .user-row {
      margin-bottom: 14px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .user-header {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .year-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .month-title {
      font-size: 11px;
      color: #666;
      margin: 0 4px;
    }

    .day {
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      border-radius: 4px;
      font-size: 11px;
    }

    .day.ok { background:#4caf50;color:#fff; }
    .day.late { background:#ff9800;color:#fff; }
    .day.no { background:#f44336;color:#fff; }
    .day.empty { background:#eee;color:#999; }

    .badge {
      padding:2px 6px;
      margin-left:4px;
      border-radius:4px;
      font-size:12px;
      color:#fff;
    }

    .badge.total { background:#9e9e9e; }
    .badge.late { background:#ff9800; }
    .badge.no { background:#f44336; }
    .badge.regular { background:#4caf50; }
    .badge.playoff { background:#3f51b5; }
  </style>
</head>

<body>

<div id="header-container"></div>

<h2>📊 出勤報表</h2>

<div id="reportArea"></div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  loadHeader();
  loadReport();
});

/* ========= API ========= */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    callback(res);
    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ========= 報表 ========= */

function loadReport(){

  callApi({
    action:'getMonthlyReport',
    month:'ALL'
  }, (res)=>{

    if(res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    document.getElementById('reportArea').innerHTML =
      renderYearSundayReport(res.data);
  });
}

/* ========= 核心 render（最穩定版） ========= */

function renderYearSundayReport(report){

  const dates = buildGameDateMap(report);

  if(dates.length === 0){
    return `<div>⚠️ 沒有任何比賽資料</div>`;
  }

  return Object.values(report).map(u=>{

    let html = `
      <div class="user-row">
        <div class="user-header">
          <b>${u.name}</b>
          <span class="badge total">總 ${u.summary.total}</span>
          <span class="badge late">遲 ${u.summary.late}</span>
          <span class="badge no">缺 ${u.summary.no_show}</span>
          <span class="badge regular">例 ${u.summary.regular}</span>
          <span class="badge playoff">季 ${u.summary.playoff}</span>
        </div>

        <div class="year-row">
    `;

    let currentMonth = '';

    dates.forEach(dateStr=>{

      const date = new Date(dateStr);
      const month = date.getMonth() + 1;

      if(currentMonth !== month){
        currentMonth = month;
        html += `<span class="month-title">${month}</span>`;
      }

      const data = u.days[dateStr];

      let cls = 'empty';
      let star = '';

      if(data){
        const hasNo = data.some(x=>x.status==='no_show');
        const hasLate = data.some(x=>x.status==='late');
        const hasPlayoff = data.some(x=>x.type!=='regular');

        if(hasNo) cls='no';
        else if(hasLate) cls='late';
        else cls='ok';

        if(hasPlayoff) star='★';
      }

      html += `
        <span class="day ${cls}">
          ${date.getDate()}${star}
        </span>
      `;
    });

    html += `</div></div>`;

    return html;

  }).join('');
}

/* ========= 建立「真實比賽日期」 ========= */

function buildGameDateMap(report){

  const set = new Set();

  Object.values(report).forEach(u=>{
    Object.keys(u.days || {}).forEach(d=>{

      const date = new Date(d);

      // ✅ 只週日
      if(date.getDay() === 0){
        set.add(d);
      }
    });
  });

  return Array.from(set).sort();
}

/* ========= Header ========= */

function loadHeader(){
  fetch('header.html')
    .then(r=>r.text())
    .then(html=>{
      const el = document.getElementById('header-container');
      if(el) el.innerHTML = html;
    });
}
</script>

</body>
</html>
