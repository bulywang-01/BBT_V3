<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出勤報表</title>

  <style>

    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .toolbar {
      margin-bottom: 15px;
    }

    .report {
      background: #fff;
      padding: 10px;
      border-radius: 6px;
    }

    .user-row {
      margin-bottom: 16px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .user-header {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .calendar {
      display: flex;
      flex-wrap: wrap;
    }

    .day {
      width: 26px;
      height: 26px;
      line-height: 26px;
      margin: 2px;
      text-align: center;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .day.ok {
      background: #4caf50;
      color: #fff;
    }

    .day.late {
      background: #ff9800;
      color: #fff;
    }

    .day.no {
      background: #f44336;
      color: #fff;
    }

    .day.empty {
      background: #eee;
      color: #999;
    }

  </style>
</head>

<body>
<div id="header-container"></div>

  <h2>📊 出勤報表</h2>

  <div class="toolbar">
    <input type="month" id="monthPicker">
    <button onclick="loadReport()">載入報表</button>
    <button onclick="goBack()">⬅ 返回</button>
  </div>

  <div id="reportArea"></div>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  
  <script>
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
  });
    
  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
  
    // ✅ 回上一頁
    function goBack(){
      history.back();
    }


/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');

  document.getElementById('monthPicker').value = `${y}-${m}`;
});

/* ✅ 載入 */
function loadReport(){

  let month = document.getElementById('monthPicker').value;

  if(!month){
    const now = new Date();
    month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  }

  console.log('month=', month);

  callApi({
    action:'getMonthlyReport',
    month:month
  }, res => {

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    render(res.data, res.gameDays);
  });
}

/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  let html = '';

  Object.values(data).forEach(u=>{

    html += `
      <div class="user-row">

        <div class="user-header">
          <b>${u.name}</b>
          ｜${u.summary.total}場
        </div>

        <div class="calendar">
    `;

    gameDays.forEach(d=>{

      const rec = u.days[d];

      let cls = 'empty';

      if(rec){
        const hasNo = rec.some(x=>x.status==='no_show');
        const hasLate = rec.some(x=>x.status==='late');

        if(hasNo) cls='no';
        else if(hasLate) cls='late';
        else cls='ok';
      }

      html += `<span class="day ${cls}">${parseInt(d)}</span>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('reportArea').innerHTML = html;
}

  </script>

</body>
</html>
