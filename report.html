        background:#fff;

/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  currentMonth = 'ALL'; // ✅ 預設全年
  loadReport();
});

/* ✅ 載入 */
let currentMonth = 'ALL';

function selectMonth(m){
  currentMonth = m;
  loadReport();
}

function loadReport(){

  const m = currentMonth;

  console.log('month=', m);

  callApi({
    action:'getMonthlyReport',
    month:m
  }, res => {

    console.log('✅ API res:', res);

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    // ✅ render 按鈕（第一次）
    renderMonthButtons(res.gameDays);

    render(res.data, res.gameDays);
  });
}

// 排序功能
let currentSort = 'score';

function sortUsers(list){

  const arr = [...list];

  if(currentSort === 'score'){
    return arr.sort((a,b)=>
      (b.summary.total || 0) - (a.summary.total || 0)
    );
  }

  if(currentSort === 'quality'){
    return arr.sort((a,b)=>
      (a.summary.no_show || 0) - (b.summary.no_show || 0)
    );
  }

  return arr.sort((a,b)=>
    (a.name || '').localeCompare(b.name || '', 'zh-Hant')
  );
}

function setSort(mode){
  currentSort = mode;
  loadReport();
}


/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  const currentYear = today.getFullYear();

  const monthMap = {};

  gameDays.forEach(fullDate=>{
    const [y, m, d] = fullDate.split('-');

    if(!monthMap[m]){
      monthMap[m] = [];
    }

    monthMap[m].push(d);
  });

  let html = '';
  const users = sortUsers(Object.values(data));

  users.forEach(u=>{

    if(u.name === '系統管理員') return;

    const finished = u.summary.total - u.summary.late - u.summary.no_show;

    html += `
    <div class="user-row">
      <div class="user-header">
        <div class="user-name">
          ${u.name}
          <span class="user-role">${u.roles ? formatRole(u.roles) : '—'}</span>
        </div>
      </div>

      <div class="user-kpi">
        <span class="label">生涯：</span>
        <span class="day ok">${finished}</span>
        <span class="day late">${u.summary.late}</span>
        <span class="day no">${u.summary.no_show}</span>
        <span class="day sub">${u.summary.playoff}</span>
      </div>

      <div class="right-panel">
    `;

    Object.keys(monthMap)
      .sort()
      .forEach(m => {

        html += `
          <div class="month-row">
            <div class="month-label">${Number(m)}月</div>
            <div class="days">
        `;

        monthMap[m]
          .sort((a,b)=>Number(a)-Number(b))
          .forEach(d => {

            const rec = u.days[d];

            let cls = 'empty';
            let tooltip = '';

            const fullDateStr = `${currentYear}-${m}-${d}`;
            const dateObj = new Date(fullDateStr);
            dateObj.setHours(0,0,0,0);

            const isFuture = dateObj > today;

            /******** ✅ 核心邏輯 ********/

            if(rec && rec.length){

              if(!isFuture){

                const hasNo = rec.some(x=>x.status==='no_show');
                const hasLate = rec.some(x=>x.status==='late');
                const hasSub = rec.some(x=>x.is_replacement);
                const hasDone = rec.some(x=>x.status==='completed');

                if(hasNo) cls='no';
                else if(hasLate) cls='late';
                else if(hasSub) cls='sub';
                else if(hasDone) cls='ok';

              }else{

                const hasSub = rec.some(x=>x.is_replacement);

                if(hasSub){
                  cls = 'future-sub';
                }else{
                  cls = 'future';
                }

              }

            }else{
              cls = 'empty'; // ✅ 沒資料 → 不顯示
            }

            /******** ✅ tooltip ********/

            if(rec && rec.length){

              const roleMap = {
                PU:'主審',
                U1:'一壘審',
                U2:'二壘審',
                U3:'三壘審',
                REC_MAIN:'紀錄員',
                REC_VIDEO:'影像紀錄員',
                REC_TRAINEE:'見習紀錄員'
              };

              const statusMap = {
                completed:'✅ 完成',
                late:'⏰ 遲到',
                no_show:'❌ 缺席'
              };

              tooltip = rec.map(x=>{

                if(isFuture){
                  return x.is_replacement
                    ? `${roleMap[x.role] || x.role}：🔵 已排（替補）`
                    : `${roleMap[x.role] || x.role}：🟢 已排班`;
                }else{
                  return `${roleMap[x.role] || x.role}：${statusMap[x.status] || x.status}`;
                }

              }).join('\n');
            }

            html += `
              <span class="day ${cls}" 
                onclick='showDayDetail(${JSON.stringify(rec || [])}, "${m}/${d}", "${currentYear}-${m}-${d}")'
                title="${tooltip}">
                ${Number(d)}
              </span>
            `;

          });

        html += `</div></div>`;
      });

    html += `</div></div>`;
  });

  document.getElementById('reportArea').innerHTML = html;
}


/*
✅ 手機點 → 展開
✅ 可看當天細節
✅ 不影響桌機
✅ 不改資料結構
*/
function showDayDetail(list, date, fullDate){

  const modal = document.getElementById('dayDetailModal');
  const content = document.getElementById('dayDetailContent');

  const today = new Date();
  today.setHours(0,0,0,0);

  const gameDate = new Date(fullDate);
  gameDate.setHours(0,0,0,0);

  const isFuture = gameDate > today;

  if(!list || !list.length){
    content.innerHTML = `<div>📌 ${date}<br>無出勤紀錄</div>`;
  }else{

    const roleMap = {
      PU:'主審',
      U1:'一壘審',
      U2:'二壘審',
      U3:'三壘審',
      REC_MAIN:'紀錄員',
      REC_VIDEO:'影像紀錄員',
      REC_TRAINEE:'見習紀錄員'
    };

    const statusMap = {
      completed:'✅ 完成',
      late:'⏰ 遲到',
      no_show:'❌ 缺席'
    };

    const uniqueList = [];
    const seen = new Set();

    list.forEach(x=>{
      const key = (x.game_code || x.game_id) + '_' + x.role;
      if(!seen.has(key)){
        seen.add(key);
        uniqueList.push(x);
      }
    });

    const gameMap = {};

    uniqueList.forEach(x=>{

      // ✅ ✅ ✅ 核心修正：強制用 game_code
      const gid = (x.game_code && x.game_code.trim())
        ? x.game_code
        : (x.game_id || '未指定場次');

      if(!gameMap[gid]) gameMap[gid] = [];
      gameMap[gid].push(x);
    });

    let html = `
      <div style="font-weight:800;font-size:16px;margin-bottom:10px;">
        📌 ${date}
      </div>
    `;

    Object.keys(gameMap).forEach(gid => {

      html += `
        <div style="
          margin-bottom:10px;
          padding:8px;
          border:1px solid #eee;
          border-radius:8px;
          background:#fafafa;
        ">

          <div style="
            font-weight:700;
            margin-bottom:6px;
            color:#1a237e;
          ">
            ⚾ ${gid}
          </div>
      `;

      gameMap[gid].forEach(x=>{

        let statusText = '';

        if(isFuture){

          statusText = x.is_replacement
            ? '🔵 已排（替補）'
            : '🟢 已排班';

        }else{

          statusText = x.is_replacement
            ? '🔵 替補'
            : (statusMap[x.status] || x.status);

        }

        html += `
          <div style="margin-bottom:4px;">
            ${roleMap[x.role] || x.role}：${statusText}
          </div>
        `;
      });

      html += `</div>`;
    });

    content.innerHTML = html;
  }

  modal.style.display = 'flex';
}

// 關閉Detail視窗
function closeDayDetail(){
  document.getElementById('dayDetailModal').style.display = 'none';
}


// 點空白關閉
document.addEventListener('DOMContentLoaded', ()=>{
  const modal = document.getElementById('dayDetailModal');
  if(!modal) return;

  modal.addEventListener('click', e=>{
    if(e.target.id === 'dayDetailModal'){
      closeDayDetail();
    }
  });
});

function formatRole(roleStr){

  const map = {
    admin: '系統管理員',
    chief_judge: '裁判長',
    judge: '裁判員',
    record_chief: '紀錄長',
    record: '紀錄員'
  };

  return roleStr
    .split(',')
    .map(r => map[r.trim()] || r)
    .join(' / ');
}
