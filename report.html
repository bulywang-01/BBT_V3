<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出勤報表</title>

  <style>

    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .toolbar {
      margin-bottom: 15px;
    }

    .report {
      background: #fff;
      padding: 10px;
      border-radius: 6px;
    }

    .user-row {
      margin-bottom: 16px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .user-header {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .calendar {
      display: flex;
      flex-wrap: wrap;
    }

    .day {
      width: 26px;
      height: 26px;
      line-height: 26px;
      margin: 2px;
      text-align: center;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .day.ok {
      background: #4caf50;
      color: #fff;
    }

    .day.late {
      background: #ff9800;
      color: #fff;
    }

    .day.no {
      background: #f44336;
      color: #fff;
    }

    .day.empty {
      background: #eee;
      color: #999;
    }

    .user-header .day {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-left: 4px;
    }
  </style>
</head>

<body>
<div id="header-container"></div>

  <h2>📊 出勤報表</h2>

  <div class="toolbar">
    <div id="monthButtons" class="toolbar"></div>
    <button onclick="goBack()">⬅ 返回</button>
  </div>

  <div id="reportArea"></div>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  
  <script>
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
  });
    
  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
  
    // ✅ 回上一頁
    function goBack(){
      history.back();
    }

    // 生成按鈕
    function renderMonthButtons(gameDays){
    
      // ✅ 從 gameDays 推月份（靠 Games）
      const monthsSet = new Set();
    
      gameDays.forEach(d=>{
        // 先假設用當前選擇月（因為現在後端是 dd）
        // 👉 所以這裡直接用目前 monthPicker 的值
        const current = document.getElementById('currentMonth')?.value;
        if(current){
          monthsSet.add(current);
        }
      });
    
      // 👉 因為你現在後端是用 month filter
      // 👉 所以這裡簡化：直接列固定月份（從資料來會再升級）
    
      const months = Array.from(monthsSet);
    
      let html = `<button onclick="selectMonth('ALL')">全年</button>`;
    
      months.forEach(m=>{
        const mm = m.split('-')[1];
        html += `<button onclick="selectMonth('${m}')">${Number(mm)}月</button>`;
      });
    
      document.getElementById('monthButtons').innerHTML = html;
    }


/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  currentMonth = 'ALL'; // ✅ 預設全年
  loadReport();
});

/* ✅ 載入 */
let currentMonth = 'ALL';

function selectMonth(m){
  currentMonth = m;
  loadReport();
}

function loadReport(){

  const m = currentMonth;

  console.log('month=', m);

  callApi({
    action:'getMonthlyReport',
    month:m
  }, res => {

    console.log('✅ API res:', res);

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    // ✅ render 按鈕（第一次）
    renderMonthButtons(res.gameDays);

    render(res.data, res.gameDays);
  });
}


/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  // ✅ ✅ ✅ 建立月份排序（用目前選的月份推）
  const month = document.get = '';  const month = document.getElementById('monthPicker')?.value;

  Object.values(data)
  .filter(u => {

    // ✅ ✅ ✅ 用 role 過濾（最正確）
    if(!u.role) return false;

    const roles = u.role.split(',').map(r=>r.trim());

    const allow = ['judge','chief_judge','record','record_chief'];

    return roles.some(r => allow.includes(r));
  })
  .forEach(u=>{

    // ✅ ✅ ✅ 統計
    const finished = u.summary.total - u.summary.late - u.summary.no_show;
    const late = u.summary.late;
    const no = u.summary.no_show;
    const sub = u.summary.playoff;

    html += `
      <div class="user-row">

        <div class="user-header">
          <b>${u.name}</b>

          <span class="day ok" title="完成">${finished}</span>
          <span class="day late" title="遲到">${late}</span>
          <span class="day no" title="缺席">${no}</span>
          <span class="day empty" title="替補">${sub}</span>
        </div>

        <div class="calendar">

          <span style="margin-right:8px;color:#666;">
            【${monthLabel}】
          </span>
    `;

    sortedDays.forEach(d=>{

      const key = String(d).padStart(2,'0');
      const rec = u.days[key];

      let cls = 'empty';
      let tooltip = '';

      if(rec){

        const hasNo = rec.some(x=>x.status==='no_show');
        const hasLate = rec.some(x=>x.status==='late');

        if(hasNo) cls='no';
        else if(hasLate) cls='late';
        else cls='ok';

        // ✅ ✅ ✅ 中文職務
        tooltip = rec.map(x=>{
          const roleMap = {
            'PU':'主審',
            'U1':'一壘審',
            'U2':'二壘審',
            'U3':'三壘審',
            'REC':'紀錄'
          };

          const statusMap = {
            'completed':'完成',
            'late':'遲到',
            'no_show':'缺席'
          };

          const roleName = roleMap[x.role] || x.role;
          const statusName = statusMap[x.status] || x.status;

          return `${roleName}：${statusName}`;
        }).join('\n');
      }

      html += `
        <span class="day ${cls}" title="${tooltip}">
          ${d}
        </span>
      `;
    });

    html += `
        </div>
      </div>
    `;
  });

  document.getElementById('reportArea').innerHTML = html;
}

  const monthLabel = month
    ? `${parseInt(month.split('-')[1])}月`
    : '全年';

  // ✅ 日期排序（數字）
  const sortedDays = gameDays
    .map(x=>Number(x))
    .sort((a,b)=>a-b);




  </script>

</body>
</html>
