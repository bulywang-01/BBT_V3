<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出勤報表</title>

  <style>
      /* ✅ 基本 */
      body {
        font-family: Arial;
        margin: 0;
        padding: 16px;
        background: #f5f5f5;
        font-size: 13px;
      }
      
      h2 {
        margin-bottom: 10px;
      }
      
      .toolbar {
        margin-bottom: 15px;
      }
      
      .report {
        background: #fff;
        padding: 10px;
        border-radius: 6px;
      }
      
      /* ✅ 一列一人 */
      .user-row {
        display: flex;
        align-items: flex-start;
        padding: 6px 0;
        border-bottom: 1px solid #eee;
      }
      
      /* ✅ 左側（姓名 + 統計） */
      .left-panel {
        width: 120px;
        text-align: center;
      }
      
      .user-name {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
      }
      
      .user-summary {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin-top: 2px;
      }
      
      /* ✅ 右側 */
      .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      
      /* ✅ 月份一行 */
      .month-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 2px;
      }
      
      .month-label {
        width: 30px;
        font-size: 11px;
        color: #666;
        text-align: right;
      }
      
      /* ✅ 日期容器 */
      .days {
        display: flex;
        flex-wrap: wrap;
      }
      
      /* ✅ 日期統一（含 summary） */
      .day {
        width: 18px;
        height: 18px;
        line-height: 18px;
        font-size: 10px;
        margin: 1px;
        text-align: center;
        border-radius: 3px;
        cursor: pointer;
      }
      
      /* ✅ 狀態顏色 */
      .day.ok {
        background: #4caf50;
        color: #fff;
      }
      
      .day.late {
        background: #ff9800;
        color: #fff;
      }
      
      .day.no {
        background: #f44336;
        color: #fff;
      }
      
      .day.sub {
        background: #2196f3;
        color: #fff;
      }
      
      .day.empty {
        background: #eee;
        color: #999;
      }
      
      /* ✅ 手機優化 */
      @media (max-width: 600px) {
      
        .user-row {
          flex-direction: column;
        }
      
        .left-panel {
          width: 100%;
          text-align: left;
        }
      
        .user-summary {
          justify-content: flex-start;
        }
      
        .right-panel {
          margin-top: 4px;
        }
      
        .month-label {
          width: 26px;
          text-align: left;
        }
      }      

    /* 手機版的 */
    @media (max-width: 600px) {

      body {
        font-size: 15px;   /* ✅ 大幅提升可讀性 */
      }
    
      .user-name {
        font-size: 16px;
      }
    
      .user-summary {
        gap: 6px;
      }
    
      .day {
        width: 24px;
        height: 24px;
        line-height: 24px;
        font-size: 12px;
        margin: 2px;
        
        min-width: 24px;
        min-height: 24px;

      }
    
      .month-label {
        width: 36px;
        font-size: 12px;
      }
    
      .right-panel {
        margin-top: 6px;
      }
    }

    /* 桌機版的 */
    @media (min-width: 900px) {

      body {
        font-size: 14px;
      }
    
      .user-name {
        font-size: 16px;
      }
    
      .day {
        width: 22px;
        height: 22px;
        line-height: 22px;
        font-size: 11px;
      }
    
      .month-label {
        font-size: 12px;
        width: 36px;
      }
    
      .left-panel {
        width: 140px;
      }
    }
  </style>
</head>

<body>
<div id="header-container"></div>

  <h2>📊出勤報表</h2>

  <div class="toolbar">
    <div id="monthButtons" class="toolbar"></div>
    <button onclick="setSort('score')">出勤排序</button>
    <button onclick="setSort('quality')">品質排序</button>
    <button onclick="setSort('name')">姓名排序</button>
    <button onclick="goBack()">⬅ 返回上一頁</button>
  </div>

  <div id="reportArea"></div>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  
  <script>
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
  });
    
  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
  
    // ✅ 回上一頁
    function goBack(){
      history.back();
    }

    // 生成按鈕
    function renderMonthButtons(gameDays){
    
      // ✅ 從 gameDays 推月份（靠 Games）
      const monthsSet = new Set();
    
      gameDays.forEach(d=>{
        // 先假設用當前選擇月（因為現在後端是 dd）
        // 👉 所以這裡直接用目前 monthPicker 的值
        const current = document.getElementById('currentMonth')?.value;
        if(current){
          monthsSet.add(current);
        }
      });
    
      // 👉 因為你現在後端是用 month filter
      // 👉 所以這裡簡化：直接列固定月份（從資料來會再升級）
    
      const months = Array.from(monthsSet);
    
      let html = `<button onclick="selectMonth('ALL')">全年</button>`;
    
      months.forEach(m=>{
        const mm = m.split('-')[1];
        html += `<button onclick="selectMonth('${m}')">${Number(mm)}月</button>`;
      });
    
      document.getElementById('monthButtons').innerHTML = html;
    }


/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  currentMonth = 'ALL'; // ✅ 預設全年
  loadReport();
});

/* ✅ 載入 */
let currentMonth = 'ALL';

function selectMonth(m){
  currentMonth = m;
  loadReport();
}

function loadReport(){

  const m = currentMonth;

  console.log('month=', m);

  callApi({
    action:'getMonthlyReport',
    month:m
  }, res => {

    console.log('✅ API res:', res);

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    // ✅ render 按鈕（第一次）
    renderMonthButtons(res.gameDays);

    render(res.data, res.gameDays);
  });
}

// 排序功能
let currentSort = 'score';

function sortUsers(list){

  const arr = [...list];

  if(currentSort === 'score'){
    return arr.sort((a,b)=>
      (b.summary.total || 0) - (a.summary.total || 0)
    );
  }

  if(currentSort === 'quality'){
    return arr.sort((a,b)=>
      (a.summary.no_show || 0) - (b.summary.no_show || 0)
    );
  }

  return arr.sort((a,b)=>
    (a.name || '').localeCompare(b.name || '', 'zh-Hant')
  );
}

function setSort(mode){
  currentSort = mode;
  loadReport();
}


/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  const monthMap = {};

  gameDays.forEach(fullDate=>{
    const [y, m, d] = fullDate.split('-');

    if(!monthMap[m]){
      monthMap[m] = [];
    }

    monthMap[m].push(d);
  });

  let html = '';

  const users = sortUsers(Object.values(data));

  users.forEach(u=>{

    if(u.name === '系統管理員') return;

    const finished = u.summary.total - u.summary.late - u.summary.no_show;

    html += `
      <div class="user-row">

        <div class="left-panel">
          <div class="user-name">${u.name}</div>

          <div class="user-summary">
            <span class="day ok">${finished}</span>
            <span class="day late">${u.summary.late}</span>
            <span class="day no">${u.summary.no_show}</span>
            <span class="day sub">${u.summary.playoff}</span>
          </div>
        </div>

        <div class="right-panel">
    `;

    Object.keys(monthMap)
      .sort()
      .forEach(m => {

        html += `
          <div class="month-row">
            <div class="month-label">${Number(m)}月</div>
            <div class="days">
        `;

        monthMap[m]
          .sort((a,b)=>Number(a)-Number(b))
          .forEach(d => {

            const rec = u.days[d];

            let cls = 'empty';
            let tooltip = '';

            if(rec){
              const hasNo = rec.some(x=>x.status==='no_show');
              const hasLate = rec.some(x=>x.status==='late');

              if(hasNo) cls='no';
              else if(hasLate) cls='late';
              else cls='ok';

              tooltip = rec.map(x=>x.role + '：' + x.status).join('\n');
            }

            html += `<span class="day ${cls}" title="${tooltip}">
              ${Number(d)}
            </span>`;
          });

        html += `</div></div>`;
      });

    html += `</div></div>`;
  });

  document.getElementById('reportArea').innerHTML = html;
}

  </script>

</body>
</html>
