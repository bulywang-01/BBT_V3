<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出勤報表</title>

  <style>
/* ✅ 基本 */
body {
  font-family: Arial;
  margin: 0;
  padding: 12px;
  background: #f5f5f5;
  font-size: 16px;
}

/* ✅ 一人一列 */
.user-row {
  display: flex;
  flex-direction: column;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

/* ✅ 左側 */
.left-panel {
  width: 100%;
  text-align: left;
  margin-bottom: 6px;
}

.user-name {
  font-size: 18px;
  font-weight: 700;
}

.user-summary {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}

/* ✅ 右側 */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ✅ 月份 */
.month-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.month-label {
  width: 40px;
  font-size: 13px;
}

/* ✅ 日期 */
.days {
  display: flex;
  flex-wrap: wrap;
}

.day {
  width: 28px;
  height: 28px;
  line-height: 28px;
  font-size: 14px;
  margin: 2px;
  text-align: center;
  border-radius: 4px;
}

/* ✅ 顏色 */
.day.ok { background:#4caf50; color:#fff; }
.day.late { background:#ff9800; color:#fff; }
.day.no { background:#f44336; color:#fff; }
.day.sub { background:#2196f3; color:#fff; }
.day.empty { background:#eee; color:#999; }

/* ✅ 桌機再優化 */
@media (min-width: 900px){

  body {
    font-size: 14px;
  }

  .user-row {
    flex-direction: row;
  }

  .left-panel {
    width: 140px;
    text-align: center;
  }

  .user-summary {
    justify-content: center;
  }

  .day {
    width: 22px;
    height: 22px;
    line-height: 22px;
    font-size: 11px;
  }
}

.btn {
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  background: #1976d2;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
}

.btn:hover {
  background: #1565c0;
}

.btn.back {
  background: #757575;
}

.btn.back:hover {
  background: #616161;
}

.user-role{
  font-size: 11px;
  color: #777;
  margin-left: 4px;
}

.user-row {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

/* ✅ 名字區 */
.user-header {
  margin-bottom: 4px;
}

.user-name {
  font-size: 18px;
  font-weight: 700;
}

.user-role {
  font-size: 12px;
  color: #777;
  margin-left: 6px;
}

/* ✅ KPI */
.user-kpi {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.user-kpi .label {
  font-size: 12px;
  color: #666;
}

/* ✅ 月份排版 */
.month-row {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
}

.month-label {
  width: 32px;
  font-size: 12px;
  color: #666;
}

/* ✅ 日期 */
.day {
  width: 24px;
  height: 24px;
  line-height: 24px;
  font-size: 12px;
  margin: 2px;
  text-align: center;
  border-radius: 4px;
}

/* ✅ 手機 */
@media (max-width:600px){

  body {
    font-size: 16px;
  }

  .user-name {
    font-size: 20px;
  }

  .day {
    width: 28px;
    height: 28px;
    line-height: 28px;
    font-size: 14px;
  }
}

  </style>
</head>

<body>

<div id="dayDetailModal" class="overlay" style="display:none;">
  <div class="overlay-box">
    <div id="dayDetailContent"></div>
    <button onclick="closeDayDetail()">關閉</button>
  </div>
</div>

<div id="header-container"></div>

  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <h2 style="margin:0;">📊出勤報表</h2>
  
    <div style="font-size:13px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <span class="day ok">出</span> 出勤
      <span class="day late">遲</span> 遲到
      <span class="day no">缺</span> 缺席
      <span class="day sub">補</span> 替補
    </div>
  </div>

  <div class="toolbar">
    <div id="monthButtons" class="toolbar"></div>
    <button onclick="selectMonth('ALL')" class="btn">今年度</button>
    <button onclick="setSort('score')" class="btn">出勤排序</button>
    <button onclick="setSort('quality')" class="btn">品質排序</button>
    <button onclick="setSort('name')" class="btn">姓名排序</button>
    <button onclick="goBack()" class="btn back">返回</button>
  </div>

  <div id="reportArea"></div>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  
  <script>
  // ✅ 初始化
  document.addEventListener('DOMContentLoaded',()=>{
    loadHeader();
  });
    
  function loadHeader() {
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        const hc = document.getElementById('header-container');
        if (!hc) return;
  
        hc.innerHTML = html;
  
        // ✅ 一律從 session 重新設定 role（唯一正解）
        const session = (typeof getSession === 'function')
          ? getSession()
          : JSON.parse(localStorage.getItem('session_user') || '{}');
  
        document.body.classList.remove(
          'role-admin',
          'role-judge',
          'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
  
        // ✅ 顯示登入者姓名
        if (session && session.name) {
          const nameEl = document.getElementById('header-username');
          if (nameEl) nameEl.textContent = session.name;
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
  }
  
    // ✅ 回上一頁
    function goBack(){
      history.back();
    }

    // 生成按鈕
    function renderMonthButtons(gameDays){
    
      // ✅ 從 gameDays 推月份（靠 Games）
      const monthsSet = new Set();
    
      gameDays.forEach(d=>{
        // 先假設用當前選擇月（因為現在後端是 dd）
        // 👉 所以這裡直接用目前 monthPicker 的值
        const current = document.getElementById('currentMonth')?.value;
        if(current){
          monthsSet.add(current);
        }
      });
    
      // 👉 因為你現在後端是用 month filter
      // 👉 所以這裡簡化：直接列固定月份（從資料來會再升級）
    
      const months = Array.from(monthsSet);
    
      let html = ``;
    
      months.forEach(m=>{
        const mm = m.split('-')[1];
        html += `<button onclick="selectMonth('${m}')">${Number(mm)}月</button>`;
      });
    
      document.getElementById('monthButtons').innerHTML = html;
    }


/* ✅ JSONP */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    console.log('✅ API回來:', res);
    callback(res);

    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
    + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ✅ 初始化 */
document.addEventListener('DOMContentLoaded',()=>{
  currentMonth = 'ALL'; // ✅ 預設全年
  loadReport();
});

/* ✅ 載入 */
let currentMonth = 'ALL';

function selectMonth(m){
  currentMonth = m;
  loadReport();
}

function loadReport(){

  const m = currentMonth;

  console.log('month=', m);

  callApi({
    action:'getMonthlyReport',
    month:m
  }, res => {

    console.log('✅ API res:', res);

    if(!res || res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    // ✅ render 按鈕（第一次）
    renderMonthButtons(res.gameDays);

    render(res.data, res.gameDays);
  });
}

// 排序功能
let currentSort = 'score';

function sortUsers(list){

  const arr = [...list];

  if(currentSort === 'score'){
    return arr.sort((a,b)=>
      (b.summary.total || 0) - (a.summary.total || 0)
    );
  }

  if(currentSort === 'quality'){
    return arr.sort((a,b)=>
      (a.summary.no_show || 0) - (b.summary.no_show || 0)
    );
  }

  return arr.sort((a,b)=>
    (a.name || '').localeCompare(b.name || '', 'zh-Hant')
  );
}

function setSort(mode){
  currentSort = mode;
  loadReport();
}


/* ✅ render（用真實日期） */
function render(data, gameDays){

  if(!gameDays || gameDays.length === 0){
    document.getElementById('reportArea').innerHTML =
      '⚠️ 沒有比賽資料';
    return;
  }

  const monthMap = {};

  gameDays.forEach(fullDate=>{
    const [y, m, d] = fullDate.split('-');

    if(!monthMap[m]){
      monthMap[m] = [];
    }

    monthMap[m].push(d);
  });

  let html = '';

  const users = sortUsers(Object.values(data));

  users.forEach(u=>{

    if(u.name === '系統管理員') return;

    const finished = u.summary.total - u.summary.late - u.summary.no_show;
    const roles = (u.roles || '').split(',').map(r=>r.trim()).filter(Boolean);

    html += `
      <div class="user-row">
    
        <!-- ✅ 名字 -->
        <div class="user-header">
          <div class="user-name">
            ${u.name}
            <span class="user-role">${(u.roles || '').replace(/,/g,' / ')}</span>
          </div>
        </div>
    
        <!-- ✅ KPI -->
        <div class="user-kpi">
          <span class="label">生涯：</span>
          <span class="day ok">${finished}</span>
          <span class="day late">${u.summary.late}</span>
          <span class="day no">${u.summary.no_show}</span>
          <span class="day sub">${u.summary.playoff}</span>
        </div>
    
        <!-- ✅ 日期 -->
        <div class="right-panel">
    `;


    Object.keys(monthMap)
      .sort()
      .forEach(m => {

        html += `
          <div class="month-row">
            <div class="month-label">${Number(m)}月</div>
            <div class="days">
        `;

        monthMap[m]
          .sort((a,b)=>Number(a)-Number(b))
          .forEach(d => {

            const rec = u.days[d];

            let cls = 'empty';
            let tooltip = '';

            if(rec){
              const hasNo = rec.some(x=>x.status==='no_show');
              const hasLate = rec.some(x=>x.status==='late');

              if(hasNo) cls='no';
              else if(hasLate) cls='late';
              else cls='ok';

              const roleMap = {
                PU:'主審',
                U1:'一壘審',
                U2:'二壘審',
                U3:'三壘審',
                REC_MAIN:'紀錄員',
                REC_VIDEO:'影像紀錄員',
                REC_TRAINEE:'見習紀錄員'
              };
              
              const statusMap = {
                completed:'完成',
                late:'遲到',
                no_show:'缺席'
              };
              
              tooltip = rec.map(x=>{
                return `${roleMap[x.role] || x.role}：${statusMap[x.status] || x.status}`;
              }).join('\n');

            }

            html += `
              <span class="day ${cls}" 
                onclick='showDayDetail(${JSON.stringify(rec || [])}, "${m}/${d}")'
                title="${tooltip}">
                ${Number(d)}
              </span>
            `;

          });

        html += `</div></div>`;
      });

    html += `</div></div>`;
  });

  document.getElementById('reportArea').innerHTML = html;
}

/*
✅ 手機點 → 展開
✅ 可看當天細節
✅ 不影響桌機
✅ 不改資料結構
*/
function showDayDetail(list, date){

  const modal = document.getElementById('dayDetailModal');
  const content = document.getElementById('dayDetailContent');

  if(!list || !list.length){
    content.innerHTML = `<div>📌 ${date}<br>無出勤紀錄</div>`;
  }else{

    const roleMap = {
      PU:'主審',
      U1:'一壘審',
      U2:'二壘審',
      U3:'三壘審',
      REC_MAIN:'紀錄員',
      REC_VIDEO:'影像紀錄員',
      REC_TRAINEE:'見習紀錄員'
    };

    const statusMap = {
      completed:'✅ 完成',
      late:'⏰ 遲到',
      no_show:'❌ 缺席'
    };

    // ✅ ✅ ✅ 先做去重（防止 PU / PU 重複）
    const uniqueList = [];
    const seen = new Set();

    list.forEach(x=>{
      const key = (x.game_id || '') + '_' + x.role;
      if(!seen.has(key)){
        seen.add(key);
        uniqueList.push(x);
      }
    });

    // ✅ ✅ ✅ 再依場次分組
    const gameMap = {};

    uniqueList.forEach(x=>{
      const gid = x.game_code || x.game_id || '未指定場次';

      if(!gameMap[gid]) gameMap[gid] = [];
      gameMap[gid].push(x);
    });

    let html = `
      <div style="font-weight:800;font-size:16px;margin-bottom:10px;">
        📌 ${date}
      </div>
    `;

    Object.keys(gameMap).forEach(gid => {

      html += `
        <div style="
          margin-bottom:10px;
          padding:8px;
          border:1px solid #eee;
          border-radius:8px;
          background:#fafafa;
        ">

          <div style="
            font-weight:700;
            margin-bottom:6px;
            color:#1a237e;
          ">
            ⚾ ${gid}
          </div>
      `;

      gameMap[gid].forEach(x=>{
        html += `
          <div style="margin-bottom:4px;">
            ${roleMap[x.role] || x.role}：
            ${statusMap[x.status] || x.status}
          </div>
        `;
      });

      html += `</div>`;
    });

    content.innerHTML = html;
  }

  modal.style.display = 'flex';
}

function closeDayDetail(){
  document.getElementById('dayDetailModal').style.display = 'none';
}

// 點空白關閉
document.addEventListener('DOMContentLoaded', ()=>{
  const modal = document.getElementById('dayDetailModal');
  if(!modal) return;

  modal.addEventListener('click', e=>{
    if(e.target.id === 'dayDetailModal'){
      closeDayDetail();
    }
  });
});


  </script>

</body>
</html>
