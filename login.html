<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  padding: 16px;
  background: #f5f5f5;
}

.user-row {
  margin-bottom: 14px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 8px;
}

.user-header {
  margin-bottom: 6px;
}

/* ✅ 橫向排 */
.year-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

/* ✅ 月份 */
.month-title {
  font-size: 11px;
  color: #666;
  margin: 0 6px;
}

/* ✅ 日期 */
.day {
  width: 24px;
  height: 24px;
  margin: 2px;
  text-align: center;
  line-height: 24px;
  border-radius: 4px;
  font-size: 11px;
}

.day.ok { background:#4caf50;color:#fff; }
.day.late { background:#ff9800;color:#fff; }
.day.no { background:#f44336;color:#fff; }
.day.empty { background:#eee;color:#999; }

.badge {
  padding:2px 6px;
  margin-left:4px;
  border-radius:4px;
  font-size:12px;
  color:white;
}

.badge.total { background:#9e9e9e; }
.badge.late { background:#ff9800; }
.badge.no { background:#f44336; }
.badge.regular { background:#4caf50; }
.badge.playoff { background:#3f51b5; }

</style>
</head>

<body>

<h2>📊 出勤報表</h2>

<div id="reportArea"></div>

<script>

/* ========= API ========= */
function callApi(params, callback){

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(res){
    callback(res);
    delete window[cbName];
    script.remove();
  };

  const url = API_BASE + '?' +
    Object.keys(params)
      .map(k => `${k}=${encodeURIComponent(params[k])}`)
      .join('&')
      + '&callback=' + cbName;

  script.src = url;
  document.body.appendChild(script);
}

/* ========= 載入 ========= */
function loadReport(){

  callApi({
    action:'getMonthlyReport',
    month:'2026-06'  // ✅ 先固定，保證有資料
  }, (res)=>{

    if(res.result !== 'ok'){
      alert('讀取失敗');
      return;
    }

    document.getElementById('reportArea').innerHTML =
      renderReport(res.data);
  });
}

window.onload = loadReport;

/* ========= render（穩定版改造） ========= */

function renderReport(report){

  return Object.values(report).map(u=>{

    let html = `
      <div class="user-row">

        <div class="user-header">
          <b>${u.name}</b>

          <span class="badge total">總 ${u.summary.total}</span>
          <span class="badge late">遲 ${u.summary.late}</span>
          <span class="badge no">缺 ${u.summary.no_show}</span>
          <span class="badge regular">例 ${u.summary.regular}</span>
          <span class="badge playoff">季 ${u.summary.playoff}</span>
        </div>

        <div class="year-row">
    `;

    // ✅ 直接用 dd loop（穩定）
    for(let i=1;i<=31;i++){

      const key = String(i).padStart(2,'0');
      const data = u.days[key];

      // ✅ 只算日期，不看月份（避免爆）
      const fakeDate = new Date(2026,0,i);
      if(fakeDate.getDay() !== 0) continue; // ✅ 只週日

      let cls = 'empty';
      let star = '';

      if(data){
        const hasNo = data.some(x=>x.status==='no_show');
        const hasLate = data.some(x=>x.status==='late');
        const hasPlayoff = data.some(x=>x.type!=='regular');

        if(hasNo) cls='no';
        else if(hasLate) cls='late';
        else cls='ok';

        if(hasPlayoff) star='★';
      }

      html += `
        <span class="day ${cls}">
          ${i}${star}
        </span>
      `;
    }

    html += `</div></div>`;

    return html;

  }).join('');
}
</script>

</body>
</html>
