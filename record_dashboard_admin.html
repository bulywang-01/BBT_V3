<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀錄長指派</title>

<style>
/* ===============================
   ✅ Header：強制橫版（覆蓋 sidebar）
   =============================== */

#header nav {
  display: flex !important;
  flex-direction: row !important;
  align-items: center;
  width: 100%;
}

/* ✅ 關鍵：ul 一定要橫 */
#header nav ul {
  display: flex !important;
  flex-direction: row !important;
  list-style: none;
  margin: 0;
  padding: 0;
  width: auto;
}

/* ✅ 關鍵：li 不准 block 撐整行 */
#header nav li {
  display: flex !important;
  margin: 0;
  padding: 0;
}

/* ✅ 關鍵：a 不准 100% 寬 */
#header nav li a {
  display: inline-flex !important;
  align-items: center;
  padding: 10px 14px;
  width: auto !important;
  white-space: nowrap;
  box-sizing: border-box;
}

/* ===== Header（與 judge_dashboard_admin 對齊） ===== */
#header {
  display:flex;
  align-items:center;
  gap:4px;
  padding:6px 12px;
  background:#fff;
  border-bottom:1px solid #e0e0e0;
}
#header a {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:15px;
  padding:10px 14px;
  color:#0066cc;
  text-decoration:none;
  border-radius:6px;
}
#header a:hover { background:#f2f5fa; }
#header a.active {
  background:#e3f2fd;
  color:#1565c0;
  font-weight:700;
}
#header #u_name {
  margin-left:auto;
  padding:10px 14px;
  font-weight:600;
}

/* ===== 主內容 ===== */
body {
  margin:0;
  background:#f5f6f8;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC";
}
.main {
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}

/* ===== 卡片 ===== */
.panel {
  background:#fff;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.1);
}
.game-header {
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
}

/* ===== Grid ===== */
.pos-grid {
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:14px;
}
.pos-cell {
  border:1px solid #e0e0e0;
  border-radius:10px;
  padding:12px;
  text-align:center;
}
.pos-cell.assigned {
  background:#eef5ff;
  border-color:#4a7ef5;
}
.role {
  font-weight:700;
}
.name {
  margin:6px 0;
  font-weight:700;
}
.signup-list {
  font-size:13px;
  color:#777;
}

/* ===== 按鈕 ===== */
button {
  border:none;
  border-radius:8px;
  padding:6px 14px;
  font-size:14px;
  cursor:pointer;
}
.btn-assign { background:#4a7ef5;color:#fff; }
.btn-change { background:#f39c12;color:#fff; }

/* ===== Modal ===== */
#recordModal.hidden { display:none; }
#recordModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-box {
  background:#fff;
  border-radius:14px;
  padding:20px;
  width:90%;
  max-width:420px;
}
.record-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}
.record-card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}
.record-card:hover {
  background:#eef5ff;
  border-color:#4a7ef5;
}

/* 報名姓名放在按鈕上方、放大、加顏色 */
   
.signup-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}

.signup-name.assigned {
  color: #1565c0;   /* 深藍：指派 */
}

.signup-name.signup {
  color: #2e7d32;   /* 綠：自行報名 */
}

.signup-name.other {
  color: #555;      /* 灰：他人 */
}

.signup-list{
  margin-bottom:6px;
}

.signup-name{
  line-height:1.4;
}

/* ===== 操作提示 Toast ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 260px;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  color: #fff;
  background: #323232;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
}

.toast.success {
  background: #2e7d32; /* 綠：成功 */
}

.toast.error {
  background: #c62828; /* 紅：失敗 */
}

#recordList {
  max-height: 60vh;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);  /* ✅ 一列三個 */
  gap: 8px;
}

.record-card {
  padding: 10px;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  text-align: center;
  border: 1px solid #ddd;
  font-size: 14px;
}

.record-card:hover {
  background: #f0f6ff;
}

#recordList .empty {
  grid-column: span 3;  /* ✅ 讓提示佔整列 */
  text-align: center;
  color: #777;
  padding: 12px 0;
}
</style>
</head>

<body>
<div id="header-container"></div>
<div id="toast" class="toast"></div>

<div class="main">
  <div id="content"></div>
</div>

<!-- ===== 指派 Modal ===== -->
<div id="recordModal" class="hidden">
  <div class="modal-box">
    <h3 id="recordModalTitle">指派紀錄員</h3>
    <div id="recordList" class="record-grid"></div>
    <div style="margin-top:12px;text-align:right;">
      <button onclick="closeRecordModal()">取消</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/record_dashboard_admin.js"></script>
<script>
  function loadHeader() {
    fetch('header.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('header-container').innerHTML = html;
  
        // ✅ 只用 body class 控制身份
        const session = (typeof getSession === 'function') ? getSession() : null;
        document.body.classList.remove(
          'role-admin', 'role-judge', 'role-record'
        );
  
        if (session && session.role) {
          const roles = session.role.split(',').map(r => r.trim());
  
          if (roles.includes('admin')) {
            document.body.classList.add('role-admin');
          }
          if (roles.includes('judge') || roles.includes('chief_judge')) {
            document.body.classList.add('role-judge');
          }
          if (roles.includes('record') || roles.includes('record_chief')) {
            document.body.classList.add('role-record');
          }
        }
      })
      .catch(err => console.error('Header 載入失敗', err));
    }
    
    // 裁入報名頁面重要function
    document.addEventListener('DOMContentLoaded', () => {
      loadHeader();   // 只負責 header
    });
</script>
</body>
</html>
