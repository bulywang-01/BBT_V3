<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>管理中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ 你原本就有的 JS（一定要） -->
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>

  <style>
  /* =====================================================
     基本頁面
     ===================================================== */
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f6f8;
    color: #2b2b2b;
  }
  
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  
  h2 {
    margin: 0 0 6px;
    font-size: 24px;
  }
  
  .section-title {
    margin: 28px 0 14px;
    font-size: 20px;
    font-weight: 900;
  }
  
  
  /* =====================================================
     卡片 Grid（2~3 格）
     ===================================================== */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  
  
  /* =====================================================
     功能卡片（Header 同 FU）
     ===================================================== */
  .card {
    background: #f4f6fb;
    border-radius: 18px;
    min-height: 84px;              /* 偏正方形 */
    padding: 12px;
  
    font-size: 19px;               /* ✅ 字體放大 */
    font-weight: 800;
    letter-spacing: .5px;
  
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  
    border: 1px solid #e3e7f0;
    box-shadow: none;               /* 扁平，像 header */
    cursor: pointer;
    user-select: none;
  
    transition:
      background-color .15s ease,
      border-color .15s ease;
  }
  
  .card:hover {
    background: #eef2ff;
    border-color: #cfd8ff;
  }
  
  
  /* =====================================================
     三大類顏色（靠順序，不動 HTML）
     1–2：年度總表
     3–4：班表
     5–6：其它
     ===================================================== */
  
  /* 🟦 年度總表 */
  .card:nth-child(1),
  .card:nth-child(2) {
    background: #eef2ff;
  }
  .card:nth-child(1):hover,
  .card:nth-child(2):hover {
    background: #e3e9ff;
  }
  
  /* 🟩 班表 */
  .card:nth-child(3),
  .card:nth-child(4) {
    background: #eefaf4;
  }
  .card:nth-child(3):hover,
  .card:nth-child(4):hover {
    background: #e3f6ed;
  }
  
  /* 🟨 其它 */
  .card:nth-child(5),
  .card:nth-child(6) {
    background: #fff9e6;
  }
  .card:nth-child(5):hover,
  .card:nth-child(6):hover {
    background: #fff2cc;
  }
  
  
  /* =====================================================
     Modal（乾淨版）
     ===================================================== */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  
  .modal.hidden {
    display: none;
  }
  
  .modal-content {
    background: #ffffff;
    width: 90%;
    max-width: 960px;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 18px;
  }
  
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    background: #ffffff;
  }
  
  .modal-body {
    padding: 16px;
  }
  
  
  /* =====================================================
     年度表格（管理後台風格）
     ===================================================== */
  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  
  .admin-table th,
  .admin-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #e5e7eb;
  }
  
  .admin-table th {
    text-align: left;
    font-weight: 700;
  }
  
  .admin-table td.num {
    text-align: right;
    font-weight: 600;
  }
  
  
  /* =====================================================
     手機微調（保持 header 感）
     ===================================================== */
  @media (max-width: 640px) {
    .card {
      min-height: 76px;
      font-size: 20px;
      padding: 10px;
    }
  
    .section-title {
      font-size: 18px;
    }
  }

  /* ===== 桌機表格 ===== */
  @media (min-width: 768px) {
    .desktop-only { display: block; }
    .mobile-only  { display: none; }
  }
  
  /* ===== 手機卡片 ===== */
  @media (max-width: 767px) {
    .desktop-only { display: none; }
    .mobile-only  { display: block; }
  }

    .person-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,.06);
  }
  .person-card .name {
    font-size: 18px;
    font-weight: 800;
  }
  
  /* 防止你圖中那種「全 員 裁 判」斷字 */
  th, td {
    white-space: nowrap;
  }

  /* ===== Modal 工具列 ===== */
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  
  .modal-tools {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .btn-export {
    padding: 6px 10px;
  }
  
  .btn-close {
    font-size: 20px;
    padding: 6px 12px;
  }
  
  /* ===== 人卡片（手機主體） ===== */
  .person-row {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,.06);
  }
  
  .person-name {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  
  .person-stats {
    font-size: 14px;
    margin-bottom: 8px;
  }
  
  /* 角色分佈（固定欄位，直向） */
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    font-size: 13px;
  }
  
  .role-grid div {
    background: #f3f4f6;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
  }
  
  /* ===== 桌機優化 ===== */
  @media (min-width: 768px) {
    #annualList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
  }
  </style>
  
</head>

<body>

  <!-- Header -->
  <div id="header-container"></div>

  <script>
    function loadHeader() {
      fetch('header.html')
        .then(res => res.text())
        .then(html => {
          // 1️⃣ 插入 header
          document.getElementById('header-container').innerHTML = html;
    
          // 2️⃣ 設定身分 → 只影響 body class
          const session = (typeof getSession === 'function') ? getSession() : null;
          document.body.classList.remove(
            'role-admin','role-judge','role-record'
          );
    
          if (session && session.role) {
            const roles = session.role.split(',').map(r => r.trim());
    
            if (roles.includes('admin')) {
              document.body.classList.add('role-admin');
            }
            if (roles.includes('judge') || roles.includes('chief_judge')) {
              document.body.classList.add('role-judge');
            }
            if (roles.includes('record') || roles.includes('record_chief')) {
              document.body.classList.add('role-record');
            }
          }
        })
        .catch(err => console.error('Header 載入失敗', err));
    }
    
    document.addEventListener('DOMContentLoaded', loadHeader);
</script>
  
  <div class="main">
    <h2>BBT出勤系統管理中心</h2>
    <div class="section-title"></div>

    <!-- ✅ 6 個功能框，固定存在 -->
    <div class="cards">
    
    
      <a href="judge_dashboard_admin.html">
        <div class="card">
          ⚾ 裁判員班表安排
        </div>
      </a>
    
      <a href="record_dashboard_admin.html">
        <div class="card">
          📋 紀錄員班表安排
        </div>
      </a> 
      
      <div class="card" onclick="openAnnualModal('judge')">
        📈 全員裁判年度總表
      </div>
    
      <div class="card" onclick="openAnnualModal('record')">
        📝 全員紀錄員年度總表
      </div>

    
      <a href="admin_users.html">
        <div class="card">
          👤 帳號管理
        </div>
      </a>
    
      <a href="admin_games.html">
        <div class="card">
          🏟️ 賽事管理
        </div>
      </a>
    
    </div>

  <!-- ✅ Modal 永遠在最外層，而且預設 hidden -->
  <div id="annualModal" class="modal hidden">
    <div class="modal-content">
          <!-- 桌機 -->
          <div class="desktop-only">
          </div>

      <!-- 工具列 -->
      <div class="modal-header">
        <h3 id="annualModalTitle">全員年度總表</h3>
        <div class="modal-tools">
          <select id="annualYearSelect" onchange="reloadAnnualByYear()"></select>
          <button class="btn-export" onclick="exportCSV()">匯出</button>
          <button class="btn-close" onclick="closeAnnualModal()">✕</button>
        </div>
      </div>

        <!-- 內容 -->
        <div class="modal-body">
          <div id="annualList"></div>
        </div>

    </div>
  </div>

  <script>
    /* ===== 初始化：只做 header，不碰 modal ===== */
    document.addEventListener('DOMContentLoaded', function () {
      guardAdminPage();

      fetch('header.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          // initHeaderVisibility();
        });
    });

    /* ===== 年度總表 Modal ===== */
    let currentAnnualType = null;

    function openAnnualModal(type) {
      currentAnnualType = type;

      const container = document.getElementById('annualList');
      // container.innerHTML = '載入中…';   // ✅ 清空 + loading

      document.getElementById('annualModalTitle').textContent =
        type === 'judge' ? '裁判員年度總表' : '紀錄員年度總表';

      document.getElementById('annualList').textContent = '載入中…';
      document.getElementById('annualModal').classList.remove('hidden');

      loadAvailableYears();
    }

    function closeAnnualModal() {
      document.getElementById('annualModal').classList.add('hidden');
    }

    function loadAvailableYears() {
      callApi({ action: 'getAvailableGameYears' }, res => {
        if (res.result !== 'ok') {
          document.getElementById('annualList').textContent = res.message;
          return;
        }

        const sel = document.getElementById('annualYearSelect');
        sel.innerHTML = '';

        res.years.forEach((y, i) => {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y + ' 年';
          if (i === 0) opt.selected = true;
          sel.appendChild(opt);
        });

        reloadAnnualByYear();
      });
    }

    function reloadAnnualByYear() {
      const year = document.getElementById('annualYearSelect').value;
    
      callApi({
        action: currentAnnualType === 'judge'
          ? 'getJudgeAnnualSummary_'
          : 'getRecordAnnualSummary_',
        year
      }, res => {
    
        if (res.result !== 'ok') {
          document.getElementById('annualList').textContent = res.message;
          return;
        }
    
        data = res.list;   // ✅ 🔥 很重要
        renderAnnualTable(data, currentAnnualType);
      });
    }


    // 手機版表格
    function renderAnnualTable(list, type) {
      const container = document.getElementById('annualList');
    
      // ✅ 清掉「載入中 / 舊資料」
      container.innerHTML = '';
    
      container.innerHTML = list.map(u => {
        const roles = type === 'judge'
          ? (u.positions || {})
          : (u.roles || {});
    
        let roleCells = '';
    
        if (type === 'judge') {
          const judgeRoleOrder = ['主審','一壘審','二壘審','三壘審'];
          roleCells = judgeRoleOrder
            .map(r => `<div>${r}<br><b>${roles[r] || 0}</b></div>`)
            .join('');
        } else {
          const recordRoleOrder = ['主紀錄','見習','影像'];
          roleCells = recordRoleOrder
            .map(r => `<div>${r}<br><b>${roles[r] || 0}</b></div>`)
            .join('');
        }
    
        return `
          <div class="person-row">
            <div class="person-name">${u.name}</div>
            <div class="person-stats">
              年度：${u.annual} ｜ 生涯：${u.career}
            </div>
            <div class="role-grid">
              ${roleCells}
            </div>
          </div>
        `;
      }).join('');
    }


  // 桌機表格
  function renderDesktopTable(list) {
  const rows = list.map(u => `
    <tr>
      <td>${u.name}</td>
      <td>${u.annual}</td>
      <td>${u.career}</td>
      <td>${formatDetail(u)}</td>
    </tr>
  `).join('');

  document.getElementById('annualTable').innerHTML = `
    <table class="admin-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')">姓名</th>
          <th onclick="sortBy('annual')">年度</th>
          <th onclick="sortBy('career')">生涯</th>
          <th>站位分佈</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

  // 手機卡片
  function renderMobileCards(list) {
    document.getElementById('annualCards').innerHTML =
      list.map(u => `
        <div class="person-card">
          <div class="name">${u.name}</div>
          <div class="stats">
            年度：${u.annual}　生涯：${u.career}
          </div>
          <div class="detail">${formatDetail(u)}</div>
        </div>
      `).join('');
  }

  // 排序功能
  let currentSort = { key: null, asc: true };

  function sortBy(key) {
    if (currentSort.key === key) {
      currentSort.asc = !currentSort.asc;
    } else {
      currentSort.key = key;
      currentSort.asc = true;
    }
  
    data.sort((a, b) => {
      if (typeof a[key] === 'string') {
        return currentSort.asc
          ? a[key].localeCompare(b[key])
          : b[key].localeCompare(a[key]);
      }
      return currentSort.asc ? a[key] - b[key] : b[key] - a[key];
    });
  
    renderAll();
  }
  
  function renderAll() {
    renderDesktopTable(data);
    renderMobileCards(data);
  }

  // 匯出功能
  function exportCSV() {
  const header = ['姓名','年度','生涯','站位分佈'];
  const rows = data.map(u => [
    u.name,
    u.annual,
    u.career,
    formatDetail(u)
  ]);

  const csv = [header, ...rows]
    .map(r => r.map(v => `"${v}"`).join(','))
    .join('\n');

  download(csv, '年度總表.csv');
  }

  function guardAdminPage(){

  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  if (!session.user_id){
    alert('尚未登入');
    location.replace('login.html');
    return false;
  }

  return true;
}
  </script>
</body>
</html>
