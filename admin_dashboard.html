  <script>

    function guardAdminPage(){
      const session = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (!session.user_id){
        alert('尚未登入');
        location.replace('login.html');
        return false;
      }
      return true;
    }

    function loadHeader() {
      fetch('header.html')
        .then(res => res.text())
        .then(html => {
          // 1️⃣ 插入 header
          document.getElementById('header-container').innerHTML = html;
    
          // 2️⃣ 設定身分 → 只影響 body class
          const session = (typeof getSession === 'function') ? getSession() : null;
          document.body.classList.remove(
            'role-admin','role-judge','role-record'
          );
    
          if (session && session.role) {
            const roles = session.role.split(',').map(r => r.trim());
    
            if (roles.includes('admin')) {
              document.body.classList.add('role-admin');
            }
            if (roles.includes('judge') || roles.includes('chief_judge')) {
              document.body.classList.add('role-judge');
            }
            if (roles.includes('record') || roles.includes('record_chief')) {
              document.body.classList.add('role-record');
            }
          }
        })
        .catch(err => console.error('Header 載入失敗', err));
    }
    
    document.addEventListener('DOMContentLoaded', loadHeader);
</script>

/* ===== 年度總表 Modal ===== */
let currentAnnualType = null;

function openAnnualModal(type){

  currentAnnualType = type;

  document.getElementById('annualModalTitle').textContent =
    type === 'judge' ? '裁判員年度總表' : '紀錄員年度總表';

  document.getElementById('annualList').textContent = '載入中…';
  document.getElementById('annualModal').classList.remove('hidden');

  loadAvailableYears();
}

function closeAnnualModal(){
  document.getElementById('annualModal').classList.add('hidden');
}

function loadAvailableYears(){

  callApi({ action:'getAvailableGameYears' }, res=>{

    if (!res || res.result !== 'ok'){
      document.getElementById('annualList').textContent = '讀取失敗';
      return;
    }

    const sel = document.getElementById('annualYearSelect');
    sel.innerHTML = '';

    res.years.forEach((y,i)=>{
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + ' 年';
      if (i===0) opt.selected = true;
      sel.appendChild(opt);
    });

    reloadAnnualByYear();
  });
}

function reloadAnnualByYear(){

  const year = document.getElementById('annualYearSelect').value;

  callApi({
    action:'getYearlySummary',
    year: year
  }, res=>{

    console.log(res); // ✅ debug

    if (!res || res.result !== 'ok'){
      document.getElementById('annualList').textContent =
        res?.message || '讀取失敗';
      return;
    }

    const list = currentAnnualType === 'judge'
      ? (res.judge || [])
      : (res.record || []);

    renderAnnualList(list);
  });
}

function renderAnnualList(list){

  list = list.filter(u => (u.attendance||0) > 0);

  list.sort((a,b)=>{
    if (b.final_score !== a.final_score)
      return b.final_score - a.final_score;

    return (b.attendance||0) - (a.attendance||0);
  });

  list.forEach((u,i)=>u.rank=i+1);

  document.getElementById('annualList').innerHTML = `
    <div class="annual-layout">
      <div class="annual-left">
        ${renderTable(list)}
      </div>
      <div class="annual-right">
        ${renderScoreNote()}
      </div>
    </div>
  `;
}

function renderTable(list){

  return `
  <table class="annual-table">
  <thead>
    <tr>
      <th>排名</th>
      <th>姓名</th>
      <th>等級</th>
      <th>出勤</th>
      <th>完成</th>
      <th>遲到</th>
      <th>缺席</th>
      <th>出勤分</th>
      <th>品質</th>
      <th>總分</th>
    </tr>
  </thead>

  <tbody>
  ${list.map(p=>{


    let note = '';
    
    if (p.attendance < 3){
      note = ' ⚠️';
    }
    else if (p.attendance < 5){
      note = ' ⭐';
    }

    let badge='';
    if(p.rank===1) badge='🏆';
    else if(p.rank===2) badge='🥈';
    else if(p.rank===3) badge='🥉';
    else if(p.rank<=10) badge='⭐';

    return `
    <tr onclick='openPersonDetail(${JSON.stringify(p)})' style="cursor:pointer;">
      <td>${badge} ${p.rank}</td>
      <td style="font-weight:700;">${note}${p.name}</td>
      <td class="num" style="color:#16a34a;font-weight:600;">${renderLevel(p.league_level)}</td>
      <td class="num" style="color:#16a34a;font-weight:600;">${p.attendance}</td>
      <td class="num" style="color:#16a34a">${p.completed}</td>
      <td class="num" style="color:#d97706">${p.late}</td>
      <td class="num" style="color:#dc2626">${p.no_show}</td>
      <td class="num">
        <div style="font-weight:700;color:#2563eb;">${Number(p.score_total || 0).toFixed(0)}</div>
        <div style="font-size:11px;color:#6b7280;">${p.attendance}場</div>
      </td>
      <td class="num" style="color:#16a34a;font-weight:600;">${p.quality.toFixed(2)}</td>
      <td class="score">${p.final_score.toFixed(0)}</td>
    </tr>
    `;

  }).join('')}
  </tbody>
  </table>
  `;
}

function renderScoreNote(){

  return `
  <div style="line-height:1.8">

    <div style="font-weight:700;">📌 評分公式</div>

    ✅ 總分 = 出勤分（角色加權） + 品質分

    <div style="margin-top:10px;">
    <b>1️⃣ 出勤分（左表）</b><br>
    每場分數 = 角色基礎分 × 出勤狀態 × 權重 × 比賽倍率 × 替補折算
    </div>

    <div style="margin-top:10px;">
    <b>2️⃣ 品質分（左表）</b><br>

    品質反映「可靠度與穩定性」，計算方式如下：
    </div>

    <div style="margin-top:6px;">

    ✅ 基礎分：<br>
    ・完成率越高 → 分數越高<br>
    ・遲到會扣分（影響中）<br>
    ・缺席會大幅扣分（影響高）<br><br>

    ✅ 穩定補強：<br>
    ・完成場次越多 → 額外加分（上限 +2）<br><br>

    ✅ 懲罰機制：<br>
    ・缺席 ≥ 2 場 → 額外扣分（-2）<br><br>

    ✅ 分數範圍：<br>
    ・最低 0 分，最高 10 分
    </div>

    <div style="margin-top:10px;">
    <b>3️⃣ 總分（左表）</b><br>
    總分 = 出勤分 + (品質 × 10)，並依出勤場次進行權重調整
    </div>

    <div style="margin-top:12px;">
    <b>📌 聯盟等級（左表）</b><br>
    等級依「生涯出勤 + 分數 + 品質」綜合判定
    </div>

    <div style="margin-top:10px;">
    <b>📌 場次不足判定</b><br>
    ・出勤 < 3 場 → 不列入評比（N）<br>
    ・出勤 3～4 場 → 僅供參考（C）<br>
    ・出勤 ≥ 5 場 → 正式評分
    </div>

  </div>
  `;
}

// 顯示等級
function renderLevel(lv){

  const map = {
    S:{color:'#9333ea', icon:'🟣'},
    A:{color:'#2563eb', icon:'🔵'},
    B:{color:'#16a34a', icon:'🟢'},
    C:{color:'#d97706', icon:'🟠'},
    N:{color:'#6b7280', icon:'⚪'}
  };

  const m = map[lv] || map['N'];

  return `
  <span style="font-weight:700;color:${m.color}">
    ${m.icon} ${lv}
  </span>`;
}

// 品質顏色

function getQualityColor(q){
  if (q >= 9) return '#16a34a';   // 綠
  if (q >= 7) return '#2563eb';   // 藍
  if (q >= 5) return '#d97706';   // 橘
  return '#dc2626';              // 紅
}

  new Chart(document.getElementById('roleChart'),{
    type:'pie',
    data:{
      labels:labels,
      datasets:[{
        data:data,
        backgroundColor:['#22c55e','#ef4444']
      }]
    }
  });
}
