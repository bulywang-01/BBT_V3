  <style>
  /* =====================================================
     基本頁面
     ===================================================== */
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f6f8;
    color: #2b2b2b;
  }
  
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  
  h2 {
    margin: 0 0 6px;
    font-size: 24px;
  }
  
  .section-title {
    margin: 28px 0 14px;
    font-size: 20px;
    font-weight: 900;
  }
  
  
  /* =====================================================
     卡片 Grid（2~3 格）
     ===================================================== */
  .cards {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  
  
  /* =====================================================
     功能卡片（Header 同 FU）
     ===================================================== */
  .card {
    background: #f4f6fb;
    border-radius: 18px;
    min-height: 84px;              /* 偏正方形 */
    padding: 12px;
  
    font-size: 19px;               /* ✅ 字體放大 */
    font-weight: 800;
    letter-spacing: .5px;
  
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  
    border: 1px solid #e3e7f0;
    box-shadow: none;               /* 扁平，像 header */
    cursor: pointer;
    user-select: none;
  
    transition:
      background-color .15s ease,
      border-color .15s ease;
  }
  
  .card:hover {
    background: #eef2ff;
    border-color: #cfd8ff;
  }
  
  
  /* =====================================================
     三大類顏色（靠順序，不動 HTML）
     1–2：年度總表
     3–4：班表
     5–6：其它
     ===================================================== */
  
  /* 🟦 年度總表 */
  .card:nth-child(1),
  .card:nth-child(2) {
    background: #eef2ff;
  }
  .card:nth-child(1):hover,
  .card:nth-child(2):hover {
    background: #e3e9ff;
  }
  
  /* 🟩 班表 */
  .card:nth-child(3),
  .card:nth-child(4) {
    background: #eefaf4;
  }
  .card:nth-child(3):hover,
  .card:nth-child(4):hover {
    background: #e3f6ed;
  }
  
  /* 🟨 其它 */
  .card:nth-child(5),
  .card:nth-child(6) {
    background: #fff9e6;
  }
  .card:nth-child(5):hover,
  .card:nth-child(6):hover {
    background: #fff2cc;
  }
  
  .card-annual{ background:#eef2ff;}
  .card-schedule{ background:#eefaf4;}
  .card-admin{ background:#fff9e6;}
  .card-execution{
    background:#ecfdf5;
    border:1px solid #bbf7d0;
  }

  /* 出勤報表 */
  .card-report {
    background: #3f51b5;
    color: #fff;
  }

  /* =====================================================
     Modal（乾淨版）
     ===================================================== */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  
  .modal.hidden {
    display: none;
  }
  
  .modal-content {
    background: #ffffff;
    width: 90%;
    max-width: 960px;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 18px;
  }
  
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    background: #ffffff;
  }
  
  .modal-body {
    padding: 16px;
  }
  
  
  /* =====================================================
     年度表格（管理後台風格）
     ===================================================== */
  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  
  .admin-table th,
  .admin-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #e5e7eb;
  }
  
  .admin-table th {
    text-align: left;
    font-weight: 700;
  }
  
  .admin-table td.num {
    text-align: right;
    font-weight: 600;
  }
  
  
  /* =====================================================
     手機微調（保持 header 感）
     ===================================================== */
  @media (max-width: 640px) {
    .card {
      min-height: 76px;
      font-size: 20px;
      padding: 10px;
    }
  
    .section-title {
      font-size: 18px;
    }
  }

  /* ===== 桌機表格 ===== */
  @media (min-width: 768px) {
    .desktop-only { display: block; }
    .mobile-only  { display: none; }
  }
  
  /* ===== 手機卡片 ===== */
  @media (max-width: 767px) {
    .desktop-only { display: none; }
    .mobile-only  { display: block; }
  }

    .person-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,.06);
  }
  .person-card .name {
    font-size: 18px;
    font-weight: 800;
  }
  
  /* 防止你圖中那種「全 員 裁 判」斷字 */
  th, td {
    white-space: nowrap;
  }
  
  /* ✅ ✅ ✅ 特例：允許說明區換行 */
  .annual-right,
  .annual-right * {
    white-space: normal !important;
  }

  /* ===== Modal 工具列 ===== */
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  
  .modal-tools {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .btn-export {
    padding: 6px 10px;
  }
  
  .btn-close {
    font-size: 20px;
    padding: 6px 12px;
  }
  
  /* ===== 人卡片（手機主體） ===== */
  .person-row {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,.06);
  }
  
  .person-name {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  
  .person-stats {
    font-size: 14px;
    margin-bottom: 8px;
  }
  
  /* 角色分佈（固定欄位，直向） */
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    font-size: 13px;
  }
  
  .role-grid div {
    background: #f3f4f6;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
  }
  
  /* ===== 桌機優化 ===== */
  /* 年度排名 */
  .annual-table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
  }
  
  .annual-table th{
    background:#f3f4f6;
    padding:10px;
    text-align:left;
    font-weight:700;
  }
  
  .annual-table td{
    padding:10px;
    border-bottom:1px solid #e5e7eb;
  }
  
  .rank-badge{
    font-size:18px;
  }
  
  .score{
    font-weight:700;
    color:#2563eb;
  }

  .annual-layout{
    display:flex;
    gap:20px;
    align-items:flex-start;   /* ✅ 防止被撐歪 */
  }
  
  .annual-left{
    flex:1;
    min-width:0;
  }
  
  .annual-right{
    /* flex:1; */
    background:#fafafa;
    padding:14px;
    border-radius:12px;
    font-size:13px;
    flex: 0 0 260px;   /* ✅ 固定右側 */
    max-width:280px;     /* ✅ 限制寬度（關鍵） */
    white-space:normal;  /* ✅ 可換行 */
    line-height:1.5;
    overflow-wrap: break-word;  /* 避免英文 / 長字串爆版 */

  }
  
  /* ✅ 手機自動改上下 */
  @media (max-width: 768px){
    .annual-layout{
      flex-direction:column;
    }
  }

  .group-title{
    margin:16px 0 8px;
    font-weight:800;
    color:#374151;
    font-size:14px;
  }
  </style>
  
</head>

<body>

  <!-- Header -->
  <div id="header-container"></div>

  <script>

    function guardAdminPage(){
      const session = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (!session.user_id){
        alert('尚未登入');
        location.replace('login.html');
        return false;
      }
      return true;
    }

    function loadHeader() {
      fetch('header.html')
        .then(res => res.text())
        .then(html => {
          // 1️⃣ 插入 header
          document.getElementById('header-container').innerHTML = html;
    
          // 2️⃣ 設定身分 → 只影響 body class
          const session = (typeof getSession === 'function') ? getSession() : null;
          document.body.classList.remove(
            'role-admin','role-judge','role-record'
          );
    
          if (session && session.role) {
            const roles = session.role.split(',').map(r => r.trim());
    
            if (roles.includes('admin')) {
              document.body.classList.add('role-admin');
            }
            if (roles.includes('judge') || roles.includes('chief_judge')) {
              document.body.classList.add('role-judge');
            }
            if (roles.includes('record') || roles.includes('record_chief')) {
              document.body.classList.add('role-record');
            }
          }
        })
        .catch(err => console.error('Header 載入失敗', err));
    }
    
    document.addEventListener('DOMContentLoaded', loadHeader);
</script>
  
  <div class="main">
    <h2>BBT出勤系統管理中心</h2>
    <div class="section-title"></div>

    <!-- ✅ 功能框，固定存在 -->

  <!-- ✅ Modal 永遠在最外層，而且預設 hidden -->
  <div id="annualModal" class="modal hidden">

      <!-- 工具列 -->

  <script>
    /* ===== 初始化：只做 header，不碰 modal ===== */
    document.addEventListener('DOMContentLoaded', function () {
      guardAdminPage();

      fetch('header.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          // initHeaderVisibility();
        });

    /* 出勤報表 */

      location.href = 'report.html';

/* ===== 年度總表 Modal ===== */
let currentAnnualType = null;

function openAnnualModal(type) {
  currentAnnualType = type;

  document.getElementById('annualModalTitle').textContent =
    type === 'judge' ? '裁判員年度總表' : '紀錄員年度總表';

  document.getElementById('annualList').textContent = '載入中…';
  document.getElementById('annualModal').classList.remove('hidden');

  loadAvailableYears();
}

function closeAnnualModal() {
  document.getElementById('annualModal').classList.add('hidden');
}

/* ===== 年份 ===== */
function loadAvailableYears() {
  callApi({ action: 'getAvailableGameYears' }, res => {

    if (res.result !== 'ok'){
      document.getElementById('annualList').textContent = res.message;
      return;
    }

    const sel = document.getElementById('annualYearSelect');
    sel.innerHTML = '';

    res.years.forEach((y,i)=>{
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + ' 年';
      if (i===0) opt.selected = true;
      sel.appendChild(opt);
    });

    reloadAnnualByYear();
  });
}

/* ===== 核心讀資料 ===== */
function reloadAnnualByYear(){

  const year = document.getElementById('annualYearSelect').value;

  callApi({
    action:'getYearlySummary',
    year: year
  }, res=>{

    if (!res || res.result !== 'ok'){
      document.getElementById('annualList').textContent = '讀取失敗';
      return;
    }

    // ✅ ✅ ✅ 分群（後端已分）
    const list = currentAnnualType === 'judge'
      ? (res.judge || [])
      : (res.record || []);

    renderAnnualList(list);
  });
}

/* ===== 主畫面 ===== */
function renderAnnualList(list){

  const el = document.getElementById('annualList');

  // ✅ 只留有出勤
  list = list.filter(u => (u.attendance || 0) > 0);

  // ✅ 排序
  list.sort((a,b)=>{
    const sa = Number(b.final_score||0) - Number(a.final_score||0);
    if (sa !== 0) return sa;

    const qa = Number(b.quality||0) - Number(a.quality||0);
    if (qa !== 0) return qa;

    return (b.attendance||0) - (a.attendance||0);
  });

  list.forEach((u,i)=>u.rank=i+1);

  el.innerHTML = `
    <div class="annual-layout">
      <div class="annual-left">
        ${renderTable(list)}
      </div>
      <div class="annual-right">
        ${renderScoreNote()}
      </div>
    </div>
  `;
}

/* ===== 表格 ===== */
function renderTable(list){

  return `
  <table class="annual-table">

  <thead>
    <tr>
      <th>排名</th>
      <th>姓名</th>
      <th>出勤</th>
      <th>完成</th>
      <th>遲到</th>
      <th>缺席</th>
      <th>完成率</th>
      <th>品質</th>
      <th>總分</th>
    </tr>
  </thead>

  <tbody>

  ${list.map(p=>{

    const total = p.attendance || 1;
    const completeRate = (p.completed / total * 100);

    let badge='';
    if (p.rank===1) badge='🏆';
    else if (p.rank===2) badge='🥈';
    else if (p.rank===3) badge='🥉';
    else if (p.rank<=10) badge='⭐';

    return `
    <tr>

      <td class="rank-badge">${badge} ${p.rank}</td>

      <td style="font-weight:700;">
        ${p.name}
      </td>

      <td class="num">${p.attendance||0}</td>

      <td class="num" style="color:#16a34a">
        ${p.completed||0}
      </td>

      <td class="num" style="color:#d97706">
        ${p.late||0}
      </td>

      <td class="num" style="color:#dc2626">
        ${p.no_show||0}
      </td>

      <td class="num">
        ${isNaN(completeRate)?0:completeRate.toFixed(0)}%
      </td>

      <td class="num">
        ${Number(p.quality||0).toFixed(2)}
      </td>

      <td class="score">
        ${Number(p.final_score||0).toFixed(0)}
      </td>

    </tr>
    `;
  }).join('')}

  </tbody>
  </table>
  `;
}

/* ===== 說明 ===== */
function renderScoreNote(){

  return `
  <div style="line-height:1.8">

    <div style="font-weight:700">📌 評分制度</div>

    <div>
      ✅ 總分 = 出勤分 + 品質分 + 證照加權
    </div>

    <div style="margin-top:8px;">
      • 出勤：完成 + 遲到 + 缺席<br>
      • 品質：完成率 - 遲到與缺席影響<br>
      • 分數來源：Assignment 實際紀錄
    </div>

    <div style="margin-top:12px;font-weight:700">📌 解讀方式</div>

    <div>
      ✅ 出勤高 + 品質高 → 排名前<br>
      ⚠️ 場次少者排名僅供參考
    </div>

  </div>
  `;
}

  </script>
