<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判報名</title>

<style>
/* Header 裡的工具列對齊 */
#header .nav,
#header .header,
#header .header-right {
  display: flex;
  align-items: center;
}

/* 使用者名稱 */
#header #u_name {
  font-weight: 600;
  margin-left: 8px;
}

/* ===============================
   基本版型
================================ */
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
  font-size: 15px;
}

.main {
  padding: 20px;
}

/* =====================================
 ✅ Panel 強化
===================================== */

.panel {
  background: #ffffff;
  padding: 20px 22px;
  margin-bottom: 24px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* 日期標題 */
h3 {
  margin: 28px 0 10px;
  font-size: 20px;
  font-weight: 800;
  color: #1a237e;
}

/* 組別標題（大聯盟／小聯盟） */
.panel > div:first-child {
  font-size: 16px;
  font-weight: 800;
  color: #0d47a1;
  margin-bottom: 10px;
  padding-left: 6px;
  border-left: 4px solid #0d47a1;
}

/* ===============================
   Table（桌機）
================================ */
/* ✅ 表格全部置中（統一控制） */
table th,
table td {
  text-align: center;
  vertical-align: middle;  /* ✅ 上下也置中 */
}

/* ===== 專業後台表格 ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* 表頭 */
th {
  background: linear-gradient(135deg, #0d4c63, #1976d2);

  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  border: none;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* 內容 */
td {
  padding: 10px 12px;
  font-size: 16px;
  text-align: center;
  vertical-align: middle;
  border-bottom: 1px solid #e5e7eb;
}

/* =====================================
 ✅ 對戰強化
===================================== */
/* 對戰給最大空間 */
td:nth-child(4),
td:nth-child(5) {
  font-weight: 800;
  font-size: 17px;

}

/* 場次窄一點 */

th:first-child {

/* 時間 */

th:nth-child(2) {

  position: sticky;
  top: 0;
  z-index: 2;

/* zebra */

}

/* hover */

  background: #e3f2fd;
}


tbody tr:hover {

.col-game-id {
  font-weight: 800;
  text-align: center;
}

/* =====================================
 ✅ 場次 Badge（桌機 + 手機統一）
===================================== */

.game-badge {
  display: inline-block;
  padding: 1px 6px;
  font-size: 13px;
  font-weight: 800;
  border-radius: 999px;
  color: #fff;
  line-height: 1.4;
  white-space: nowrap;
  background: #2563eb;   /* ✅ 補這行 */

}

/* 已完賽 */
.game-badge.expired {
  background: #9ca3af;
}

/* ✅ 強制場次一定顯示（最終保命寫法） */
.game-badge,
.game-code.badge {
  color: #ffffff;
  opacity: 1;
  text-shadow: 0 0 0 #ffffff;  /* ✅ 防止被灰化 */
}


/* =====================================
 ✅ 狀態
===================================== */

/* 已完賽（過期） */

tr.expired {
  background: #f9fafb;
}

/* ✅ 禁止吃掉子元素顏色 */
tr.expired td {
  color: inherit;
}

/* 額滿 */
tr.full {
  background: #fff5f5;
}

.umpire-full {

/* ===============================
   桌機站位
================================ */
.pos-cell {

.cell-na {

/* 已選 */

================================ */

<script>
function loadHeader() {
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      // ✅ 只用 body class 控制身份
      const session = (typeof getSession === 'function') ? getSession() : null;
      document.body.classList.remove(
        'role-admin', 'role-judge', 'role-record'
      );

      if (session && session.role) {
        const roles = session.role.split(',').map(r => r.trim());

        if (roles.includes('admin')) {
          document.body.classList.add('role-admin');
        }
        if (roles.includes('judge') || roles.includes('chief_judge')) {
          document.body.classList.add('role-judge');
        }
        if (roles.includes('record') || roles.includes('record_chief')) {
          document.body.classList.add('role-record');
        }
      }
    })
    .catch(err => console.error('Header 載入失敗', err));
  }
  
  // 裁入報名頁面重要function
  document.addEventListener('DOMContentLoaded', () => {
    loadHeader();   // 只負責 header
    loadGames();    // 或該頁真正的資料初始化
    initMonthTabs();  // 初始化月班表選擇
  });
</script>

<script>
function getName(v){
  if (!v) return '—';
  if (typeof v === 'object') return v.name || '—';
  return v;
}

// 組別對應顏色
function applyCategoryBadgeColor() {
  const colorMap = {
    '大聯盟': '#2563eb',   // 藍
    '小聯盟': '#16a34a',   // 綠
    '六年級': '#d97706',   // 黃
    '五年級': '#9333ea',   // 紫
    'U12': '#ef4444'       // 紅
  };

  document.querySelectorAll('.game-code.badge').forEach(el => {
    const cat = el.dataset.category;
    const color = colorMap[cat] || '#6b7280'; // 預設灰
    el.style.backgroundColor = color;
  });
}

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.remove();
}

/* ===== 狀態 ===== */
let allGames = [];
let selectedPositions = {}; // game_id -> role
let games = [];

/* ===== API ===== */
function loadGames() {
  const session = JSON.parse(localStorage.getItem('session_user') || {});
  showLoading('載入賽事資料中...');

  callApi(
    { action:'getSignableGames', user_id: session.user_id || '' },
    res => {
      hideOverlay();

      if (!res || res.result !== 'ok') {
        showMessage(res?.message || '無法取得賽事資料');
        return;
      }

      allGames = res.games || [];
      render();
      renderMobile();

    }
  );
}

/* ===== 工具 ===== */
function cancelSelected(gameId) {
  delete selectedPositions[gameId];
  render();
  renderMobile();

}
  
function cancelSelectedByDate() {
  if (!Object.keys(selectedPositions).length) {
    alert('目前沒有已選擇的站位');
    return;
  }

  const date = prompt('請輸入要取消的日期（yyyy/MM/dd）');
  if (!date) return;

  let removed = 0;

  allGames.forEach(g => {
    if (g.date === date && selectedPositions[g.game_id]) {
      delete selectedPositions[g.game_id];
      removed++;
    }
  });

  if (!removed) {
    alert('該日期沒有已選擇的站位');
  } else {
    alert(`已取消 ${date} 的 ${removed} 筆選擇`);
    render();
    renderMobile();

  }
}

function formatTime(t){
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}

function rememberSelection(gameId, role, btn) {
  // 清掉舊選擇
  // delete selectedPositions[gameId];
  selectedPositions[gameId] = role;

  // 清除同場所有已選外觀
  document
    .querySelectorAll(`.signup-btn[data-game="${gameId}"]`)
    .forEach(b => b.classList.remove('selected'));

  // 標記目前按下的按鈕
  if (btn) {
    btn.classList.add('selected');
  }

  // ✅ 一定要在 if 外
  render();
  renderMobile();
}

/* ✅ ✅ ✅ 核心：統一時間 */
function timeToMinutes(t){
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

/* 舊的
function timeToMinutesSafe(t) {
  if (!t) return 0;

  if (typeof t === 'string' && t.includes(':')) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  if (t instanceof Date) {
    return t.getHours() * 60 + t.getMinutes();
  }

  return 0;
}
*/

function timeToMinutesSafe(t){
  return timeToMinutes(t);
}


/* ✅ ========= 主 render ========= */


function render(){

  const root = document.getElementById('content');
  root.innerHTML = '';

  if (!games || !games.length){
    root.innerHTML = '<div>沒有資料</div>';
    return;
  }

  const groups = {};

  // ✅ 依日期分組
  games.forEach(g=>{
    if (!shouldRenderGame(g)) return;

    if (!groups[g.date]) groups[g.date] = [];
    groups[g.date].push(g);
  });

  Object.keys(groups)
    .sort((a,b)=>new Date(a)-new Date(b))
    .forEach(date=>{

      root.innerHTML += `<h3 style="margin:16px">${date}</h3>`;

      // ✅ 再依場地分組
      const fieldMap = {};

      groups[date].forEach(g=>{
        if (!fieldMap[g.field]) fieldMap[g.field] = [];
        fieldMap[g.field].push(g);
      });

      Object.keys(fieldMap).forEach(field=>{

        const list = fieldMap[field];

        // ✅ 判斷是否同場地多組別
        const multiCategory =
          [...new Set(list.map(x=>x.category))].length > 1;

        // ✅ ✅ ✅ 核心排序
        list.sort((a,b)=>{

          // ✅ 同場地 → 只看時間
          if (multiCategory){
            return getTime(a).localeCompare(getTime(b));
          }

          // ✅ 不同組 → 先類別
          if (a.category !== b.category){
            return a.category.localeCompare(b.category);
          }

          // ✅ 再時間
          return getTime(a).localeCompare(getTime(b));
        });

        // ✅ 卡片容器（桌機 2欄）
        root.innerHTML += `<div class="card-grid">`;

        list.forEach(g=>{
          root.innerHTML += renderGameCard(g);
        });

        root.innerHTML += `</div>`;

      });

    });
}



/* =========================
 ✅ 單列
========================= */

function renderRow(g){

  const isPast = isPastGame(g.date);

  const occupied = g.judges || {};
  const assigned = Object.values(occupied).filter(x=>x).length;

  return `
    <tr class="${isPast?'expired':''}">
      <td>${g.game_code}</td>
      <td>${getTime(g)}</td>
      <td>${g.category}</td>
      <td>${g.away_team}</td>
      <td>${g.home_team}</td>
      <td>${g.field}</td>
      <td>${assigned}/${g.need_count}</td>

      ${['PU','U1','U2','U3'].map(role=>{
        return `<td>${renderPos(g,role,isPast)}</td>`;
      }).join('')}

    </tr>
  `;
}


/* ===== 手機 ===== */
function renderMobile(){

  const root=document.getElementById('mobileView');
  root.innerHTML='';

  const grouped={};

  allGames.forEach(g=>{
    if(!grouped[g.date])grouped[g.date]={};
    if(!grouped[g.date][g.category])grouped[g.date][g.category]=[];
    grouped[g.date][g.category].push(g);
  });

  Object.keys(grouped).sort().forEach(date=>{

    const box=document.createElement('div');
    box.innerHTML=`<h3>${date}</h3>`;

    Object.keys(grouped[date]).forEach(cat=>{

      grouped[date][cat]
        .sort((a,b)=>timeToMinutes(getTime(a))-timeToMinutes(getTime(b)))
        .forEach(g=>{

          box.innerHTML+=`
            <div class="game-card">
              <div>⏰ ${getTime(g)}</div>
              <div>${g.game_code}</div>
              <div>${g.away_team} vs ${g.home_team}</div>
            </div>
          `;
        });

    });

    root.appendChild(box);

  });

}

/* ✅ ✅ ✅ 拆出：render 每一列 */
function renderGameRow(g, today) {

  const tr = document.createElement('tr');

  const gd = new Date(g.date.replace(/\//g,'-'));
  const isPast = gd < today;

  if (isPast) tr.classList.add('expired');

  /* ✅ ✅ ✅ 正確計算人數（關鍵修正） */
  const occupied = g.judges || {};
  const assigned = Object.values(occupied).filter(v => v && v !== '').length;

  const need = Number(g.need_count) || 0;

  let umpireCell = '';

  if (need === 0) {
    umpireCell = '<span class="umpire-na">不需裁判</span>';
  } else if (assigned >= need) {
    umpireCell = '<span class="umpire-full"><strong>已額滿</strong></span>';
    tr.classList.add('full');
  } else {
    umpireCell = `${assigned}/${need}`;
  }

  tr.innerHTML = `
    <td><span class="game-badge ${isPast ? 'expired' : ''}">${g.game_code}</span></td>
    <td>${g.time}</td>
    <td>${g.category || ''}</td>
    <td>${g.away_team || ''}</td>
    <td>${g.home_team || ''}</td>
    <td>${g.field || ''}</td>

    <!-- ✅ ✅ ✅ 時長修正 -->
    <td>${g.duration ? g.duration + ' 分鐘' : '-'}</td>

    <td>${umpireCell}</td>

    ${['PU','U1','U2','U3'].map(role => {
      return `<td>${renderPos(g, role, isPast)}</td>`;
    }).join('')}
  `;

  return tr;
}


/* ✅ ========= 報名核心 ========= */

function renderPos(g, role, isPast){

  const need = g.need_count || 0;

  if (
    need===0 ||
    (need===1 && role!=='PU') ||
    (need===2 && ['U2','U3'].includes(role)) ||
    (need===3 && role==='U2')
  ){
    return '<span style="color:#999">—</span>';
  }

  const occupied = g.judges||{};
  const name = occupied[role] || '';

  // ✅ 過期鎖死
  if (isPast){
    return name || '';
  }

  if (name){

    if (g.my_position === role){
      return `
        <span style="color:#2e7d32;font-weight:700">
          ★ ${name}
          <span style="color:red;cursor:pointer"
            onclick="cancelMySignup('${g.my_signup_id}')">
            [取消]
          </span>
        </span>
      `;
    }

    return name;
  }

  if (g.my_position){
    return '<span style="color:#999">待位</span>';
  }

  return `
    <span style="color:#1976d2;cursor:pointer;font-weight:700"
      onclick="signupJudgeInstant('${g.game_id}','${role}')">
      點選
    </span>
  `;
}


  
// 手機版 ${renderTimeHHmm(g.time_range)}
 
function renderMobile() {

  const root = document.getElementById('mobileView');
  if (!root) return;

  root.innerHTML = '';

  const grouped = groupGamesForMobile(allGames);

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // ✅ ✅ ✅ 日期排序（防止 5/10 排在 5/2 前面）
  const dates = Object.keys(grouped).sort((a, b) => {
    return new Date(a.replace(/\//g, '-')) - new Date(b.replace(/\//g, '-'));
  });

  // ✅ ✅ ✅ 全年提示
  if (currentMonth === null) {
    root.insertAdjacentHTML(
      'beforeend',
      '<div class="hint">※ 過期賽事請看「單月班表」</div>'
    );
  }

  dates.forEach(date => {

    const isPast = isPastGame(date);

    // ✅ ✅ ✅ 🔥關鍵修正：只有全年才擋
    if (currentMonth === null && isPast) return;

    const dateBox = document.createElement('div');
    dateBox.className = 'm-date-box';

    // ✅ ✅ ✅ 單月灰底
    if (currentMonth !== null && isPast) {
      dateBox.style.background = '#f3f4f6';
      dateBox.style.opacity = '0.85';
    }

    dateBox.innerHTML = `<div class="m-date-title">📅 ${date}</div>`;

    Object.keys(grouped[date]).forEach(category => {

      const groupBox = document.createElement('div');
      groupBox.className = 'm-group-box';

      groupBox.innerHTML = `<div class="m-group-title">${category}</div>`;

      grouped[date][category]
        .sort((a, b) =>
          timeToMinutesSafe(a.time_range) -
          timeToMinutesSafe(b.time_range)
        )
        .forEach(g => {

          const isPastGameRow = isPastGame(g.date);

          groupBox.innerHTML += `
            <div class="game-card ${isPastGameRow ? 'expired-card' : ''}">
              
              <div class="mobile-time-row">
                <div class="time">⏰ ${g.time}</div>

                <div class="game-code badge ${isPastGameRow ? 'expired' : ''}"
                  data-category="${g.category || ''}">
                  ${g.game_code || ''}
                </div>

                <div class="field">📍 ${g.field}</div>
              </div>

              <div class="mobile-teams">
                <strong>${g.away_team}</strong>
                <span class="vs">vs</span>
                <strong>${g.home_team}</strong>
              </div>

              ${renderMobilePosGrid(g)}

            </div>
          `;
        });

      dateBox.appendChild(groupBox);
    });

    root.appendChild(dateBox);
  });

  applyCategoryBadgeColor();
}




// ✅ 裁判頁手機版：依 日期 → 組別 → 場次 分組
function groupGamesForMobile(games) {
  const map = {};

  games.forEach(g => {
    const date = g.date; // yyyy/MM/dd
    const category = g.category || '未分類';

    if (!map[date]) map[date] = {};
    if (!map[date][category]) map[date][category] = [];

    map[date][category].push(g);
  });

  // ✅ 每個組別內依「裁判頁時間欄位」排序
  Object.values(map).forEach(catMap => {
    Object.values(catMap).forEach(list => {
      list.sort((a, b) =>
        timeToMinutesSafe(a.time_range) -
        timeToMinutesSafe(b.time_range)
      );
    });
  });

  return map;
}

function renderMobilePosGrid(g) {
  if (isPastGame(g.date)){
    return `
      <div class="mobile-pos-grid">
        ${['PU','U1','U2','U3'].map(role=>{
          return `<div>${getName(g.judges[role])}</div>`;
        }).join('')}
      </div>
    `;
  }

  
  const ROLE_NAME = {
  PU: '主審',
  U1: '一壘',
  U2: '二壘',
  U3: '三壘'
  };
  
  const roles = ['PU', 'U1', 'U2', 'U3'];
  const today = new Date(); today.setHours(0,0,0,0);
  const isPast = new Date(g.date.replace(/\//g,'-')) < today;


  const occupied = g.judges || {};

  function needNA(role) {
    return (
      g.need_count === 0 ||
      (g.need_count === 1 && role !== 'PU') ||
      (g.need_count === 2 && ['U2','U3'].includes(role)) ||
      (g.need_count === 3 && role === 'U2')
    );
  }

  return `
  
     <!-- ✅ 站位標籤列 -->
     <div class="mobile-pos-labels">
       <div>主審</div>
       <div>一壘</div>
       <div>二壘</div>
       <div>三壘</div>
     </div>
   
     <!-- ✅ 站位內容 -->

    <div class="mobile-pos-grid">
      ${roles.map(role => {
        if (needNA(role)) {
          return `<div class="mobile-pos"><span class="mobile-pos-na">-</span></div>`;
        }

        if (occupied[role]) {
          const isMe = g.my_position === role;
          return `
            <div class="mobile-pos">
              <span class="${isMe ? 'mobile-judge-me' : ''}">
                ${isMe ? '★ ' : ''}${getName(occupied[role])}
              </span>
              ${
                isMe
                  ? `<span class="mobile-cancel"
                         onclick="cancelMySignup('${g.my_signup_id}')">取消</span>`
                  : ''
              }
            </div>
          `;
        }

        if (g.my_position) {
          return `<div class="mobile-pos"><span class="mobile-pos-hint">待位中</span></div>`;
        }

        if (selectedPositions[g.game_id] === role) {
          return `
            <div class="mobile-pos">
              <div class="mobile-pos-btn selected"
                   onclick="cancelSelected('${g.game_id}')">選定</div>
            </div>
          `;
        }

        return `
          <div class="mobile-pos">
            <div class="mobile-pos-btn"
              onclick="signupJudgeInstant('${g.game_id}','${role}')">
              ${ROLE_NAME[role]}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

 
function renderTimeHHmm(t) {
  if (!t) return '';

  // ✅ 已經是字串（08:30）
  if (typeof t === 'string') {
    // 保險：如果已經是 HH:mm，直接回傳
    if (/^\d{1,2}:\d{2}$/.test(t)) {
      return t;
    }
    // 其他字串就原樣回
    return t;
  }

  // ✅ 是 Date 物件（1899-12-30）
  if (t instanceof Date) {
    return (
      t.getHours().toString().padStart(2, '0') +
      ':' +
      t.getMinutes().toString().padStart(2, '0')
    );
  }

  // 其他型別（保險）
  return String(t);
}
 
/* ===== 送出 ===== */

function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if (!entries.length){
    showMessage('尚未選擇站位');
    return;
  }

  const session = ensureLogin();
  if (!session) return;

  const payload = entries.map(
    id => `${id}:${selectedPositions[id]}`
  );

  // ✅ 顯示存入中
  showLoading('報名資料存入中...');

  callApi(
    {
      action: 'judgeSignupByGames',
      user_id: session.user_id,
      games_with_position: payload.join(',')
    },
    res => {
      if (res && res.result === 'ok') {
        showMessage('✅ 報名成功');
        setTimeout(() => location.reload(), 800);
      } else {
        showMessage(res?.message || '❌ 報名失敗');
      }
    }
  );
}

function showLoading(msg){

  const overlay = document.getElementById('overlay');
  const text = document.getElementById('overlay-text');
  const ok = document.getElementById('overlay-ok');

  text.textContent = msg || '處理中...';

  ok.style.display = 'none';
  overlay.classList.add('show');
}

function hideOverlay(){
  document.getElementById('overlay').classList.remove('show');
}


// 訊息function
function showMessage(msg){

  const overlay = document.getElementById('overlay');
  const text = document.getElementById('overlay-text');
  const ok = document.getElementById('overlay-ok');

  text.textContent = msg;

  ok.style.display = 'inline-block';

  ok.onclick = () => {
    hideOverlay();
  };

  overlay.onclick = (e) => {
    if (e.target === overlay){
      hideOverlay();
    }
  };

  overlay.classList.add('show');

  // ✅ ✅ ✅ 自動關閉（最重要）
  setTimeout(()=>{
    hideOverlay();
  }, 1200);
}


function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}


/* ✅ ========= 取消 ========= */

function cancelMySignup(signupId){

  const session = JSON.parse(localStorage.getItem('session_user')||'{}');

  showLoading('取消中...');

  callApi({
    action:'cancelJudgeSignup',
    user_id:session.user_id,
    signup_id:signupId
  },res=>{
    showMessage('✅ 已取消');
    reloadCurrentView();
  });

}


/* ✅ ========= 報名 ========= */

function signupJudgeInstant(gameId, role){

  const session = JSON.parse(localStorage.getItem('session_user')||'{}');

  showLoading('報名中...');

  callApi({
    action:'judgeSignupByGames',
    user_id: session.user_id,
    games_with_position:`${gameId}:${role}`
  },res=>{
    showMessage(res.result==='ok'?'✅ 成功':res.message||'失敗');
    reloadCurrentView();
  });

}


// 初始化月份
let currentMonth = null;

function initMonthTabs() {

  const now = new Date();
  const year = now.getFullYear();

  const container = document.getElementById('month-tabs');
  container.innerHTML = '';

  // ✅ ✅ ✅ 全年按鈕
  const allBtn = document.createElement('div');
  allBtn.className = 'month-tab active';
  allBtn.textContent = '📊 全年班表';

  allBtn.onclick = () => {
    currentMonth = null;
    setActiveTab(allBtn);
    loadGames(); // ✅ 回原本全部
  };

  container.appendChild(allBtn);


  // ✅ 月份
  for (let m = 1; m <= 12; m++) {

    const div = document.createElement('div');
    div.className = 'month-tab';
    div.textContent = `${m}月`;

    if (m === now.getMonth() + 1) {
      // 預設不要 active（讓全年是預設）
    }

    div.onclick = () => {
      currentMonth = m;
      setActiveTab(div);
      loadJudgeGamesByMonth(year, m);
    };

    container.appendChild(div);
  }
}

function setActiveTab(el) {
  document.querySelectorAll('.month-tab')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// 呼叫API
function loadJudgeGamesByMonth(year, month) {

  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  showLoading('載入月份班表中...');

  callApi({
    action: 'getJudgeGamesByMonth',
    year: year,
    month: month,
    user_id: session.user_id
  }, res => {

    hideOverlay();

    if (!res || res.result !== 'ok') {
      showMessage('載入失敗');
      return;
    }

    allGames = res.games || [];

    // ✅ ✅ ✅ 關鍵（補空資料）
    if (!allGames.length) {
      showMessage('當月無賽事');
      document.getElementById('content').innerHTML = '';
      document.getElementById('mobileView').innerHTML = '';
      return;
    }

    render();
    renderMobile();
  });
}
