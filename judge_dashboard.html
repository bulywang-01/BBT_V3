<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判報名</title>

<style>
/* Header 裡的工具列對齊 */
#header .nav,
#header .header,
#header .header-right {
  display: flex;
  align-items: center;
}

/* 使用者名稱 */
#header #u_name {
  font-weight: 600;
  margin-left: 8px;
}

/* ===============================
   基本版型
================================ */
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
  font-size: 15px;
}

.main {
  padding: 20px;
}

/* =====================================
 ✅ Panel 強化
===================================== */

.panel {
  background: #ffffff;
  padding: 20px 22px;
  margin-bottom: 24px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* 日期標題 */
h3 {
  margin: 28px 0 10px;
  font-size: 20px;
  font-weight: 800;
  color: #1a237e;
}

/* 組別標題（大聯盟／小聯盟） */
.panel > div:first-child {
  font-size: 16px;
  font-weight: 800;
  color: #0d47a1;
  margin-bottom: 10px;
  padding-left: 6px;
  border-left: 4px solid #0d47a1;
}

/* ===============================
   Table（桌機）
================================ */
/* ✅ 表格全部置中（統一控制） */
table th,
table td {
  text-align: center;
  vertical-align: middle;  /* ✅ 上下也置中 */
}

/* ===== 專業後台表格 ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* 表頭 */
th {
  background: linear-gradient(135deg, #0d4c63, #1976d2);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  border: none;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* 內容 */
td {
  padding: 10px 12px;
  font-size: 16px;
  text-align: center;
  vertical-align: middle;
  border-bottom: 1px solid #e5e7eb;
}

/* =====================================
 ✅ 對戰強化
===================================== */
/* 對戰給最大空間 */
td:nth-child(4),
td:nth-child(5) {
  font-weight: 800;
  font-size: 17px;
  min-width: 100px;
}

/* 場次窄一點 */
td:first-child,
th:first-child {
  width: 70px;
}

/* 時間 */
td:nth-child(2),
th:nth-child(2) {
  width: 90px;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 2;
}

/* zebra */
tbody tr:nth-child(even) {
  background: #f8fafc;
}

/* hover */
tbody tr:hover {
  background: #e3f2fd;
}


tbody tr:hover {
  background: #f9fbff;
}

.col-game-id {
  font-weight: 800;
  text-align: center;
}

/* =====================================
 ✅ 場次 Badge（桌機 + 手機統一）
===================================== */

.game-badge {
  display: inline-block;
  padding: 1px 6px;
  font-size: 13px;
  font-weight: 800;
  border-radius: 999px;
  color: #fff;
  line-height: 1.4;
  white-space: nowrap;
  background: #2563eb;   /* ✅ 補這行 */

}

/* 已完賽 */
.game-badge.expired {
  background: #9ca3af;
}

/* ✅ 強制場次一定顯示（最終保命寫法） */
.game-badge,
.game-code.badge {
  color: #ffffff;
  opacity: 1;
  text-shadow: 0 0 0 #ffffff;  /* ✅ 防止被灰化 */
}


/* =====================================
 ✅ 狀態
===================================== */

/* 已完賽（過期） */

tr.expired {
  background: #f9fafb;
}

/* ✅ 禁止吃掉子元素顏色 */
tr.expired td {
  color: inherit;
}

/* 額滿 */
tr.full {
  background: #fff5f5;
}

.umpire-full {
  color: #dc2626;
  font-weight: 800;
}


/* ===============================
   桌機站位
================================ */
.pos-cell {
  min-width: 70px;
}

.cell-na {
  background: #424242;
}

/* 已選 */
.pos-choice {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 50px;
  height: 28px;
  border: 1px solid #cfd8dc;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}

.pos-choice:hover {
  background: #e3f2fd;
  border-color: #4a7ef5;
}

.pos-choice.selected {
  background: #4a7ef5;
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(74,126,245,0.35);
}

.pos-na {
  /* color: #d32f2f; */ 
  color: #919191;
  font-weight: 600;
}

/* 已報名其它站位 */
.pos-hint {
  font-size: 13px;
  color: #90a4ae;
}

/* 裁判姓名 */
.judge-name {
  padding: 4px 6px;
  border-radius: 6px;
  font-weight: 600;
  color: #0b3c8a;
}

.judge-name.me {
  background: #e8f5e9;
  color: #2e7d32;
}

.judge-star {
  margin-right: 4px;
}

/* 取消（桌機） */
.cancel-btn {
  margin-left: 6px;
  color: #c62828;
  font-size: 13px;
  cursor: pointer;
}

.cancel-btn:hover {
  opacity: 0.7;
}

/* ===============================
   RWD：桌機/手機切換
================================ */
#desktopView { display: block; }
#mobileView { display: none; }

@media (max-width: 768px) {
  #desktopView {
    display: none;
  }
  
  #mobileView { 
    display: block;
    padding: 6px 8px;
  }
}

/* ===== 共用訊息遮罩（桌機＋手機） ===== */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#overlay.show {
  display: flex;
}

#overlay-box {
  background: #fff;
  padding: 20px 26px;
  border-radius: 10px;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

#overlay-text {
  font-size: 16px;
}

/* ===============================
   手機卡片
================================ */
.game-card {
  background: #fff;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  font-size: 18px;
}

.game-header {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  margin-bottom: 6px;
}

.game-main {
  display: flex;
  justify-content: space-between;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
}

.game-main .teams {
  color: #1a237e;
}

/* ===============================
   手機站位 Grid
================================ */
.mobile-pos-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.mobile-pos {
  text-align: center;
  font-size: 16px;
}

.mobile-pos-btn {
  width: 100%;
  padding: 6px 0;
  border: 1px solid #4a7ef5;
  border-radius: 8px;
  color: #4a7ef5;
  background: #fff;
  font-weight: 600;
  font-size: 14px;
}

.mobile-pos-btn.selected {
  background: #4a7ef5;
  color: #fff;
}

.mobile-pos-na {
  color: #d32f2f;
  font-weight: 600;
}

.mobile-pos-hint {
  color: #90a4ae;
  font-size: 13px;
}

.mobile-judge-me {
  color: #2e7d32;
  font-weight: 700;
}

/* 手機取消（文字型，避免紅色大塊） */
.mobile-cancel {
  display: block;
  margin-top: 4px;
  padding: 0;
  background: none;
  border: none;
  color: #c62828;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.mobile-cancel:active {
  opacity: 0.7;
}

/* ===============================
   手機送出列
================================ */
.submit-bar {
  position: sticky;
  bottom: 0;
  background: #fff;
  padding: 12px;
  border-top: 1px solid #ddd;
}

.submit-bar button {
  width: 100%;
  font-size: 16px;
  padding: 10px 0;
}

/* 手機站位標籤（主審/一壘/二壘/三壘） */
.mobile-pos-labels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 6px;
  font-size: 13px;
  color: #607d8b;
  text-align: center;
  font-weight: 600;
}

/* ===== 裁判頁手機版：日期大格 ===== */

.m-date-title {
  font-size: 18px;
  font-weight: 800;
  color: #1a237e;
  margin-bottom: 10px;
}

/* ===== 裁判頁手機：日期大格 ===== */
.m-date-box {
  background: #f5f8ff;
  border-radius: 16px;    /* ✅ 跟紀錄一致 */
  padding: 10px;          /* ✅ 關鍵：縮小 */
  margin-bottom: 16px;    /* ✅ 對齊 */
  box-sizing: border-box;   /* ✅ 防止 padding 撐大 */
}

/* ===== 裁判頁手機：場次卡 ===== */
.game-card {
  background: #ffffff;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  font-size: 16px;
  margin: 0 -4px 12px;   /* ✅ 往外撐（關鍵） */

}
  
/* ===== 裁判頁手機版：組別中格 ===== */
.m-group-box {
  background: #ffffff;
  border-radius: 12px;
  padding: 4px;   /* ✅ 原本 10 → 縮小 */
  margin-bottom: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  
  /* ✅ 可選：讓界線更乾淨 */
  background: transparent;
  border: none;
  box-shadow: none;

}

.m-group-title {
  font-size: 18px;
  font-weight: 700;
  color: #0d47a1;
  border-left: 4px solid #0d47a1;
  padding-left: 8px;
  margin-bottom: 8px;
}

/* ===== 裁判頁手機版：場次卡 ===== */
.judge-card {
  background: #fafafa;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
}

/* ===== 裁判頁手機：時間 / 場地 同列 ===== */
.mobile-time-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}

.mobile-time-row .time {
  color: #d32f2f;     /* 時間偏紅，與你原本一致 */
  min-width: 70px;     /* 保住左欄 */
  text-align: left;
  font-size: 16px;
}

.mobile-time-row .game-code {
  flex: 0;
  text-align: center; /* ✅ 場次正中央 */
  font-size: 16px;
  color: #333;
}

.mobile-time-row .field {
  min-width: 72px;     /* 保住右欄 */
  text-align: right;
  font-size: 16px;
  color: #555;
  white-space: nowrap;
}

/* 手機版：對戰置中 */
.mobile-teams {
  text-align: center;      /* ✅ 置中 */
  font-size: 18px;
  font-weight: 800;
  margin: 6px 0 8px;
}

.mobile-teams .vs {
  margin: 0 6px;
  font-weight: 600;
  color: #999;
  font-size: 16px;
}

/* ===== 場次 Badge（共用樣式） ===== */
.game-code.badge {
  display: inline-block;
  padding: 0px 8px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
  white-space: nowrap;
}

/* ===== 場次 badge：已完賽 ===== */
.game-code.badge.expired {
  background: #9ca3af !important; /* 灰 */
  color: #fff;
  opacity: 0.9;
}

/* ===== 月班表選擇 ===== */
.month-tabs {
  display: flex;
  gap: 10px;
  margin: 10px 0 16px;
  flex-wrap: wrap;
}

.month-tab {
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 999px;
  background: #f1f5f9;
  color: #444;
  transition: 0.2s;
}

.month-tab:hover {
  background: #e3f2fd;
  color: #1976d2;
}

.month-tab.active {
  background: #1976d2;
  color: #fff;
}

/* ✅ 過期卡片 */
.expired-card {
  background: #f3f4f6 !important;
  border: 1px solid #d1d5db;
}

/* ✅ 過期文字稍微淡化 */
.expired-card .mobile-teams,
.expired-card .time {

}

</style>

<body data-page-title="裁判報名">

<div id="header-container"></div>

<script>
function loadHeader() {
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      // ✅ 只用 body class 控制身份
      const session = (typeof getSession === 'function') ? getSession() : null;
      document.body.classList.remove(
        'role-admin', 'role-judge', 'role-record'
      );

      if (session && session.role) {
        const roles = session.role.split(',').map(r => r.trim());

        if (roles.includes('admin')) {
          document.body.classList.add('role-admin');
        }
        if (roles.includes('judge') || roles.includes('chief_judge')) {
          document.body.classList.add('role-judge');
        }
        if (roles.includes('record') || roles.includes('record_chief')) {
          document.body.classList.add('role-record');
        }
      }
    })
    .catch(err => console.error('Header 載入失敗', err));
  }
  
  // 裁入報名頁面重要function
  document.addEventListener('DOMContentLoaded', () => {
    loadHeader();   // 只負責 header
    loadGames();    // 或該頁真正的資料初始化
    initMonthTabs();  // 初始化月班表選擇
  });
</script>

      <label style="margin-left:10px;">

<script>
function getName(v){
  if (!v) return '—';
  if (typeof v === 'object') return v.name || '—';
  return v;
}

// 過期不顯示
function isPastGame(gameDateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const d = new Date(gameDateStr.replace(/\//g, '-'));
  d.setHours(0, 0, 0, 0);

  return d < today;
}

// 組別對應顏色
function applyCategoryBadgeColor() {
  const colorMap = {
    '大聯盟': '#2563eb',   // 藍
    '小聯盟': '#16a34a',   // 綠
    '六年級': '#d97706',   // 黃
    '五年級': '#9333ea',   // 紫
    'U12': '#ef4444'       // 紅
  };

  document.querySelectorAll('.game-code.badge').forEach(el => {
    const cat = el.dataset.category;
    const color = colorMap[cat] || '#6b7280'; // 預設灰
    el.style.backgroundColor = color;
  });
}

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.remove();
}

function timeToMinutesSafe(t) {
  if (!t) return 0;

  if (typeof t === 'string' && t.includes(':')) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  if (t instanceof Date) {
    return t.getHours() * 60 + t.getMinutes();
  }

  return 0;
}


/* ===== 狀態 ===== */
let allGames = [];
let selectedPositions = {}; // game_id -> role

/* ===== API ===== */
function loadGames() {
  const session = JSON.parse(localStorage.getItem('session_user') || {});
  showLoading('載入賽事資料中...');

  callApi(
    { action:'getSignableGames', user_id: session.user_id || '' },
    res => {
      hideOverlay();

      if (!res || res.result !== 'ok') {
        showMessage(res?.message || '無法取得賽事資料');
        return;
      }

      allGames = res.games || [];
      render();
      renderMobile();

    }
  );
}

/* ===== 工具 ===== */
function cancelSelected(gameId) {
  delete selectedPositions[gameId];
  render();
  renderMobile();

}
  
function cancelSelectedByDate() {
  if (!Object.keys(selectedPositions).length) {
    alert('目前沒有已選擇的站位');
    return;
  }

  const date = prompt('請輸入要取消的日期（yyyy/MM/dd）');
  if (!date) return;

  let removed = 0;

  allGames.forEach(g => {
    if (g.date === date && selectedPositions[g.game_id]) {
      delete selectedPositions[g.game_id];
      removed++;
    }
  });

  if (!removed) {
    alert('該日期沒有已選擇的站位');
  } else {
    alert(`已取消 ${date} 的 ${removed} 筆選擇`);
    render();
    renderMobile();

  }
}

function formatTime(t){
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}

function rememberSelection(gameId, role, btn) {
  // 清掉舊選擇
  // delete selectedPositions[gameId];
  selectedPositions[gameId] = role;

  // 清除同場所有已選外觀
  document
    .querySelectorAll(`.signup-btn[data-game="${gameId}"]`)
    .forEach(b => b.classList.remove('selected'));

  // 標記目前按下的按鈕
  if (btn) {
    btn.classList.add('selected');
  }

  // ✅ 一定要在 if 外
  render();
  renderMobile();
}


function render() {

  const box = document.getElementById('content');
  box.innerHTML = '';

  if (!allGames || allGames.length === 0) {
    box.innerHTML = '<div class="panel">目前沒有可報名賽事</div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  /* ✅ ✅ 1️⃣ 篩選 */
  const filtered = allGames.filter(g => {
    if (!g.date) return false;

    const gd = new Date(g.date.replace(/\//g,'-'));
    const isPast = gd < today;

    // ✅ 全年才過濾過期
    if (currentMonth === null && isPast) return false;

    return true;
  });

  if (!filtered.length) {
    box.innerHTML = '<div class="panel">沒有符合條件的賽事</div>';
    return;
  }

  /* ✅ ✅ 2️⃣ 日期排序 + 分組 */
  const dateGroups = {};

  filtered
    .sort((a,b) =>
      new Date(a.date.replace(/\//g,'-')) -
      new Date(b.date.replace(/\//g,'-'))
    )
    .forEach(g => {
      if (!dateGroups[g.date]) dateGroups[g.date] = [];
      dateGroups[g.date].push(g);
    });

  /* ✅ ✅ ✅ 全年提示 */
  if (currentMonth === null) {
    box.insertAdjacentHTML(
      'beforeend',
      '<div class="hint">※ 過期賽事請看「單月班表」</div>'
    );
  }

  /* ✅ ✅ 3️⃣ render 日期 */
  Object.keys(dateGroups)
    .sort((a,b)=>
      new Date(a.replace(/\//g,'-')) -
      new Date(b.replace(/\//g,'-'))
    )
    .forEach(date => {

      const gd = new Date(date.replace(/\//g,'-'));
      const isPastDate = gd < today;

      const h3 = document.createElement('h3');
      h3.textContent = date;
      box.appendChild(h3);

      /* ✅ 4️⃣ 組別分組 */
      const categoryGroups = {};

      dateGroups[date].forEach(g => {
        const cat = g.category || '未分類';
        if (!categoryGroups[cat]) categoryGroups[cat] = [];
        categoryGroups[cat].push(g);
      });

      Object.keys(categoryGroups).forEach(category => {

        const panel = document.createElement('div');
        panel.className = 'panel';

        /* ✅ ✅ 單月灰底 */
        if (currentMonth !== null && isPastDate) {
          panel.style.background = '#f3f4f6';
          panel.style.opacity = '0.85';
        }

        /* ✅ 標題 */
        panel.insertAdjacentHTML(
          'beforeend',
          `<div class="group-title">│ ${category}</div>`
        );

        const table = document.createElement('table');

        table.innerHTML = `
          <thead>
            <tr>
              <th>場次</th>
              <th>時間</th>
              <th>組別</th>
              <th>客隊</th>
              <th>主隊</th>
              <th>場地</th>
              <th>時長</th>
              <th>裁判數</th>
              <th>主審</th>
              <th>一壘</th>
              <th>二壘</th>
              <th>三壘</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector('tbody');

        /* ✅ 5️⃣ render 每場比賽 */
        categoryGroups[category]
          .sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time_range))
          .forEach(g => {

            const tr = renderGameRow(g, today);
            tbody.appendChild(tr);

          });

        panel.appendChild(table);
        box.appendChild(panel);
      });
    });

}

/* ✅ ✅ ✅ 拆出：render 每一列 */
function renderGameRow(g, today) {

  const tr = document.createElement('tr');

  const gd = new Date(g.date.replace(/\//g,'-'));
  const isPast = gd < today;

  if (isPast) tr.classList.add('expired');

  /* ✅ ✅ ✅ 正確計算人數（關鍵修正） */
  const occupied = g.judges || {};
  const assigned = Object.values(occupied).filter(v => v && v !== '').length;

  const need = Number(g.need_count) || 0;

  let umpireCell = '';

  if (need === 0) {
    umpireCell = '<span class="umpire-na">不需裁判</span>';
  } else if (assigned >= need) {
    umpireCell = '<span class="umpire-full"><strong>已額滿</strong></span>';
    tr.classList.add('full');
  } else {
    umpireCell = `${assigned}/${need}`;
  }

  tr.innerHTML = `
    <td><span class="game-badge ${isPast ? 'expired' : ''}">${g.game_code}</span></td>
    <td>${g.time}</td>
    <td>${g.category || ''}</td>
    <td>${g.away_team || ''}</td>
    <td>${g.home_team || ''}</td>
    <td>${g.field || ''}</td>

    <!-- ✅ ✅ ✅ 時長修正 -->
    <td>${g.duration ? g.duration + ' 分鐘' : '-'}</td>

    <td>${umpireCell}</td>

    ${['PU','U1','U2','U3'].map(role => {
      return `<td>${renderPos(g, role, isPast)}</td>`;
    }).join('')}
  `;

  return tr;
}

/* ✅ ✅ ✅ 拆出：站位邏輯 */
function renderPos(g, role, isPast) {

  if (
    g.need_count === 0 ||
    (g.need_count === 1 && role !== 'PU') ||
    (g.need_count === 2 && ['U2','U3'].includes(role)) ||
    (g.need_count === 3 && role === 'U2')
  ) {
    return '<span class="pos-na">不需要</span>';
  }

  const occupied = g.judges || {};
  const name = getName(occupied[role]);

  /* ✅ ✅ ✅ 過期 → 只顯示人名（關鍵） */
  if (isPast) {
    return name;
  }

  /* ✅ 已有人 */
  if (name !== '—') {

    const isMe = g.my_position === role;

    if (isMe) {
      return `
        <div class="judge-name me">
          ★ ${name}
          <span class="cancel-btn"
            onclick="cancelMySignup('${g.my_signup_id}')">
            [取消]
          </span>
        </div>
      `;
    }

    return `<div class="judge-name">${name}</div>`;
  }

  /* ✅ 待位中 */
  if (g.my_position) {
    return '<span class="pos-hint">待位中</span>';
  }

  /* ✅ 可報名 */
  return `
    <div class="pos-choice"
      onclick="signupJudgeInstant('${g.game_id}','${role}')">
      點選
    </div>
  `;
}


/* ✅工具 */
function timeToMinutes(t){
  const d = new Date(t);
  return d.getHours()*60+d.getMinutes();
}


  
// 手機版 ${renderTimeHHmm(g.time_range)}
 
function renderMobile() {

  const root = document.getElementById('mobileView');
  if (!root) return;

  root.innerHTML = '';

  const grouped = groupGamesForMobile(allGames);

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // ✅ ✅ ✅ 日期排序（防止 5/10 排在 5/2 前面）
  const dates = Object.keys(grouped).sort((a, b) => {
    return new Date(a.replace(/\//g, '-')) - new Date(b.replace(/\//g, '-'));
  });

  // ✅ ✅ ✅ 全年提示
  if (currentMonth === null) {
    root.insertAdjacentHTML(
      'beforeend',
      '<div class="hint">※ 過期賽事請看「單月班表」</div>'
    );
  }

  dates.forEach(date => {

    const isPast = isPastGame(date);

    // ✅ ✅ ✅ 🔥關鍵修正：只有全年才擋
    if (currentMonth === null && isPast) return;

    const dateBox = document.createElement('div');
    dateBox.className = 'm-date-box';

    // ✅ ✅ ✅ 單月灰底
    if (currentMonth !== null && isPast) {
      dateBox.style.background = '#f3f4f6';
      dateBox.style.opacity = '0.85';
    }

    dateBox.innerHTML = `<div class="m-date-title">📅 ${date}</div>`;

    Object.keys(grouped[date]).forEach(category => {

      const groupBox = document.createElement('div');
      groupBox.className = 'm-group-box';

      groupBox.innerHTML = `<div class="m-group-title">${category}</div>`;

      grouped[date][category]
        .sort((a, b) =>
          timeToMinutesSafe(a.time_range) -
          timeToMinutesSafe(b.time_range)
        )
        .forEach(g => {

          const isPastGameRow = isPastGame(g.date);

          groupBox.innerHTML += `
            <div class="game-card ${isPastGameRow ? 'expired-card' : ''}">
              
              <div class="mobile-time-row">
                <div class="time">⏰ ${g.time}</div>

                <div class="game-code badge ${isPastGameRow ? 'expired' : ''}"
                  data-category="${g.category || ''}">
                  ${g.game_code || ''}
                </div>

                <div class="field">📍 ${g.field}</div>
              </div>

              <div class="mobile-teams">
                <strong>${g.away_team}</strong>
                <span class="vs">vs</span>
                <strong>${g.home_team}</strong>
              </div>

              ${renderMobilePosGrid(g)}

            </div>
          `;
        });

      dateBox.appendChild(groupBox);
    });

    root.appendChild(dateBox);
  });

  applyCategoryBadgeColor();
}




// ✅ 裁判頁手機版：依 日期 → 組別 → 場次 分組
function groupGamesForMobile(games) {
  const map = {};

  games.forEach(g => {
    const date = g.date; // yyyy/MM/dd
    const category = g.category || '未分類';

    if (!map[date]) map[date] = {};
    if (!map[date][category]) map[date][category] = [];

    map[date][category].push(g);
  });

  // ✅ 每個組別內依「裁判頁時間欄位」排序
  Object.values(map).forEach(catMap => {
    Object.values(catMap).forEach(list => {
      list.sort((a, b) =>
        timeToMinutesSafe(a.time_range) -
        timeToMinutesSafe(b.time_range)
      );
    });
  });

  return map;
}

function renderMobilePosGrid(g) {
  if (isPastGame(g.date)) {
  return `
    <div class="mobile-pos-grid">
      <div class="mobile-pos-na">—</div>
      <div class="mobile-pos-na">—</div>
      <div class="mobile-pos-na">—</div>
      <div class="mobile-pos-na">—</div>
    </div>
  `;
  }
  
  const ROLE_NAME = {
  PU: '主審',
  U1: '一壘',
  U2: '二壘',
  U3: '三壘'
  };
  
  const roles = ['PU', 'U1', 'U2', 'U3'];
  const today = new Date(); today.setHours(0,0,0,0);
  const isPast = new Date(g.date.replace(/\//g,'-')) < today;


  const occupied = g.judges || {};

  function needNA(role) {
    return (
      g.need_count === 0 ||
      (g.need_count === 1 && role !== 'PU') ||
      (g.need_count === 2 && ['U2','U3'].includes(role)) ||
      (g.need_count === 3 && role === 'U2')
    );
  }

  return `
  
     <!-- ✅ 站位標籤列 -->
     <div class="mobile-pos-labels">
       <div>主審</div>
       <div>一壘</div>
       <div>二壘</div>
       <div>三壘</div>
     </div>
   
     <!-- ✅ 站位內容 -->

    <div class="mobile-pos-grid">
      ${roles.map(role => {
        if (needNA(role)) {
          return `<div class="mobile-pos"><span class="mobile-pos-na">-</span></div>`;
        }

        if (occupied[role]) {
          const isMe = g.my_position === role;
          return `
            <div class="mobile-pos">
              <span class="${isMe ? 'mobile-judge-me' : ''}">
                ${isMe ? '★ ' : ''}${getName(occupied[role])}
              </span>
              ${
                isMe
                  ? `<span class="mobile-cancel"
                         onclick="cancelMySignup('${g.my_signup_id}')">取消</span>`
                  : ''
              }
            </div>
          `;
        }

        if (g.my_position) {
          return `<div class="mobile-pos"><span class="mobile-pos-hint">待位中</span></div>`;
        }

        if (selectedPositions[g.game_id] === role) {
          return `
            <div class="mobile-pos">
              <div class="mobile-pos-btn selected"
                   onclick="cancelSelected('${g.game_id}')">選定</div>
            </div>
          `;
        }

        return `
          <div class="mobile-pos">
            <div class="mobile-pos-btn"
              onclick="signupJudgeInstant('${g.game_id}','${role}')">
              ${ROLE_NAME[role]}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

 
function renderTimeHHmm(t) {
  if (!t) return '';

  // ✅ 已經是字串（08:30）
  if (typeof t === 'string') {
    // 保險：如果已經是 HH:mm，直接回傳
    if (/^\d{1,2}:\d{2}$/.test(t)) {
      return t;
    }
    // 其他字串就原樣回
    return t;
  }

  // ✅ 是 Date 物件（1899-12-30）
  if (t instanceof Date) {
    return (
      t.getHours().toString().padStart(2, '0') +
      ':' +
      t.getMinutes().toString().padStart(2, '0')
    );
  }

  // 其他型別（保險）
  return String(t);
}
 
/* ===== 送出 ===== */

function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if (!entries.length){
    showMessage('尚未選擇站位');
    return;
  }

  const session = ensureLogin();
  if (!session) return;

  const payload = entries.map(
    id => `${id}:${selectedPositions[id]}`
  );

  // ✅ 顯示存入中
  showLoading('報名資料存入中...');

  callApi(
    {
      action: 'judgeSignupByGames',
      user_id: session.user_id,
      games_with_position: payload.join(',')
    },
    res => {
      if (res && res.result === 'ok') {
        showMessage('✅ 報名成功');
        setTimeout(() => location.reload(), 800);
      } else {
        showMessage(res?.message || '❌ 報名失敗');
      }
    }
  );
}

function showLoading(msg) {
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay-ok').style.display = 'none';
  overlay.classList.add('show');
}

function showMessage(msg) {
  const overlay = document.getElementById('overlay');
  const text = document.getElementById('overlay-text');
  const ok = document.getElementById('overlay-ok');

  text.textContent = msg;
  ok.style.display = 'none';

  // ✅ 重點：點遮罩即可關閉（只綁一次）
  overlay.onclick = () => {
    hideOverlay();
    overlay.onclick = null; // 避免影響後續 loading
  };

  overlay.classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}

// 取消自已報名的賽事
function cancelMySignup(signupId) {
  if (!signupId) return;

  if (!confirm('確定要取消這個站位嗎？')) return;

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    showMessage('登入狀態已失效');
    return;
  }

  // ✅ 顯示取消中
  showLoading('取消報名中...');

  callApi(
    {
      action: 'cancelJudgeSignup',
      user_id: session.user_id,
      signup_id: signupId
    },
    res => {
      if (res && res.result === 'ok') {
        showMessage('✅ 已取消站位');
        setTimeout(() => {
          reloadCurrentView();
        }, 600);
      } else {
        showMessage(res?.message || '❌ 取消失敗');
      }
    }
  );
}

// 按了就直接送出，不用再按鍵了
function signupJudgeInstant(gameId, role){

  const g = allGames.find(x => x.game_id == gameId);
  if (!g) return;

  const err = validateSignup(g, role);
  if (err){
    showMessage(err);
    return;
  }

  showLoading('報名中...');

  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  callApi({
    action: 'judgeSignupByGames',
    user_id: session.user_id,
    games_with_position: `${gameId}:${role}`
  }, res => {

    if (res && res.result === 'ok'){

      // ✅ ✅ ✅ 無刷新（關鍵）

      g.judges = g.judges || {};
      g.judges[role] = session.name;

      g.my_position = role;

      render();
      renderMobile();

      showMessage('✅ 報名成功');

    } else {
      showMessage(res?.message || '❌ 報名失敗');
    }
  });
}


// 初始化月份
let currentMonth = null;

function initMonthTabs() {

  const now = new Date();
  const year = now.getFullYear();

  const container = document.getElementById('month-tabs');
  container.innerHTML = '';

  // ✅ ✅ ✅ 全年按鈕
  const allBtn = document.createElement('div');
  allBtn.className = 'month-tab active';
  allBtn.textContent = '📊 全年班表';

  allBtn.onclick = () => {
    currentMonth = null;
    setActiveTab(allBtn);
    loadGames(); // ✅ 回原本全部
  };

  container.appendChild(allBtn);


  // ✅ 月份
  for (let m = 1; m <= 12; m++) {

    const div = document.createElement('div');
    div.className = 'month-tab';
    div.textContent = `${m}月`;

    if (m === now.getMonth() + 1) {
      // 預設不要 active（讓全年是預設）
    }

    div.onclick = () => {
      currentMonth = m;
      setActiveTab(div);
      loadJudgeGamesByMonth(year, m);
    };

    container.appendChild(div);
  }
}

function setActiveTab(el) {
  document.querySelectorAll('.month-tab')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// 呼叫API
function loadJudgeGamesByMonth(year, month) {

  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  showLoading('載入月份班表中...');

  callApi({
    action: 'getJudgeGamesByMonth',
    year: year,
    month: month,
    user_id: session.user_id
  }, res => {

    hideOverlay();

    if (!res || res.result !== 'ok') {
      showMessage('載入失敗');
      return;
    }

    allGames = res.games || [];

    // ✅ ✅ ✅ 關鍵（補空資料）
    if (!allGames.length) {
      showMessage('當月無賽事');
      document.getElementById('content').innerHTML = '';
      document.getElementById('mobileView').innerHTML = '';
      return;
    }

    render();
    renderMobile();
  });
}

function reloadCurrentView(){

  if (currentMonth !== null){
    const now = new Date();
    loadJudgeGamesByMonth(now.getFullYear(), currentMonth);
  } else {
    loadGames();
  }

}
